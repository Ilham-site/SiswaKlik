<div class="animate-in space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-2xl font-800 text-slate-800">Selamat Kembali!</h2>
            <p class="text-slate-500 text-sm font-medium">Jom semak status akademik anda hari ini.</p>
        </div>
        <div class="h-12 w-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
            <i class="fas fa-th-large"></i>
        </div>
    </div>

    <div class="bg-gradient-to-br from-blue-600 to-blue-700 p-6 rounded-[2.5rem] text-white shadow-xl shadow-blue-100 relative overflow-hidden">
        <div class="relative z-10">
            <div class="flex justify-between items-start mb-4">
                <span class="bg-white/20 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider backdrop-blur-md">Status Semasa</span>
                <i class="fas fa-calendar-check text-white/50 text-xl"></i>
            </div>
            <h3 id="dashCurrentActivity" class="text-xl font-bold mb-1">Memuatkan...</h3>
            <p id="dashDateRange" class="text-blue-100 text-xs font-medium mb-4 italic">Sila tunggu sebentar</p>
            
            <div class="space-y-2">
                <div class="flex justify-between text-[10px] font-bold uppercase">
                    <span>Progres Semester</span>
                    <span id="dashProgressText">0%</span>
                </div>
                <div class="h-2.5 bg-white/20 rounded-full overflow-hidden">
                    <div id="dashProgressBar" class="h-full bg-white rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>
        <div class="absolute -right-10 -bottom-10 h-40 w-40 bg-white/10 rounded-full blur-3xl"></div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <button onclick="loadPage('semester.html', this)" class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm hover:border-blue-200 transition-all text-left group">
            <div class="h-12 w-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <span class="block font-bold text-slate-800 text-sm">Kalendar</span>
            <span class="text-[10px] text-slate-400 font-medium text-nowrap">Semak tarikh penting</span>
        </button>

        <button onclick="loadPage('kmjp.html', this)" class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm hover:border-blue-200 transition-all text-left group">
            <div class="h-12 w-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                <i class="fas fa-folder-open"></i>
            </div>
            <span class="block font-bold text-slate-800 text-sm">KMJP Drive</span>
            <span class="text-[10px] text-slate-400 font-medium">Arkib nota & fail</span>
        </button>
    </div>

    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
        <div class="flex items-center justify-between mb-5">
            <h4 class="font-bold text-slate-800 uppercase text-xs tracking-widest">Peperiksaan Akan Datang</h4>
            <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
        </div>
        <div id="dashExamList" class="space-y-4">
            <div class="text-center py-4">
                <p class="text-xs text-slate-400 font-medium italic">Tiada peperiksaan dalam rekod.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Data Akademik (Sama seperti dalam semester.html untuk sinkronisasi)
    const academicEvents = [
        { title: "Cuti Pertengahan Semester 2", startDate: new Date(2026, 2, 23), endDate: new Date(2026, 2, 29), rawDate: "23 - 29 Mac 2026" },
        { title: "Perkuliahan Semester 2 (Bahagian 2)", startDate: new Date(2026, 2, 30), endDate: new Date(2026, 4, 17), rawDate: "30 Mac - 17 Mei 2026" },
        { title: "Ulangkaji & Peperiksaan Akhir S2", startDate: new Date(2026, 4, 18), endDate: new Date(2026, 5, 14), rawDate: "18 Mei - 14 Jun 2026" },
        { title: "Cuti Akhir Semester 2", startDate: new Date(2026, 5, 15), endDate: new Date(2026, 6, 12), rawDate: "15 Jun - 12 Julai 2026" }
    ];

    function updateDashboardStatus() {
        const now = new Date();
        let activeEvent = academicEvents[0];
        let passedEvents = 0;

        academicEvents.forEach(item => {
            if (now >= item.startDate) {
                activeEvent = item;
                passedEvents++;
            }
        });

        const progressPercent = Math.round((passedEvents / academicEvents.length) * 100);

        // Update UI
        document.getElementById('dashCurrentActivity').innerText = activeEvent.title;
        document.getElementById('dashDateRange').innerText = activeEvent.rawDate;
        document.getElementById('dashProgressBar').style.width = progressPercent + '%';
        document.getElementById('dashProgressText').innerText = progressPercent + '%';
    }

    function renderDashExams() {
        const container = document.getElementById('dashExamList');
        const exams = JSON.parse(localStorage.getItem('siswa_exams')) || [];
        
        if (exams.length > 0) {
            // Ambil 2 yang terdekat sahaja untuk dashboard
            const sortedExams = exams.sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 2);
            
            container.innerHTML = sortedExams.map(ex => `
                <div class="flex items-center gap-4 p-3 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="h-10 w-10 bg-white rounded-xl flex flex-col items-center justify-center border border-slate-200 font-bold text-blue-600 shrink-0 text-[10px]">
                        <span>${new Date(ex.date).getDate()}</span>
                        <span class="uppercase text-[8px]">${new Date(ex.date).toLocaleString('ms-MY', {month: 'short'})}</span>
                    </div>
                    <div class="overflow-hidden">
                        <h5 class="font-bold text-slate-800 text-xs truncate">${ex.code}</h5>
                        <p class="text-[10px] text-slate-500 truncate">${ex.title}</p>
                    </div>
                </div>
            `).join('');
        }
    }

    // Jalankan fungsi
    updateDashboardStatus();
    renderDashExams();
</script>
