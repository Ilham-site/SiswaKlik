            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2">
                    <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 h-full">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
                                <i class="fas fa-file-signature text-orange-500"></i> Jadual Peperiksaan
                            </h2>
                            <button onclick="document.getElementById('kmjpInput').click()" class="text-xs font-bold bg-blue-50 text-blue-600 px-4 py-2 rounded-xl hover:bg-blue-100 transition">
                                <i class="fas fa-file-import mr-1"></i> Import KMJP
                            </button>
                            <input type="file" id="kmjpInput" class="hidden" accept=".pdf" onchange="processKMJP(this)">
                        </div>
                        <div id="examContainer" class="space-y-4">
                            <div class="text-center py-10">
                                <img src="https://cdn-icons-png.flaticon.com/512/6592/6592963.png" class="w-16 h-16 mx-auto opacity-20 mb-4 grayscale" alt="No Data">
                                <p class="text-slate-400 text-sm font-medium italic">Tiada jadual peperiksaan dikesan.<br>Sila muat naik fail KMJP anda.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-8">
                    <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[3rem] text-white shadow-xl relative overflow-hidden">
                        <i class="fas fa-university absolute -right-4 -bottom-4 text-white/10 text-9xl"></i>
                        <h3 class="text-lg font-bold mb-4">Ringkasan Akademik</h3>
                        <div class="space-y-4 relative z-10">
                            <div>
                                <p class="text-[10px] opacity-70 uppercase tracking-widest font-bold mb-1" id="weekStatus">Memproses...</p>
                                <h2 id="semesterStatus" class="text-2xl md:text-3xl font-black leading-tight mb-1">Memuatkan Data...</h2>
                                <p id="dateRange" class="text-xs text-blue-100 font-medium">-</p>
                            </div>
                            <div class="pt-4 border-t border-white/10">
                                <div class="flex justify-between items-end mb-2">
                                    <span class="text-[10px] font-bold bg-white/20 px-3 py-1.5 rounded-full border border-white/10 uppercase" id="sessionTag">Sesi 2025/2026</span>
                                    <p class="text-lg font-black" id="progressText">0%</p>
                                </div>
                                <div class="w-full h-2.5 bg-black/20 rounded-full overflow-hidden">
                                    <div id="progressBar" class="h-full bg-emerald-400 rounded-full transition-all duration-1000" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <i class="fas fa-calendar-alt text-blue-500"></i> Aktiviti Terdekat
                        </h3>
                        <div id="upcomingEvents" class="space-y-4">
                            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <p id="nextActivityTitle" class="font-bold text-slate-700 text-sm">Sila kemaskini kalendar</p>
                                <p id="nextActivityDate" class="text-[10px] text-slate-500 mt-1 uppercase font-bold tracking-wider">Tiada Data</p>
                            </div>
                        </div>
                        <button onclick="window.location.href='https://siswaklik.pages.dev/semester'" class="mt-4 w-full text-center py-4 bg-blue-50 text-blue-600 rounded-[1.5rem] text-xs font-black hover:bg-blue-100 transition-all border border-blue-100 uppercase tracking-wide">
                            Lihat Kalendar Akademik <i class="fas fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>
            </div>

     <main>

                     <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let timeout;
        function resetTimer() {
            clearTimeout(timeout);
            timeout = setTimeout(logout, 300000);
        }
        window.onmousemove = resetTimer;
        window.onmousedown = resetTimer;
        window.onclick = resetTimer;
        window.onkeydown = resetTimer;
        window.ontouchstart = resetTimer;

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('drawerOverlay');
        function toggleSidebar(show) {
            sidebar.classList.toggle('-translate-x-full', !show);
            overlay.classList.toggle('hidden', !show);
        }
        document.getElementById('menuBtn').onclick = () => toggleSidebar(true);
        document.getElementById('closeBtn').onclick = () => toggleSidebar(false);
        overlay.onclick = () => toggleSidebar(false);

        const originalDashboardHTML = document.getElementById('app-root').innerHTML;

        function loadDashboard() {
            const appRoot = document.getElementById('app-root');
            appRoot.innerHTML = originalDashboardHTML;
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('nav-active'));
            document.getElementById('dashBtn').classList.add('nav-active');
            
            initDashboard();
            toggleSidebar(false);
            window.scrollTo(0, 0);
        }

        async function loadPage(page, element) {
            try {
                const appRoot = document.getElementById('app-root');
                appRoot.style.opacity = '0.5'; 
                const response = await fetch(page);
                if (!response.ok) throw new Error("Fail tidak dijumpai");
                const html = await response.text();
                appRoot.innerHTML = html;
                appRoot.style.opacity = '1';
                document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('nav-active'));
                if(element) element.classList.add('nav-active');
                toggleSidebar(false);
                const scripts = appRoot.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
                window.scrollTo(0, 0);
            } catch (err) {
                appRoot.innerHTML = `<div class="text-center py-20">Ralat: Fail tidak ditemui.</div>`;
                appRoot.style.opacity = '1';
            }
        }

        function initDashboard() {
            const userData = JSON.parse(localStorage.getItem('siswaklik_user'));
            if(userData) {
                // Update UI Profil di Header
                document.getElementById('welcomeText').innerText = `Hai, ${userData.given_name || userData.name.split(' ')[0]}!`;
                document.getElementById('userSubtext').innerText = userData.email;
                if(document.getElementById('userNameDisplay')) {
                    document.getElementById('userNameDisplay').innerText = userData.name.split(' ')[0];
                }
                
                if (userData.picture) {
                    const avatar = document.getElementById('userAvatar');
                    avatar.src = userData.picture;
                    avatar.classList.remove('hidden');
                    document.getElementById('defaultIcon').classList.add('hidden');
                }
            }
            updateAcademicStats();
            renderExams();
        }

        function parseDate(dateStr) {
            const parts = dateStr.split(/[-–]/);
            const startPart = parts[0].trim();
            const endPart = parts[parts.length - 1].trim();
            const yearMatch = dateStr.match(/\d{4}/);
            const year = yearMatch ? yearMatch[0] : new Date().getFullYear();
            const monthMap = { 'Jan': 'Jan', 'Feb': 'Feb', 'Mac': 'Mar', 'Apr': 'Apr', 'Mei': 'May', 'Jun': 'Jun', 'Jul': 'Jul', 'Ogos': 'Aug', 'Sept': 'Sep', 'Okt': 'Oct', 'Nov': 'Nov', 'Dis': 'Dec' };
            let processedStart = startPart;
            for (const [ms, en] of Object.entries(monthMap)) { if (processedStart.includes(ms)) { processedStart = processedStart.replace(ms, en); break; } }
            if (!Object.keys(monthMap).some(m => startPart.includes(m))) {
                const monthMatch = endPart.match(/[A-Za-z]+/);
                const monthFromEnd = monthMatch ? monthMatch[0] : "";
                processedStart += ` ${monthMap[monthFromEnd] || monthFromEnd}`;
            }
            return new Date(`${processedStart} ${year}`);
        }

        async function updateAcademicStats() {
            try {
                const response = await fetch('kalendar_akademik.json');
                if (!response.ok) return;
                const data = await response.json();
                const allEvents = [];
                ['semester_1', 'semester_2', 'semester_3'].forEach(semKey => {
                    const semLabel = semKey.replace('_', ' ').toUpperCase();
                    data.aktiviti_akademik[semKey].forEach(item => {
                        allEvents.push({ title: item.perkara, rawDate: item.tarikh, semester: semLabel, startDate: parseDate(item.tarikh) });
                    });
                });
                const now = new Date();
                let activeEvent = allEvents[0];
                let passedCount = 0;
                allEvents.forEach(ev => { if (now >= ev.startDate) { activeEvent = ev; passedCount++; } });

                document.getElementById('semesterStatus').innerText = activeEvent.title;
                document.getElementById('dateRange').innerText = `${activeEvent.rawDate} (${activeEvent.semester})`;
                document.getElementById('weekStatus').innerText = `${activeEvent.semester} • SEDANG BERLANGSUNG`;
                document.getElementById('sessionTag').innerText = `Sesi ${data.sesi}`;
                const progress = Math.round((passedCount / allEvents.length) * 100);
                document.getElementById('progressText').innerText = progress + "%";
                document.getElementById('progressBar').style.width = progress + "%";
                document.getElementById('nextActivityTitle').innerText = activeEvent.title;
                document.getElementById('nextActivityDate').innerText = activeEvent.rawDate;
            } catch (e) { console.error(e); }
        }

        function renderExams() {
            const exams = JSON.parse(localStorage.getItem('siswa_exams')) || [];
            const container = document.getElementById('examContainer');
            if (!container) return;
            if (exams.length > 0) {
                container.innerHTML = exams.map(exam => `
                    <div class="flex items-center gap-4 p-5 rounded-[2rem] border border-slate-100 hover:border-blue-100 hover:bg-blue-50/30 transition group">
                        <div class="bg-white shadow-sm border border-slate-100 p-3 rounded-2xl text-center min-w-[70px]">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${new Date(exam.date).toLocaleString('ms-MY', {month: 'short'})}</p>
                            <p class="text-xl font-black text-blue-600">${new Date(exam.date).getDate()}</p>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-800 leading-tight">${exam.title}</h4>
                            <p class="text-xs text-slate-500 mt-1 uppercase font-medium tracking-tighter">
                                <i class="far fa-clock mr-1 text-blue-400"></i> ${exam.time} • 
                                <i class="fas fa-map-marker-alt mr-1 text-rose-400"></i> ${exam.location}
                            </p>
                        </div>
                        <button onclick="deleteExam('${exam.id}')" class="p-2 text-slate-200 hover:text-red-500 transition">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                `).join('');
            }
        }

        async function processKMJP(input) {
            const file = input.files[0];
            if (!file) return;
            try {
                Swal.fire({ title: 'Memproses...', text: 'Mengekstrak jadual peperiksaan', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let text = '';
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(' ');
                    }
                    const cleanText = text.replace(/\s+/g, ' ');
                    const pattern = /([A-Z]{4}\d{4})\s+(.*?)\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+.*?(DEWAN\s\(.*?\)|DGEMILANG|DT\s[A-Z\s]+|DEWAN\s[A-Z]+|DEWAN\sPEP[A-Z0-9\s]+)/gi;
                    const found = [];
                    let m;
                    while ((m = pattern.exec(cleanText)) !== null) {
                        if (m[2].includes("Penilaian Berterusan")) continue;
                        found.push({ id: 'ex-'+Math.random().toString(36).substr(2,7), code: m[1], title: m[2].trim(), date: m[3].split('/').reverse().join('-'), time: m[4], location: m[5].trim() });
                    }
                    localStorage.setItem('siswa_exams', JSON.stringify(found));
                    renderExams();
                    Swal.fire('Berjaya!', `${found.length} subjek dikesan.`, 'success');
                };
                reader.readAsArrayBuffer(file);
            } catch(e) { Swal.fire('Ralat', 'Gagal memproses PDF', 'error'); }
            input.value = "";
        }

        function deleteExam(id) {
            let exams = JSON.parse(localStorage.getItem('siswa_exams')) || [];
            exams = exams.filter(e => e.id !== id);
            localStorage.setItem('siswa_exams', JSON.stringify(exams));
            renderExams();
        }

        function updateDate() {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const el = document.getElementById('systemDate');
            if(el) el.innerText = new Date().toLocaleDateString('ms-MY', options);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        window.onload = () => {
            updateDate();
            resetTimer();
            const user = JSON.parse(localStorage.getItem('siswaklik_user'));
            if (!user) {
                window.location.href = 'login.html';
            } else {
                initDashboard();
            }
        };
    </script>
