<div class="animate-in space-y-6">
    <div class="flex items-center justify-between mb-2">
        <div>
            <h2 class="text-2xl font-800 text-slate-800">Dashboard Utama</h2>
            <p class="text-sm text-slate-500 font-medium">Selamat kembali ke SiswaKlik</p>
        </div>
        <div class="h-12 w-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 border border-blue-100">
            <i class="fas fa-th-large text-xl"></i>
        </div>
    </div>

    <div class="glass-card p-6 rounded-[2.5rem] border border-blue-100 shadow-sm overflow-hidden relative group">
        <div class="absolute -right-10 -top-10 h-40 w-40 bg-blue-50 rounded-full opacity-50 group-hover:scale-110 transition-transform"></div>
        
        <div class="relative z-10">
            <div class="flex items-center gap-3 mb-4">
                <span class="flex h-3 w-3 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-xs font-bold text-emerald-600 uppercase tracking-wider">Status Akademik Semasa</span>
            </div>
            
            <div id="dashboardStatusContent">
                <h3 id="dashCurrentActivity" class="text-xl font-800 text-slate-800 mb-1">Memuatkan data...</h3>
                <p id="dashDateRange" class="text-sm text-slate-500 font-medium">Sila pastikan kalendar akademik telah dimuat naik.</p>
            </div>

            <div class="mt-6 flex items-center justify-between">
                <div class="flex -space-x-2">
                    <div class="h-8 w-8 rounded-full border-2 border-white bg-blue-100 flex items-center justify-center text-[10px] font-bold text-blue-600">UKM</div>
                    <div class="h-8 w-8 rounded-full border-2 border-white bg-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-600">25/26</div>
                </div>
                <button onclick="loadPage('semester.html', document.querySelector('button[onclick*=\'semester.html\']'))" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-2xl text-xs font-bold transition-all shadow-md active:scale-95">
                    Lihat Kalendar <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm group hover:border-blue-200 transition-all">
            <div class="h-10 w-10 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center mb-3">
                <i class="fas fa-book-open"></i>
            </div>
            <h4 id="dashExamCount" class="text-xl font-800 text-slate-800">0</h4>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Subjek Peperiksaan</p>
        </div>
        <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm group hover:border-blue-200 transition-all">
            <div class="h-10 w-10 bg-purple-50 text-purple-500 rounded-xl flex items-center justify-center mb-3">
                <i class="fas fa-folder-open"></i>
            </div>
            <h4 class="text-xl font-800 text-slate-800">KMJP</h4>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Drive Storage</p>
        </div>
    </div>

    <div class="space-y-3">
        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest px-2">Akses Pantas</h4>
        <div class="grid grid-cols-1 gap-3">
            <button onclick="window.open('https://smpl.ukm.my', '_blank')" 
                    class="flex items-center justify-between p-4 bg-white rounded-3xl border border-slate-100 hover:bg-blue-50 transition-colors group">
                <div class="flex items-center gap-4">
                    <div class="h-10 w-10 bg-slate-50 group-hover:bg-white rounded-xl flex items-center justify-center text-slate-500">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <span class="font-bold text-slate-700">SMPWeb UKM</span>
                </div>
                <i class="fas fa-external-link-alt text-slate-300 text-xs"></i>
            </button>
        </div>
    </div>
</div>

<script>
    function updateDashboardStats() {
        // 1. Ambil data Kalendar Akademik dari localStorage (diset oleh semester.html)
        const academicData = JSON.parse(localStorage.getItem('academic_calendar'));
        const now = new Date();
        
        if (academicData && academicData.length > 0) {
            let activeEvent = academicData.find(item => {
                const start = new Date(item.startDate);
                const end = new Date(item.endDate);
                return now >= start && now <= end;
            });

            if (!activeEvent) {
                // Cari event terdekat jika tiada yang aktif sekarang
                activeEvent = academicData.find(item => new Date(item.startDate) > now) || academicData[academicData.length-1];
            }

            document.getElementById('dashCurrentActivity').innerText = activeEvent.title;
            document.getElementById('dashDateRange').innerText = activeEvent.rawDate;
        }

        // 2. Ambil data Peperiksaan
        const exams = JSON.parse(localStorage.getItem('siswa_exams')) || [];
        document.getElementById('dashExamCount').innerText = exams.length;
    }

    // Jalankan fungsi kemas kini
    updateDashboardStats();
</script>
