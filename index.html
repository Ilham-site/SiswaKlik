<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik | Hub Akademik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .drawer-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button id="menuBtn" class="p-2 hover:bg-gray-100 rounded-lg text-gray-600">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">SiswaKlik</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div id="systemDate" class="hidden md:block text-sm font-semibold text-gray-500"></div>
            <img id="userAvatar" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border-2 border-blue-100 shadow-sm">
        </div>
    </nav>

    <div id="drawerOverlay" class="fixed inset-0 bg-black/50 hidden z-[60]"></div>
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white z-[70] transform -translate-x-full drawer-transition flex flex-col shadow-2xl">
        <div class="p-6 border-b flex justify-between items-center bg-blue-600 text-white">
            <span class="font-bold text-lg">Menu Navigasi</span>
            <button id="closeBtn"><i class="fas fa-times text-xl"></i></button>
        </div>
        <nav class="p-4 space-y-2 flex-1">
            <button onclick="loadPage('dashboard.html')" class="w-full flex items-center gap-3 p-4 hover:bg-blue-50 rounded-2xl text-gray-700 hover:text-blue-600 transition font-medium">
                <i class="fas fa-th-large"></i> Dashboard
            </button>
            <button onclick="loadPage('kalendar.html')" class="w-full flex items-center gap-3 p-4 hover:bg-blue-50 rounded-2xl text-gray-700 hover:text-blue-600 transition font-medium">
                <i class="fas fa-calendar-alt"></i> Kalendar Pintar
            </button>
            <button onclick="loadPage('fail.html')" class="w-full flex items-center gap-3 p-4 hover:bg-blue-50 rounded-2xl text-gray-700 hover:text-blue-600 transition font-medium">
                <i class="fas fa-folder-open"></i> Fail Peribadi
            </button>
        </nav>
        <div class="p-4 border-t">
            <button onclick="logout()" class="w-full flex items-center gap-3 p-4 text-red-500 hover:bg-red-50 rounded-2xl transition font-medium">
                <i class="fas fa-sign-out-alt"></i> Log Keluar
            </button>
        </div>
    </aside>

    <main id="app-root" class="p-6 max-w-7xl mx-auto"></main>

    <script>
        // Set Tarikh Sistem
        const updateDate = () => {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('systemDate').innerText = new Date().toLocaleDateString('ms-MY', options);
        };

        // Navigation Drawer Logic
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('drawerOverlay');

        const toggleSidebar = (show) => {
            sidebar.classList.toggle('-translate-x-full', !show);
            overlay.classList.toggle('hidden', !show);
        };

        menuBtn.onclick = () => toggleSidebar(true);
        closeBtn.onclick = () => toggleSidebar(false);
        overlay.onclick = () => toggleSidebar(false);

        // Bridge: Muat turun fail HTML secara dinamik
        async function loadPage(page) {
            try {
                const response = await fetch(page);
                const html = await response.text();
                document.getElementById('app-root').innerHTML = html;
                toggleSidebar(false);
                
                // Jalankan skrip dalam fail yang dimuatkan
                const scripts = document.getElementById('app-root').querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            } catch (err) {
                console.error("Gagal memuatkan halaman:", err);
            }
        }

        function logout() {
            localStorage.removeItem('siswaklik_token');
            localStorage.removeItem('siswaklik_user');
            window.location.href = 'login.html';
        }

        window.onload = () => {
            updateDate();
            const user = JSON.parse(localStorage.getItem('siswaklik_user'));
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('userAvatar').src = user.picture;
                loadPage('dashboard.html');
            }
        };
    </script>
</body>
</html>
