<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik | Hub Akademik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s; }
        .drawer-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        /* Style untuk butang aktif di sidebar */
        .nav-active { background-color: #eff6ff !important; color: #2563eb !important; font-weight: 800 !important; border-right: 4px solid #2563eb; }
        .nav-item:hover { transform: translateX(5px); background-color: #f8fafc; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="glass-nav border-b sticky top-0 z-[100] px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <button id="menuBtn" class="p-3 hover:bg-blue-50 rounded-2xl text-blue-600 transition-all border border-transparent hover:border-blue-100">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight">SiswaKlik</h1>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div id="systemDate" class="hidden md:block text-[10px] font-bold text-gray-400 uppercase tracking-widest"></div>
            <div class="h-8 w-[1px] bg-gray-200 mx-2 hidden md:block"></div>
            <div class="flex items-center gap-3">
                <span id="userNameTop" class="text-sm font-bold text-slate-700 hidden sm:block">Pelajar</span>
                <img id="userAvatar" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-2xl border-2 border-white shadow-md object-cover">
            </div>
        </div>
    </nav>

    <div id="drawerOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-[110] transition-opacity"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 bg-white z-[120] transform -translate-x-full drawer-transition flex flex-col shadow-2xl">
        <div class="p-8 border-b flex justify-between items-center bg-blue-600 text-white">
            <div>
                <p class="text-[10px] opacity-80 font-bold uppercase tracking-widest mb-1">SiswaKlik Hub</p>
                <h2 class="font-black text-xl">Navigasi Pintar</h2>
            </div>
            <button id="closeBtn" class="h-10 w-10 flex items-center justify-center rounded-xl hover:bg-white/20 transition-all">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <nav class="p-4 space-y-2 flex-1 mt-4 overflow-y-auto">
            <button onclick="loadPage('dashboard.html', this)" class="nav-item w-full flex items-center gap-4 p-4 rounded-2xl text-slate-600 transition-all font-semibold">
                <i class="fas fa-th-large w-5 text-center"></i> Dashboard Utama
            </button>
            <button onclick="loadPage('semester.html', this)" class="nav-item w-full flex items-center gap-4 p-4 rounded-2xl text-slate-600 transition-all font-semibold">
                <i class="fas fa-calendar-check w-5 text-center"></i> Status Akademik
            </button>
            <button onclick="loadPage('kmjp.html', this)" class="nav-item w-full flex items-center gap-4 p-4 rounded-2xl text-slate-600 transition-all font-semibold">
                <i class="fas fa-file-invoice w-5 text-center"></i> Jadual Peperiksaan (KMJP)
            </button>
            <button onclick="loadPage('fail.html', this)" class="nav-item w-full flex items-center gap-4 p-4 rounded-2xl text-slate-600 transition-all font-semibold">
                <i class="fas fa-folder-open w-5 text-center"></i> Fail Peribadi
            </button>
        </nav>

        <div class="p-6 border-t bg-slate-50">
            <button onclick="logout()" class="w-full flex items-center gap-4 p-4 text-red-500 hover:bg-red-50 rounded-2xl transition-all font-bold group">
                <i class="fas fa-sign-out-alt group-hover:-translate-x-1 transition-transform"></i> Log Keluar
            </button>
        </div>
    </aside>

    <main id="app-root" class="p-4 md:p-8 max-w-7xl mx-auto min-h-screen animate-fade">
        <div class="flex items-center justify-center h-96">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('drawerOverlay');

        function toggleSidebar(show) {
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        document.getElementById('menuBtn').onclick = () => toggleSidebar(true);
        document.getElementById('closeBtn').onclick = () => toggleSidebar(false);
        overlay.onclick = () => toggleSidebar(false);

        async function loadPage(page, element) {
            try {
                const appRoot = document.getElementById('app-root');
                appRoot.style.opacity = '0.4';
                
                const response = await fetch(page);
                if (!response.ok) throw new Error("Fail tidak dijumpai");
                
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Ambil isi kandungan body sahaja dari fail yang di-fetch
                const content = doc.body ? doc.body.innerHTML : html;
                appRoot.innerHTML = content;
                appRoot.style.opacity = '1';
                
                // Update Butang Aktif
                document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('nav-active'));
                if(element) {
                    element.classList.add('nav-active');
                } else {
                    const sideBtn = document.querySelector(`button[onclick*="${page}"]`);
                    if(sideBtn) sideBtn.classList.add('nav-active');
                }
                
                toggleSidebar(false); // Tutup menu selepas pilih
                
                // Jalankan script yang ada dalam fail yang dimuatkan
                const scripts = appRoot.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

                window.scrollTo(0, 0);
            } catch (err) {
                appRoot.innerHTML = `<div class="text-center py-20"><p class="text-red-500 font-bold">Ralat: Gagal memuatkan ${page}</p></div>`;
            }
        }

        function updateDate() {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('systemDate').innerText = new Date().toLocaleDateString('ms-MY', options);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        window.onload = () => {
            updateDate();
            // Ambil data user dari SiswaKlik login
            const user = JSON.parse(localStorage.getItem('siswaklik_user'));
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('userNameTop').innerText = user.name.split(' ')[0];
                document.getElementById('userAvatar').src = user.picture || 'https://via.placeholder.com/40';
                
                // Muat naik Dashboard sebagai halaman pertama
                loadPage('dashboard.html');
            }
        };
    </script>
</body>
</html>
