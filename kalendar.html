<div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-gray-800">Kalendar Akademik</h2>
        <button onclick="syncGoogleCalendar()" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-green-700 transition">
            <i class="fab fa-google mr-2"></i> Sync Google
        </button>
    </div>
    
    <div id='calendar'></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ms',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek'
            },
            events: JSON.parse(localStorage.getItem('userEvents')) || [],
            themeSystem: 'standard'
        });
        calendar.render();
    });

    function syncGoogleCalendar() {
        alert("Menghubungkan dengan Google Calendar API...");
        // Logik OAuth scopes: calendar.events.readonly
    }
</script>
