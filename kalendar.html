<div class="animate-fade-in space-y-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-gradient-to-r from-blue-600 to-indigo-700 p-8 rounded-[2.5rem] text-white shadow-xl">
        <div>
            <h2 id="welcomeGreeting" class="text-3xl font-bold mb-1">Rancang Hari Anda, Genius! 🌟</h2>
            <p class="opacity-90 font-medium">Urus masa dengan bijak untuk keberkatan ilmu.</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <button onclick="openEventModal()" class="bg-white/20 backdrop-blur-md border border-white/30 text-white px-6 py-3 rounded-2xl font-bold hover:bg-white/30 transition flex items-center">
                <i class="fas fa-plus-circle mr-2"></i> Tambah Aktiviti
            </button>
            <button onclick="syncGoogleCalendar()" class="bg-white text-blue-600 px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-50 transition flex items-center">
                <i class="fab fa-google mr-2"></i> Sync Google
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100">
            <div id="calendar" class="min-h-[600px]"></div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-gray-800">Waktu Solat</h3>
                    <select id="zonSolat" onchange="fetchWaktuSolat()" class="text-xs border-none bg-slate-100 rounded-lg p-1 font-bold text-blue-600">
                        <option value="SGR01">Gombak/Hulu Langat</option>
                        <option value="SGR02">Kajang/Sepang</option>
                        <option value="SWK01">Kuching</option>
                    </select>
                </div>
                <div id="solatDisplay" class="grid grid-cols-2 gap-3">
                    <div class="col-span-2 text-center py-4 text-slate-400 animate-pulse">Memuatkan waktu...</div>
                </div>
            </div>

            <div class="bg-indigo-50 p-6 rounded-[2.5rem] border border-indigo-100">
                <h3 class="font-bold text-indigo-900 mb-2">Tips Produktiviti</h3>
                <p class="text-sm text-indigo-700 leading-relaxed">
                    Gunakan teknik Pomodoro: 25 minit fokus, 5 minit rehat. Pastikan setiap tugasan ada deadline!
                </p>
            </div>
        </div>
    </div>
</div>

<div id="eventModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl">
        <h3 class="text-2xl font-black text-slate-800 mb-6">Aktiviti Baru</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-500 mb-2">Nama Aktiviti</label>
                <input type="text" id="eventTitle" class="w-full bg-slate-100 border-none rounded-2xl p-4 focus:ring-2 focus:ring-blue-500" placeholder="Contoh: Lab Report">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-500 mb-2">Tarikh</label>
                <input type="date" id="eventDate" class="w-full bg-slate-100 border-none rounded-2xl p-4 focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeEventModal()" class="flex-1 py-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-100 transition">Batal</button>
                <button onclick="saveEvent()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">Simpan</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    let calendar;
    const GOOGLE_CLIENT_ID = '755048052549-ldo2fp40r8bsk8n0f2gpsjuimdls5o1j.apps.googleusercontent.com';

    // 1. Inisialisasi Kalendar
    function initCalendar() {
        const calendarEl = document.getElementById('calendar');
        if (!calendarEl) return;

        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,listWeek'
            },
            themeSystem: 'standard',
            height: 'auto',
            locale: 'ms',
            events: JSON.parse(localStorage.getItem('siswaklik_events')) || [],
            eventClick: function(info) {
                Swal.fire({
                    title: info.event.title,
                    text: "Tarikh: " + info.event.startStr,
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'Padam Aktiviti',
                    cancelButtonText: 'Tutup'
                }).then((result) => {
                    if (result.isConfirmed) {
                        info.event.remove();
                        saveToLocal();
                    }
                });
            }
        });
        calendar.render();
    }

    // 2. Fungsi Modal & Simpan Event
    function openEventModal() {
        document.getElementById('eventModal').classList.remove('hidden');
    }

    function closeEventModal() {
        document.getElementById('eventModal').classList.add('hidden');
    }

    function saveEvent() {
        const title = document.getElementById('eventTitle').value;
        const date = document.getElementById('eventDate').value;

        if (title && date) {
            calendar.addEvent({
                title: title,
                start: date,
                allDay: true,
                backgroundColor: '#2563eb',
                borderColor: '#2563eb'
            });
            saveToLocal();
            closeEventModal();
            document.getElementById('eventTitle').value = '';
            Swal.fire('Berjaya!', 'Aktiviti telah ditambah.', 'success');
        } else {
            Swal.fire('Ralat', 'Sila isi semua maklumat.', 'warning');
        }
    }

    function saveToLocal() {
        const events = calendar.getEvents().map(e => ({
            title: e.title,
            start: e.startStr,
            allDay: e.allDay
        }));
        localStorage.setItem('siswaklik_events', JSON.stringify(events));
    }

    // 3. Waktu Solat API
    async function fetchWaktuSolat() {
        const zon = document.getElementById('zonSolat').value;
        const display = document.getElementById('solatDisplay');
        
        try {
            const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Kajang&country=Malaysia&method=11`);
            // Nota: Untuk ketepatan zon JAKIM, anda boleh guna API mpt.i906.my jika perlu.
            const data = await res.json();
            const times = data.data.timings;
            
            const solatList = [
                {label: 'Subuh', key: 'Fajr'},
                {label: 'Zohor', key: 'Dhuhr'},
                {label: 'Asar', key: 'Asr'},
                {label: 'Maghrib', key: 'Maghrib'},
                {label: 'Isyak', key: 'Isha'}
            ];

            display.innerHTML = solatList.map(s => `
                <div class="bg-slate-50 p-3 rounded-2xl text-center border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">${s.label}</p>
                    <p class="text-sm font-black text-blue-600">${times[s.key]}</p>
                </div>
            `).join('');
        } catch (err) {
            display.innerHTML = '<p class="col-span-2 text-red-500 text-xs">Gagal memuatkan data.</p>';
        }
    }

    // 4. Google Calendar Sync (Placeholder Integrasi)
    function syncGoogleCalendar() {
        Swal.fire({
            title: 'Google Sync',
            text: 'Adakah anda ingin menyelaraskan kalendar dengan akaun Google?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Ya, Sambungkan'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire('Info', 'Integrasi API Google sedang disambungkan menggunakan Client ID anda.', 'info');
                // Logik gapi.client.calendar di sini
            }
        });
    }

    // Jalankan bila page dimuatkan
    setTimeout(() => {
        initCalendar();
        fetchWaktuSolat();
    }, 100);

</script>

<style>
    /* Custom Styling untuk FullCalendar supaya ikut tema SiswaKlik */
    .fc { --fc-border-color: #f1f5f9; font-family: inherit; }
    .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 800; color: #1e293b; }
    .fc .fc-button-primary { background-color: #ffffff; border-color: #e2e8f0; color: #64748b; font-weight: bold; border-radius: 12px; text-transform: capitalize; }
    .fc .fc-button-primary:hover { background-color: #f8fafc; border-color: #cbd5e1; color: #1e293b; }
    .fc .fc-button-active { background-color: #2563eb !important; border-color: #2563eb !important; color: white !important; }
    .fc th { padding: 12px 0 !important; font-weight: 700; color: #94a3b8; text-transform: uppercase; font-size: 0.75rem; }
    .fc-daygrid-day:hover { background-color: #f8fafc; cursor: pointer; }
    .fc-event { border-radius: 8px; padding: 2px 6px; font-weight: 600; border: none; }
</style>
