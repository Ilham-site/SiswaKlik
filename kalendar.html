<div class="animate-fade-in space-y-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-gradient-to-r from-blue-600 to-indigo-700 p-8 rounded-[2.5rem] text-white shadow-xl">
        <div>
            <h2 id="welcomeGreeting" class="text-3xl font-bold mb-1">Rancang Hari Anda, Genius! 🌟</h2>
            <p class="opacity-90 font-medium">Urus masa dengan bijak untuk keberkatan ilmu.</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <button onclick="openEventModal()" class="bg-white/20 backdrop-blur-md border border-white/30 text-white px-6 py-3 rounded-2xl font-bold hover:bg-white/30 transition flex items-center">
                <i class="fas fa-plus-circle mr-2"></i> Tambah Aktiviti
            </button>
            <button onclick="syncGoogleCalendar()" class="bg-white text-blue-600 px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-50 transition flex items-center">
                <i class="fab fa-google mr-2"></i> Sync Google
            </button>
        </div>
    </div>

    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 transition-all duration-300">
        <div id='calendar' class="min-h-[600px]"></div>
    </div>

    <div class="bg-blue-50 p-6 rounded-[2rem] border border-blue-100">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-3 rounded-xl text-white">
                    <i class="fas fa-mosque"></i>
                </div>
                <div>
                    <h4 class="font-bold text-gray-800">Waktu Solat & GPS</h4>
                    <p class="text-sm text-gray-500">Kesan lokasi automatik untuk waktu solat tepat.</p>
                </div>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="prayerToggle" class="sr-only peer" onchange="togglePrayerTimes()">
                <div class="w-14 h-7 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-blue-600"></div>
            </label>
        </div>
        <div id="prayerDisplay" class="hidden mt-6 grid grid-cols-2 md:grid-cols-6 gap-4 animate-slide-up"></div>
    </div>
</div>

<div id="eventModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden animate-zoom-in">
        <div class="p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-800">Tambah Aktiviti Baru</h3>
                <button onclick="closeEventModal()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
            
            <form id="eventForm" class="space-y-4 text-left">
                <input type="text" id="eventTitle" placeholder="Tajuk Aktiviti (cth: Lab Test)" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 text-gray-800" required>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 ml-2 uppercase">Mula</label>
                        <input type="datetime-local" id="startTime" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 text-gray-800">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 ml-2 uppercase">Tamat</label>
                        <input type="datetime-local" id="endTime" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 text-gray-800">
                    </div>
                </div>

                <textarea id="eventDesc" placeholder="Keterangan aktiviti..." class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 h-24 text-gray-800"></textarea>

                <div>
                    <label class="text-xs font-bold text-gray-400 ml-2 uppercase mb-3 block">Pilihan Warna Tema</label>
                    <div id="colorPicker" class="flex gap-3 px-2">
                        <div class="color-dot w-9 h-9 rounded-full bg-[#ef4444] cursor-pointer ring-offset-2 transition hover:scale-110" onclick="selectColor('#ef4444', this)"></div>
                        <div class="color-dot w-9 h-9 rounded-full bg-[#f97316] cursor-pointer ring-offset-2 transition hover:scale-110" onclick="selectColor('#f97316', this)"></div>
                        <div class="color-dot w-9 h-9 rounded-full bg-[#facd15] cursor-pointer ring-offset-2 transition hover:scale-110" onclick="selectColor('#facd15', this)"></div>
                        <div class="color-dot w-9 h-9 rounded-full bg-[#22c55e] cursor-pointer ring-offset-2 transition hover:scale-110" onclick="selectColor('#22c55e', this)"></div>
                        <div class="color-dot w-9 h-9 rounded-full bg-[#3b82f6] cursor-pointer ring-offset-2 transition hover:scale-110 ring-2 ring-blue-500" onclick="selectColor('#3b82f6', this)"></div>
                        <div class="color-dot w-9 h-9 rounded-full bg-[#4f46e5] cursor-pointer ring-offset-2 transition hover:scale-110" onclick="selectColor('#4f46e5', this)"></div>
                        <div class="color-dot w-9 h-9 rounded-full bg-[#9333ea] cursor-pointer ring-offset-2 transition hover:scale-110" onclick="selectColor('#9333ea', this)"></div>
                    </div>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="document.getElementById('fileUpload').click()" class="flex-1 bg-gray-100 p-4 rounded-2xl font-bold text-gray-600 hover:bg-gray-200 transition">
                        <i class="fas fa-paperclip mr-2"></i> Fail
                    </button>
                    <input type="file" id="fileUpload" class="hidden">
                    <button type="submit" class="flex-[2] bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">Simpan Aktiviti</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* FullCalendar Styling - Bright Theme */
    .fc { --fc-border-color: #f1f5f9; font-family: inherit; background: white; border-radius: 1.5rem; overflow: hidden; }
    .fc-theme-standard td, .fc-theme-standard th { border: 1px solid #f1f5f9; }
    .fc .fc-toolbar-title { font-size: 1.5rem !important; font-weight: 800; color: #1e293b; }
    .fc .fc-button-primary { background-color: #3b82f6 !important; border: none !important; border-radius: 12px !important; font-weight: bold; padding: 0.6rem 1.2rem !important; }
    .fc .fc-button-primary:hover { background-color: #2563eb !important; }
    .fc-day-today { background: #eff6ff !important; }
    .fc-daygrid-day-number { color: #475569; font-weight: 600; padding: 8px !important; }
    .fc-col-header-cell-cushion { color: #64748b; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; padding: 12px 0 !important; }
    
    .fc-daygrid-day-top { flex-direction: row-reverse !important; justify-content: space-between !important; }
    .hijri-date { font-size: 0.75rem; color: #94a3b8; font-weight: 600; padding: 8px; }
    
    @keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-up { animation: slide-up 0.4s ease-out; }
    @keyframes zoom-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-zoom-in { animation: zoom-in 0.3s ease-out; }
</style>

<script>
    var calendar;
    let selectedColorCode = '#3b82f6'; // Default warna biru

    document.addEventListener('DOMContentLoaded', function() {
        const userData = JSON.parse(localStorage.getItem('siswaklik_user'));
        if (userData && (userData.name || userData.given_name)) {
            const displayName = userData.given_name || userData.name.split(' ')[0];
            document.getElementById('welcomeGreeting').innerText = `Rancang Hari Anda, ${displayName}! 🌟`;
        }

        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ms',
            height: 'auto',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek'
            },
            dayCellDidMount: function(arg) {
                let hijri = new Intl.DateTimeFormat('ms-MY-u-ca-islamic-uma', {day:'numeric', month:'short'}).format(arg.date);
                let container = arg.el.querySelector('.fc-daygrid-day-top');
                if (container) {
                    let span = document.createElement('span');
                    span.className = 'hijri-date';
                    span.innerText = hijri;
                    container.prepend(span);
                }
            },
            events: JSON.parse(localStorage.getItem('userEvents')) || [],
            eventClick: function(info) {
                alert("Aktiviti: " + info.event.title + (info.event.extendedProps.description ? ("\nNota: " + info.event.extendedProps.description) : ""));
            }
        });
        calendar.render();

        document.getElementById('eventForm').onsubmit = function(e) {
            e.preventDefault();
            saveEvent();
        };
    });

    function selectColor(color, element) {
        selectedColorCode = color;
        // Reset semua dot (buang ring biru)
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.classList.remove('ring-2', 'ring-blue-500', 'scale-110');
        });
        // Highlight dot yang dipilih
        element.classList.add('ring-2', 'ring-blue-500', 'scale-110');
    }

    function saveEvent() {
        const title = document.getElementById('eventTitle').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const description = document.getElementById('eventDesc').value;

        if(title && start) {
            const newEvent = { 
                title: title, 
                start: start, 
                end: end, 
                color: selectedColorCode, 
                extendedProps: { description: description } 
            };
            
            calendar.addEvent(newEvent);
            
            let events = JSON.parse(localStorage.getItem('userEvents')) || [];
            events.push(newEvent);
            localStorage.setItem('userEvents', JSON.stringify(events));
            
            closeEventModal();
            document.getElementById('eventForm').reset();
            // Reset color selection to default
            selectColor('#3b82f6', document.querySelectorAll('.color-dot')[4]);
        }
    }

    function openEventModal() { document.getElementById('eventModal').classList.remove('hidden'); }
    function closeEventModal() { document.getElementById('eventModal').classList.add('hidden'); }

    async function togglePrayerTimes() {
        const display = document.getElementById('prayerDisplay');
        const isChecked = document.getElementById('prayerToggle').checked;
        
        if(isChecked) {
            display.classList.remove('hidden');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    try {
                        const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&method=11`);
                        const data = await res.json();
                        const times = data.data.timings;
                        
                        display.innerHTML = '';
                        const solat = [
                            {label: 'Subuh', key: 'Fajr'},
                            {label: 'Syuruk', key: 'Sunrise'},
                            {label: 'Zohor', key: 'Dhuhr'},
                            {label: 'Asar', key: 'Asr'},
                            {label: 'Maghrib', key: 'Maghrib'},
                            {label: 'Isyak', key: 'Isha'}
                        ];
                        
                        solat.forEach(s => {
                            display.innerHTML += `
                                <div class="bg-white p-4 rounded-2xl text-center shadow-sm border border-blue-50">
                                    <p class="text-xs font-bold text-gray-400 uppercase">${s.label}</p>
                                    <p class="text-lg font-bold text-blue-600">${times[s.key]}</p>
                                </div>
                            `;
                        });
                    } catch (err) {
                        alert("Gagal menarik waktu solat. Sila cuba lagi.");
                    }
                });
            }
        } else {
            display.classList.add('hidden');
        }
    }

    function syncGoogleCalendar() {
        alert("Integrasi Google Calendar sedang dalam pembangunan. Pastikan API Key anda telah dikonfigurasi.");
    }
</script>
