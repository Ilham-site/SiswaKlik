<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik - KMJP Drive Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .exam-card:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .blue-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }

        #exam-list-container::-webkit-scrollbar { width: 5px; }
        #exam-list-container::-webkit-scrollbar-track { background: transparent; }
        #exam-list-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6 max-w-4xl mx-auto w-full">

    <div class="blue-gradient rounded-[2.5rem] p-6 md:p-8 text-white shadow-2xl shadow-blue-200/50 mb-6 relative overflow-hidden shrink-0">
        <div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <div class="inline-block p-2 bg-white/20 rounded-xl mb-3 backdrop-blur-md">
                    <i class="fas fa-cloud-upload-alt text-xl"></i>
                </div>
                <h1 class="text-xl md:text-2xl font-extrabold tracking-tight">Kad Masuk dan Jadual Peperiksaan</h1>
                <p class="text-blue-100/80 text-xs mt-1 font-medium">Muat Naik KMJP Anda di Sini</p>
            </div>
            
            <div class="flex flex-col items-center">
                <input type="file" id="pdfInput" class="hidden" accept=".pdf" onchange="handleKMJPUpload(this)">
                <button onclick="document.getElementById('pdfInput').click()" 
                        class="bg-white text-blue-700 px-6 py-3 rounded-2xl font-bold hover:bg-blue-50 transition-all shadow-lg flex items-center gap-2 text-sm group">
                    <i class="fas fa-file-pdf group-hover:scale-110 transition-transform"></i> 
                    Muat Naik PDF
                </button>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-center mb-4 px-4 shrink-0">
        <div>
            <h2 class="text-lg font-extrabold text-slate-800">Senarai Kursus</h2>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Sudahkah anda belajar hari ini?</p>
        </div>
        <div id="exam-count-badge" class="hidden">
            <span id="exam-count" class="bg-slate-800 text-white text-[10px] font-bold px-3 py-1 rounded-full">
                -- SUBJEK
            </span>
        </div>
    </div>

    <div id="exam-list-container" class="flex-1 overflow-y-auto px-2 pb-6">
        <div id="exam-list" class="grid gap-4">
            <div class="animate-pulse space-y-4">
                <div class="h-20 bg-slate-200 rounded-[1.5rem]"></div>
                <div class="h-20 bg-slate-200 rounded-[1.5rem]"></div>
                <div class="h-20 bg-slate-200 rounded-[1.5rem]"></div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        const ACCESS_TOKEN = localStorage.getItem('siswaklik_access_token');
        const PARENT_FOLDER_ID = localStorage.getItem('siswaklik_drive_folder_id');
        const SPREADSHEET_NAME = "SiswaKlik Time Management";

        async function getFileId(name, mimeType, parentId = PARENT_FOLDER_ID) {
            const q = encodeURIComponent(`name='${name}' and '${parentId}' in parents and mimeType='${mimeType}' and trashed=false`);
            try {
                const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}`, {
                    headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
                });
                const data = await res.json();
                return data.files.length > 0 ? data.files[0].id : null;
            } catch (e) { return null; }
        }

        // FUNGSI BARU: Memastikan Sheet3 wujud
        async function ensureSheet3Exists(spreadsheetId) {
            const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}`, {
                headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
            });
            const ssMetadata = await res.json();
            const sheetExists = ssMetadata.sheets.some(s => s.properties.title === 'Sheet3');

            if (!sheetExists) {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        requests: [{
                            addSheet: { properties: { title: 'Sheet3' } }
                        }]
                    })
                });
            }
        }

        async function handleKMJPUpload(input) {
            const file = input.files[0];
            if(!file || !ACCESS_TOKEN) return;
            
            Swal.fire({ 
                title: 'Memproses PDF...', 
                html: '<span class="text-xs">Sila tunggu sebentar.</span>',
                showConfirmButton: false,
                didOpen: () => Swal.showLoading() 
            });

            try {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let text = "";
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(" ") + "\n";
                    }
                    
                    const extractedData = parseKMJP(text);
                    if(extractedData.length > 0) {
                        await updateSiswaKlikSheet(extractedData);
                    } else {
                        Swal.fire('Ralat', 'Tiada data ditemui.', 'warning');
                    }
                };
                reader.readAsArrayBuffer(file);
            } catch(e) { 
                Swal.fire('Ralat', 'Gagal memproses fail.', 'error'); 
            }
        }

        function parseKMJP(text) {
            const cleanText = text.replace(/\s+/g, ' ');
            const pattern = /([A-Z]{4}\d{4})\s+(\d+)\s+(.*?)\s+(\d{2}\/\d{2}\/\d{4}|-|Penilaian\sBerterusan)\s*(\d{2}:\d{2}|-|)\s*(\d+[:\d]*\s*j?|-|)\s*(DEWAN\s\(.*?\)|DGEMILANG|DT\s[A-Z\s]+|DEWAN\s[A-Z]+|DEWAN\sPEP[A-Z0-9\s]+|Penilaian\sBerterusan|-|)\s*(\d+|-|)/gi;
            
            const rows = [];
            let m;
            while ((m = pattern.exec(cleanText)) !== null) {
                rows.push([m[1], m[2], m[3].trim(), m[4], m[5], m[6].trim(), m[7].trim(), m[8]]);
            }
            return rows;
        }

        async function updateSiswaKlikSheet(dataRows) {
            try {
                let ssId = await getFileId(SPREADSHEET_NAME, 'application/vnd.google-apps.spreadsheet');
                if (!ssId) {
                    Swal.fire('Fail Tidak Ditemui', 'Sila pastikan fail Spreadsheet wujud.', 'error');
                    return;
                }

                // Jalankan semakan Sheet3 sebelum tulis data
                await ensureSheet3Exists(ssId);

                // Clear data lama
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values/Sheet3!A2:H100:clear`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
                });

                // Masukkan data baru
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values/Sheet3!A2?valueInputOption=RAW`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: dataRows })
                });

                Swal.close();
                renderExamsFromSheet();

            } catch (err) {
                Swal.fire('Ralat Cloud', 'Gagal menyambung ke Drive', 'error');
            }
        }

        async function renderExamsFromSheet() {
            const container = document.getElementById('exam-list');
            const countSpan = document.getElementById('exam-count');
            const badge = document.getElementById('exam-count-badge');

            try {
                let ssId = await getFileId(SPREADSHEET_NAME, 'application/vnd.google-apps.spreadsheet');
                if(!ssId) return;

                const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values/Sheet3!A2:H30`, {
                    headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
                });
                
                // Jika Sheet3 belum ada masa render awal, abaikan ralat dan tunjuk empty state
                if (res.status === 400) {
                     container.innerHTML = `<div class="text-center py-12 bg-white rounded-[2rem] border border-slate-200 text-slate-400 font-medium">Tiada data aktif (Sheet3 tidak ditemui).</div>`;
                     return;
                }

                const data = await res.json();
                const exams = data.values || [];

                badge.classList.remove('hidden');
                countSpan.innerText = `${exams.length} KURSUS`;

                if(exams.length === 0) {
                    container.innerHTML = `<div class="text-center py-12 bg-white rounded-[2rem] border border-slate-200 text-slate-400 font-medium">Tiada data aktif.</div>`;
                    return;
                }

                container.innerHTML = exams.map(ex => {
                    const isPB = !ex[3] || ex[3] === '-' || ex[3].toLowerCase().includes('penilaian');
                    let dateDisplay = "PB";
                    let monthDisplay = "N/A";
                    let dayDisplay = "-";

                    if (!isPB) {
                        const dateParts = ex[3].split('/');
                        const dateObj = new Date(`${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`);
                        monthDisplay = dateObj.toLocaleString('ms-MY', {month: 'short'});
                        dayDisplay = dateObj.getDate();
                        dateDisplay = ""; 
                    }

                    return `
                    <div class="glass-card p-4 rounded-[1.5rem] flex items-center justify-between gap-4 exam-card transition-all duration-300">
                        <div class="flex items-center gap-4 w-full">
                            <div class="h-14 w-14 min-w-[56px] ${isPB ? 'bg-amber-50 text-amber-600 border-amber-100' : 'bg-blue-50 text-blue-600 border-blue-100'} rounded-2xl flex flex-col items-center justify-center border shadow-inner">
                                <span class="text-[9px] uppercase font-bold tracking-wider">${isPB ? 'STATUS' : monthDisplay}</span>
                                <span class="${isPB ? 'text-sm' : 'text-xl'} font-extrabold leading-none">${isPB ? 'PB' : dayDisplay}</span>
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <div class="flex items-center gap-2 mb-0.5">
                                    <h4 class="font-bold text-slate-800 text-sm truncate">${ex[0]}</h4>
                                    <span class="text-[8px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-500 font-bold">SET ${ex[1]}</span>
                                </div>
                                <p class="text-[10px] text-slate-500 font-semibold truncate mb-1 uppercase">${ex[2]}</p>
                                <div class="flex flex-wrap gap-x-3 gap-y-1 text-[9px] font-bold text-slate-400 uppercase">
                                    <span class="flex items-center gap-1"><i class="fas fa-clock text-blue-400"></i> ${isPB ? '-' : ex[4]}</span>
                                    <span class="flex items-center gap-1"><i class="fas fa-map-marker-alt text-rose-400"></i> ${isPB ? 'Penilaian Berterusan' : ex[6]} </span>
                                    ${!isPB ? `<span class="flex items-center gap-1"><i class="fas fa-chair text-amber-400"></i> NO: ${ex[7]}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `}).join('');

            } catch (err) {
                container.innerHTML = `<div class="text-center py-6 text-rose-500 text-xs font-bold bg-rose-50 rounded-xl">Gagal memuatkan data cloud.</div>`;
            }
        }

        window.onload = () => {
            if(!ACCESS_TOKEN) {
                window.location.href = 'login.html';
            } else {
                renderExamsFromSheet();
            }
        };
    </script>
</body>
</html>
