<div class="max-w-4xl mx-auto space-y-8 animate-in">
    <div class="flex items-center gap-4">
        <button onclick="loadPage('dashboard.html')" class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-50">
            <i class="fas fa-chevron-left text-slate-400"></i>
        </button>
        <h2 class="text-2xl font-black text-slate-800">Ekstrak Jadual KMJP</h2>
    </div>

    <div class="bg-gradient-to-br from-blue-700 to-indigo-800 rounded-[2.5rem] p-8 text-white shadow-xl">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <h3 class="text-xl font-bold">Muat Naik KMJP</h3>
                <p class="text-blue-100 text-sm mt-2">Sistem akan mengekstrak subjek, tarikh, masa dan tempat peperiksaan secara automatik.</p>
            </div>
            <input type="file" id="pdfInputKMJP" class="hidden" accept=".pdf" onchange="handleKMJPUpload(this)">
            <button onclick="document.getElementById('pdfInputKMJP').click()" class="bg-white text-blue-700 px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-all shadow-lg shrink-0">
                <i class="fas fa-file-pdf mr-2"></i> Pilih Fail PDF
            </button>
        </div>
    </div>

    <section>
        <div class="flex justify-between items-center mb-6 px-2">
            <h3 class="font-bold text-slate-800">Senarai Peperiksaan Aktif</h3>
            <span id="exam-count" class="text-xs font-bold bg-blue-100 text-blue-600 px-3 py-1 rounded-full">0 Subjek</span>
        </div>
        <div id="exam-list" class="space-y-4">
            </div>
    </section>
</div>

<script>
    (function() {
        window.handleKMJPUpload = async function(input) {
            const file = input.files[0];
            if(!file) return;
            Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading() });

            try {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let text = "";
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(" ") + "\n";
                    }
                    processKMJPText(text);
                };
                reader.readAsArrayBuffer(file);
            } catch(e) { Swal.fire('Ralat', 'Gagal memproses fail', 'error'); }
        };

        function processKMJPText(text) {
            const cleanText = text.replace(/\s+/g, ' ');
            const pattern = /([A-Z]{4}\d{4})\s+(.*?)\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+.*?(DEWAN\s\(.*?\)|DGEMILANG|DT\s[A-Z\s]+|DEWAN\s[A-Z]+|DEWAN\sPEP[A-Z0-9\s]+)/gi;
            const found = [];
            let m;
            while ((m = pattern.exec(cleanText)) !== null) {
                if (m[2].includes("Penilaian Berterusan")) continue;
                found.push({
                    id: 'ex-'+Math.random().toString(36).substr(2,7),
                    code: m[1], title: m[2].trim(),
                    date: m[3].split('/').reverse().join('-'),
                    time: m[4], location: m[5].trim()
                });
            }
            localStorage.setItem('siswa_exams', JSON.stringify(found));
            renderExamsList();
            Swal.fire('Berjaya!', 'Jadual dikemaskini.', 'success');
        }

        window.renderExamsList = function() {
            const exams = JSON.parse(localStorage.getItem('siswa_exams')) || [];
            const container = document.getElementById('exam-list');
            document.getElementById('exam-count').innerText = `${exams.length} Subjek`;
            
            if(exams.length === 0) {
                container.innerHTML = `<div class="text-center py-20 bg-white rounded-[2.5rem] border border-dashed border-slate-200 text-slate-400">Tiada data peperiksaan.</div>`;
                return;
            }

            container.innerHTML = exams.map(ex => `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-5">
                        <div class="h-14 w-14 bg-blue-50 text-blue-600 rounded-2xl flex flex-col items-center justify-center border border-blue-100 font-black shrink-0">
                            <span class="text-[9px] uppercase">${new Date(ex.date).toLocaleString('ms-MY', {month: 'short'})}</span>
                            <span class="text-xl">${new Date(ex.date).getDate()}</span>
                        </div>
                        <div>
                            <h4 class="font-black text-slate-800 uppercase text-sm md:text-base">${ex.code} - ${ex.title}</h4>
                            <div class="flex flex-wrap gap-x-4 gap-y-1 text-[10px] font-bold text-slate-500 mt-2 uppercase tracking-wide">
                                <span><i class="fas fa-clock text-blue-400 mr-1"></i> ${ex.time}</span>
                                <span><i class="fas fa-map-marker-alt text-rose-400 mr-1"></i> ${ex.location}</span>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        };

        renderExamsList();
    })();
</script>
