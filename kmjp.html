<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik - KMJP Drive Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 p-6 lg:p-10">

<div class="max-w-4xl mx-auto space-y-8 animate-in slide-in-from-bottom-4 duration-500">
    <div class="flex items-center gap-4">
        <a href="index.html" class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-50">
            <i class="fas fa-chevron-left text-slate-400"></i>
        </a>
        <h2 class="text-2xl font-black text-slate-800">Ekstrak Jadual KMJP</h2>
    </div>

    <div class="bg-gradient-to-br from-blue-700 to-indigo-800 rounded-[2.5rem] p-8 text-white shadow-xl">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <h3 class="text-xl font-bold">Simpan KMJP ke Cloud</h3>
                <p class="text-blue-100 text-sm mt-2">Fail akan disimpan di Drive & data diekstrak ke Google Sheets.</p>
            </div>
            <input type="file" id="pdfInput" class="hidden" accept=".pdf" onchange="handleKMJPUpload(this)">
            <button onclick="document.getElementById('pdfInput').click()" class="bg-white text-blue-700 px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-all shadow-lg shrink-0">
                <i class="fas fa-cloud-upload-alt mr-2"></i> Muat Naik KMJP
            </button>
        </div>
    </div>

    <section>
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-slate-800">Senarai Peperiksaan Aktif</h3>
            <span id="exam-count" class="text-xs font-bold bg-blue-100 text-blue-600 px-3 py-1 rounded-full">Memuatkan...</span>
        </div>
        <div id="exam-list" class="space-y-4"></div>
    </section>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    
    const SPREADSHEET_NAME = "SiswaKlik Time Management";
    const SHEET_NAME = "Sheet3";

    // Fungsi mendapatkan Access Token & Folder ID
    function getAuthData() {
        return {
            token: localStorage.getItem('siswaklik_access_token'),
            folderId: localStorage.getItem('siswaklik_drive_folder_id')
        };
    }

    // 1. Cari atau Cipta Folder 'KMJP' dalam SiswaKlik
    async function getKMJPFolderId() {
        const { token, folderId } = getAuthData();
        const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='KMJP' and '${folderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.files && data.files.length > 0) return data.files[0].id;

        const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: 'KMJP', mimeType: 'application/vnd.google-apps.folder', parents: [folderId] })
        });
        const newFolder = await createRes.json();
        return newFolder.id;
    }

    // 2. Cari ID Spreadsheet "SiswaKlik Time Management"
    async function getSpreadsheetId() {
        const { token, folderId } = getAuthData();
        const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${SPREADSHEET_NAME}' and '${folderId}' in parents and trashed=false`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        return data.files && data.files.length > 0 ? data.files[0].id : null;
    }

    // 3. Proses Muat Naik & Ekstrak
    async function handleKMJPUpload(input) {
        const file = input.files[0];
        if(!file) return;
        
        const { token } = getAuthData();
        if(!token) {
            Swal.fire('Sesi Tamat', 'Sila log masuk semula.', 'error');
            return;
        }

        Swal.fire({ title: 'Memproses KMJP...', html: 'Mengupload fail dan mengemaskini Sheets.', didOpen: () => Swal.showLoading() });

        try {
            const kmjpFolderId = await getKMJPFolderId();
            const ssId = await getSpreadsheetId();

            if(!ssId) throw new Error("Spreadsheet 'SiswaKlik Time Management' tidak dijumpai.");

            // A. Upload PDF ke Drive
            const metadata = { name: `KMJP_${new Date().toLocaleDateString()}.pdf`, parents: [kmjpFolderId] };
            const formData = new FormData();
            formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            formData.append('file', file);

            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });

            // B. Ekstrak Teks PDF
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(item => item.str).join(" ") + "\n";
                }
                saveDataToSheets(ssId, text);
            };
            reader.readAsArrayBuffer(file);

        } catch(e) { 
            console.error(e);
            Swal.fire('Ralat', e.message || 'Gagal memproses fail', 'error'); 
        }
    }

    // 4. Regex & Simpan ke Sheets
    async function saveDataToSheets(ssId, text) {
        const { token } = getAuthData();
        const cleanText = text.replace(/\s+/g, ' ');
        // Regex mengikut format KMJP UKM
        const pattern = /([A-Z]{4}\d{4})\s+(.*?)\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+(\d+:\d+)\s+(DEWAN\s\(.*?\)|DGEMILANG|DT\s[A-Z\s]+|DEWAN\s[A-Z]+|DEWAN\sPEP[A-Z0-9\s]+)\s+(\d+)/gi;
        
        const rows = [];
        let m;
        while ((m = pattern.exec(cleanText)) !== null) {
            // Urutan: KOD, SET, TAJUK, TARIKH, MASA, TEMPOH, TEMPAT, MEJA
            // Nota: Susunan m[index] bergantung pada ketepatan regex terhadap text
            rows.push([m[1], "N/A", m[2].trim(), m[3], m[4], m[5], m[6].trim(), m[7]]);
        }

        try {
            // Padam data lama dalam Sheet3 (Clear range A2:H100)
            await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values/${SHEET_NAME}!A2:H100:clear`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            // Masukkan data baru
            await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values/${SHEET_NAME}!A2:append?valueInputOption=USER_ENTERED`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ values: rows })
            });

            Swal.fire('Berjaya!', 'Data telah dikemaskini dalam Google Sheets.', 'success');
            renderExams(); // Refresh paparan

        } catch (err) {
            Swal.fire('Ralat Sheets', 'Gagal menyimpan data ke spreadsheet.', 'error');
        }
    }

    // 5. Paparkan Data daripada Google Sheets
    async function renderExams() {
        const { token } = getAuthData();
        const container = document.getElementById('exam-list');
        const countSpan = document.getElementById('exam-count');
        
        const ssId = await getSpreadsheetId();
        if(!ssId || !token) {
            container.innerHTML = `<div class="text-center py-20 bg-white rounded-[2.5rem] border border-dashed border-slate-200 text-slate-400">Sila muat naik KMJP untuk melihat jadual.</div>`;
            countSpan.innerText = "0 Subjek";
            return;
        }

        try {
            const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values/${SHEET_NAME}!A2:H`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const exams = data.values || [];

            countSpan.innerText = `${exams.length} Subjek`;

            if(exams.length === 0) {
                container.innerHTML = `<div class="text-center py-20 bg-white rounded-[2.5rem] border border-dashed border-slate-200 text-slate-400">Tiada peperiksaan ditemui dalam fail.</div>`;
                return;
            }

            container.innerHTML = exams.map(ex => {
                // ex[0]=Kod, ex[2]=Tajuk, ex[3]=Tarikh, ex[4]=Masa, ex[6]=Tempat
                const dateParts = ex[3].split('/');
                const dateObj = new Date(`${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`);
                
                return `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex items-center justify-between group shadow-sm">
                    <div class="flex items-center gap-5">
                        <div class="h-14 w-14 bg-blue-50 text-blue-600 rounded-2xl flex flex-col items-center justify-center border border-blue-100 font-black">
                            <span class="text-[9px] uppercase">${dateObj.toLocaleString('ms-MY', {month: 'short'})}</span>
                            <span class="text-xl">${dateObj.getDate()}</span>
                        </div>
                        <div>
                            <h4 class="font-black text-slate-800 uppercase">${ex[0]}</h4>
                            <p class="text-xs text-slate-400 font-bold mb-1">${ex[2]}</p>
                            <div class="flex gap-4 text-[10px] font-bold text-slate-500 uppercase">
                                <span><i class="fas fa-clock text-blue-400 mr-1"></i> ${ex[4]}</span>
                                <span><i class="fas fa-map-marker-alt text-rose-400 mr-1"></i> ${ex[6]}</span>
                                <span><i class="fas fa-chair text-amber-400 mr-1"></i> MEJA ${ex[7]}</span>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

        } catch (err) {
            container.innerHTML = `<div class="text-center py-10 text-red-400">Gagal menarik data dari Sheets.</div>`;
        }
    }

    window.onload = renderExams;
</script>
</body>
</html>
