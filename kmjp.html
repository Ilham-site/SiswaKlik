<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik - KMJP Drive Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 p-6 lg:p-10">

<div class="max-w-4xl mx-auto space-y-8 animate-in slide-in-from-bottom-4 duration-500">
    <div class="flex items-center gap-4">
        <a href="index.html" class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-50">
            <i class="fas fa-chevron-left text-slate-400"></i>
        </a>
        <h2 class="text-2xl font-black text-slate-800">Ekstrak Jadual KMJP</h2>
    </div>

    <div class="bg-gradient-to-br from-blue-700 to-indigo-800 rounded-[2.5rem] p-8 text-white shadow-xl">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <h3 class="text-xl font-bold">Simpan KMJP ke Cloud</h3>
                <p class="text-blue-100 text-sm mt-2">Data akan disimpan secara automatik dalam Spreadsheet SiswaKlik.</p>
            </div>
            <input type="file" id="pdfInput" class="hidden" accept=".pdf" onchange="handleKMJPUpload(this)">
            <button onclick="document.getElementById('pdfInput').click()" class="bg-white text-blue-700 px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-all shadow-lg shrink-0">
                <i class="fas fa-cloud-upload-alt mr-2"></i> Muat Naik KMJP
            </button>
        </div>
    </div>

    <section>
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-slate-800">Senarai Peperiksaan Aktif</h3>
            <span id="exam-count" class="text-xs font-bold bg-blue-100 text-blue-600 px-3 py-1 rounded-full">Memuatkan...</span>
        </div>
        <div id="exam-list" class="space-y-4"></div>
    </section>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    
    // Konfigurasi Global
    const ACCESS_TOKEN = localStorage.getItem('siswaklik_access_token');
    const PARENT_FOLDER_ID = localStorage.getItem('siswaklik_drive_folder_id');
    const SPREADSHEET_NAME = "SiswaKlik Time Management";

    // 1. Dapatkan atau Cipta Folder/Sheet
    async function getFileId(name, mimeType, parentId = PARENT_FOLDER_ID) {
        const q = encodeURIComponent(`name='${name}' and '${parentId}' in parents and mimeType='${mimeType}' and trashed=false`);
        const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}`, {
            headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
        });
        const data = await res.json();
        return data.files.length > 0 ? data.files[0].id : null;
    }

    async function handleKMJPUpload(input) {
        const file = input.files[0];
        if(!file || !ACCESS_TOKEN) return;
        
        Swal.fire({ title: 'Memproses KMJP...', html: 'Mengekstrak data dan mengemaskini Spreadsheet', didOpen: () => Swal.showLoading() });

        try {
            // Ekstrak Teks PDF
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(item => item.str).join(" ") + "\n";
                }
                
                const extractedData = parseKMJP(text);
                await updateSiswaKlikSheet(extractedData);
            };
            reader.readAsArrayBuffer(file);

        } catch(e) { 
            console.error(e);
            Swal.fire('Ralat', 'Gagal memproses fail.', 'error'); 
        }
    }

    function parseKMJP(text) {
        const cleanText = text.replace(/\s+/g, ' ');
        // Regex diperkukuh untuk tangkap semua 8 kolum
        const pattern = /([A-Z]{4}\d{4})\s+(\d+)\s+(.*?)\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+(\d+[:\d]*\s*j?)\s+(DEWAN\s\(.*?\)|DGEMILANG|DT\s[A-Z\s]+|DEWAN\s[A-Z]+|DEWAN\sPEP[A-Z0-9\s]+)\s+(\d+)/gi;
        
        const rows = [];
        let m;
        while ((m = pattern.exec(cleanText)) !== null) {
            rows.push([
                m[1], // KOD KURSUS
                m[2], // SET
                m[3].trim(), // TAJUK
                m[4], // TARIKH
                m[5], // MASA
                m[6].trim(), // TEMPOH
                m[7].trim(), // TEMPAT
                m[8]  // MEJA
            ]);
        }
        return rows;
    }

    async function updateSiswaKlikSheet(dataRows) {
        try {
            let ssId = await getFileId(SPREADSHEET_NAME, 'application/vnd.google-apps.spreadsheet');
            
            if (!ssId) {
                Swal.fire('Ralat', 'Spreadsheet SiswaKlik Time Management tidak ditemui.', 'error');
                return;
            }

            // Padam data lama & Masukkan data baru (Sheet3)
            // Nota: Kita 'clear' range A2:H100 supaya header kekal
            await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values/Sheet3!A2:H100:clear`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
            });

            // Update data baru
            await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values/Sheet3!A2?valueInputOption=RAW`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ values: dataRows })
            });

            Swal.fire('Berjaya!', 'Data telah dikemaskini dalam Cloud.', 'success');
            renderExamsFromSheet();

        } catch (err) {
            Swal.fire('Ralat Cloud', 'Gagal menyambung ke Google Sheets', 'error');
        }
    }

    async function renderExamsFromSheet() {
        const container = document.getElementById('exam-list');
        const countSpan = document.getElementById('exam-count');

        try {
            let ssId = await getFileId(SPREADSHEET_NAME, 'application/vnd.google-apps.spreadsheet');
            if(!ssId) {
                container.innerHTML = `<div class="text-center py-20 bg-white rounded-[2.5rem] border border-dashed border-slate-200 text-slate-400 font-medium">Sila pastikan fail Spreadsheet wujud.</div>`;
                return;
            }

            const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values/Sheet3!A2:H30`, {
                headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
            });
            const data = await res.json();
            const exams = data.values || [];

            countSpan.innerText = `${exams.length} Subjek`;

            if(exams.length === 0) {
                container.innerHTML = `<div class="text-center py-20 bg-white rounded-[2.5rem] border border-dashed border-slate-200 text-slate-400 font-medium">Tiada data peperiksaan dikesan.</div>`;
                return;
            }

            container.innerHTML = exams.map(ex => {
                // ex[3] = Tarikh (DD/MM/YYYY)
                const dateParts = ex[3].split('/');
                const dateObj = new Date(`${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`);
                
                return `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex items-center justify-between group">
                    <div class="flex items-center gap-5">
                        <div class="h-14 w-14 bg-blue-50 text-blue-600 rounded-2xl flex flex-col items-center justify-center border border-blue-100 font-black">
                            <span class="text-[9px] uppercase">${dateObj.toLocaleString('ms-MY', {month: 'short'})}</span>
                            <span class="text-xl">${dateObj.getDate()}</span>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <h4 class="font-black text-slate-800 uppercase">${ex[0]}</h4>
                                <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded-md text-slate-500">Set ${ex[1]}</span>
                            </div>
                            <p class="text-xs text-slate-400 font-bold mb-1">${ex[2]}</p>
                            <div class="flex flex-wrap gap-4 text-[10px] font-bold text-slate-500 uppercase">
                                <span><i class="fas fa-clock text-blue-400 mr-1"></i> ${ex[4]} (${ex[5]})</span>
                                <span><i class="fas fa-map-marker-alt text-rose-400 mr-1"></i> ${ex[6]}</span>
                                <span><i class="fas fa-chair text-amber-400 mr-1"></i> No. Meja: ${ex[7]}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');

        } catch (err) {
            container.innerHTML = `<div class="text-center py-10 text-rose-500">Gagal memuatkan data dari Cloud.</div>`;
        }
    }

    window.onload = () => {
        if(!ACCESS_TOKEN) {
            window.location.href = 'login.html';
        } else {
            renderExamsFromSheet();
        }
    };
</script>
</body>
</html>
