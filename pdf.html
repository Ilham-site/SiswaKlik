<div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col h-[90vh] animate-in slide-in-from-bottom-4">
    <div class="p-6 border-b flex flex-wrap gap-2 items-center justify-between bg-white">
        <div class="flex items-center gap-4">
            <button onclick="goBack()" class="p-3 hover:bg-gray-100 rounded-full transition-all group">
                <i class="fas fa-arrow-left text-gray-400 group-hover:text-blue-600"></i>
            </button>
            <div>
                <h3 class="font-black text-slate-800 text-lg md:text-xl truncate max-w-[200px] md:max-w-md" id="display-filename">Memuatkan...</h3>
                <div class="flex items-center gap-2">
                    <span id="sync-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <p id="sync-status" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Sistem PDF</p>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="confirmDelete()" class="p-3 bg-red-50 text-red-500 hover:bg-red-100 rounded-2xl transition flex items-center gap-2 font-bold px-5 text-sm">
                <i class="fas fa-trash"></i> <span class="hidden md:inline">PADAM</span>
            </button>
            
            <button id="upload-drive-btn" onclick="uploadToDrive()" class="hidden bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition flex items-center gap-2">
                <i class="fas fa-cloud-upload-alt"></i> SIMPAN KE DRIVE
            </button>
        </div>
    </div>

    <div class="flex-1 bg-slate-200 p-2 md:p-4 overflow-hidden relative flex flex-col items-center">
        <div id="loading-overlay" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-slate-100">
            <div class="relative">
                <i class="fas fa-circle-notch animate-spin text-5xl text-blue-600"></i>
                <i class="fas fa-file-pdf absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-blue-600 text-sm"></i>
            </div>
            <p class="text-slate-500 font-bold mt-4 animate-bounce">Menyediakan dokumen...</p>
        </div>
        
        <iframe id="pdf-viewer" class="w-full h-full rounded-xl shadow-2xl hidden bg-white" frameborder="0" allow="autoplay"></iframe>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // Global variable untuk simpan URL supaya boleh dibersihkan
    let currentObjectUrl = null;
    const editingId = localStorage.getItem('editing_file_id');
    const editingName = localStorage.getItem('editing_file_name');
    const accessToken = localStorage.getItem('siswaklik_access_token');
    
    document.getElementById('display-filename').innerText = editingName || "Dokumen Tidak Dikenali";

    function goBack() {
        if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
        if (typeof loadView === 'function') loadView('folder.html');
    }

    async function initViewer() {
        const viewer = document.getElementById('pdf-viewer');
        const loader = document.getElementById('loading-overlay');
        
        try {
            const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
            const fileData = localFiles.find(f => f.id === editingId || f.driveId === editingId);

            let pdfUrl = '';

            // 1. Check fail local
            if (fileData && fileData.content) {
                pdfUrl = fileData.content;
                if (!fileData.driveId) {
                    document.getElementById('upload-drive-btn').classList.remove('hidden');
                }
                displayPdf(pdfUrl);
            } 
            // 2. Check fail Google Drive
            else if (accessToken && editingId && !editingId.startsWith('local-')) {
                const response = await fetch(`https://www.googleapis.com/drive/v3/files/${editingId}?alt=media`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                if (!response.ok) throw new Error("Gagal akses fail di Drive. Sila log masuk semula.");
                
                const blob = await response.blob();
                if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl); // Buang yang lama
                currentObjectUrl = URL.createObjectURL(blob);
                
                document.getElementById('sync-status').innerText = "Fail di Google Drive";
                displayPdf(currentObjectUrl);
            } else {
                throw new Error("Data fail tidak ditemui!");
            }

        } catch (err) {
            console.error(err);
            Swal.fire('Ralat', err.message, 'error');
            loader.innerHTML = `<p class="text-red-500 font-bold">${err.message}</p>`;
        }
    }

    function displayPdf(url) {
        const viewer = document.getElementById('pdf-viewer');
        const loader = document.getElementById('loading-overlay');
        
        // Reset iframe src untuk pastikan ia load baru
        viewer.src = ''; 
        setTimeout(() => {
            viewer.src = url;
            viewer.classList.remove('hidden');
            // Beri sedikit masa untuk iframe render sebelum hilangkan loading
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 500);
        }, 100);
    }

    async function uploadToDrive() {
        const btn = document.getElementById('upload-drive-btn');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> MENYIMPAN...`;

        try {
            const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
            const fileIndex = localFiles.findIndex(f => f.id === editingId);
            const file = localFiles[fileIndex];

            const metadata = {
                name: file.name,
                mimeType: 'application/pdf',
                parents: [localStorage.getItem('siswaklik_current_folder_id') || 'root']
            };

            const formData = new FormData();
            formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            formData.append('file', dataURLtoBlob(file.content));

            const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}` },
                body: formData
            });

            if (response.ok) {
                const driveData = await response.json();
                localFiles[fileIndex].driveId = driveData.id;
                localFiles[fileIndex].status = 'synced';
                localStorage.setItem('siswa_local_files', JSON.stringify(localFiles));
                
                Swal.fire('Berjaya', 'Fail telah disimpan ke Google Drive!', 'success');
                btn.classList.add('hidden');
                document.getElementById('sync-status').innerText = "Tersimpan di Drive";
            }
        } catch (err) {
            Swal.fire('Ralat', 'Gagal memuat naik: ' + err.message, 'error');
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    async function confirmDelete() {
        const result = await Swal.fire({
            title: 'Hapus Fail?',
            text: "Fail ini akan dipadamkan secara kekal!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Ya, Padam!',
            cancelButtonText: 'Batal'
        });

        if (result.isConfirmed) {
            try {
                let localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
                const updatedFiles = localFiles.filter(f => f.id !== editingId && f.driveId !== editingId);
                localStorage.setItem('siswa_local_files', JSON.stringify(updatedFiles));

                if (accessToken && editingId && !editingId.startsWith('local-')) {
                    await fetch(`https://www.googleapis.com/drive/v3/files/${editingId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                }

                await Swal.fire('Dipadam!', 'Fail anda telah dihapuskan.', 'success');
                goBack();
            } catch (err) {
                Swal.fire('Ralat', 'Gagal memadam fail.', 'error');
            }
        }
    }

    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], {type:mime});
    }

    // Jalankan viewer
    initViewer();
</script>

<style>
    /* Paksa Iframe jadi besar dan responsive */
    #pdf-viewer {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }
    
    /* Animasi masuk */
    .animate-in {
        animation: fadeIn 0.4s ease-out;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
