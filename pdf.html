<div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col h-[85vh] animate-in slide-in-from-bottom-4">
    <div class="p-4 border-b flex flex-wrap gap-2 items-center justify-between bg-white">
        <div class="flex items-center gap-4">
            <button onclick="loadView('folder.html')" class="p-2 hover:bg-gray-100 rounded-full">
                <i class="fas fa-times text-gray-400 text-xl"></i>
            </button>
            <h3 class="font-bold text-gray-800" id="editing-filename">Editor PDF</h3>
        </div>
        
        <div class="flex items-center gap-2 bg-gray-50 p-1 rounded-xl">
            <button onclick="setMode('pencil')" class="p-2 rounded-lg hover:bg-blue-100"><i class="fas fa-pen"></i></button>
            <button onclick="setMode('eraser')" class="p-2 rounded-lg hover:bg-blue-100"><i class="fas fa-eraser"></i></button>
            <button onclick="setMode('text')" class="p-2 rounded-lg hover:bg-blue-100"><i class="fas fa-font"></i></button>
        </div>

        <button onclick="saveAndSync()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg">
            SYNC KE DRIVE
        </button>
    </div>

    <div class="flex-1 overflow-auto bg-slate-200 p-4 flex justify-center" id="canvas-container">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<script>

    document.getElementById('editing-filename').innerText = fileName;
