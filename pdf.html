<div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col h-[90vh] animate-in slide-in-from-bottom-6 border border-slate-100">
    <div class="p-6 border-b border-slate-100 flex flex-wrap gap-4 items-center justify-between bg-white/80 backdrop-blur-md sticky top-0 z-10">
        <div class="flex items-center gap-4">
            <button onclick="goBack()" class="p-3 hover:bg-blue-50 rounded-full transition-all group border border-transparent hover:border-blue-100">
                <i class="fas fa-arrow-left text-slate-400 group-hover:text-blue-600"></i>
            </button>
            <div>
                <h3 class="font-black text-slate-800 text-lg md:text-xl truncate max-w-[500px]" id="display-filename">Memuatkan...</h3>
                <div class="flex items-center gap-2">
                    <span id="sync-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <p id="sync-status" class="text-[10px] text-blue-600 font-black uppercase tracking-widest">SiswaKlik PDF Editor (Beta)</p>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div id="edit-toolbar" class="flex items-center bg-slate-100 rounded-2xl p-1 gap-1">
                <button onclick="setMode('draw')" id="btn-draw" class="p-2.5 rounded-xl hover:bg-white hover:shadow-sm transition-all text-slate-500" title="Pensil">
                    <i class="fas fa-pencil-alt"></i>
                </button>
                <button onclick="setMode('text')" id="btn-text" class="p-2.5 rounded-xl hover:bg-white hover:shadow-sm transition-all text-slate-500" title="Tambah Teks">
                    <i class="fas fa-font"></i>
                </button>
                <button onclick="deleteObject()" class="p-2.5 rounded-xl hover:bg-red-50 hover:text-red-500 transition-all text-slate-500" title="Padam Objek">
                    <i class="fas fa-eraser"></i>
                </button>
                <input type="color" id="color-picker" onchange="updateColor(this.value)" class="w-8 h-8 p-0 border-none bg-transparent cursor-pointer ml-2">
            </div>

            <button id="upload-drive-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-black text-xs flex items-center gap-2 shadow-lg shadow-blue-200 transition-all active:scale-95 hidden">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>SIMPAN KE DRIVE</span>
            </button>
        </div>
    </div>

    <div id="pdf-scroll-container" class="flex-1 overflow-auto bg-slate-200 p-4 md:p-10 relative">
        <div id="pdf-wrapper" class="mx-auto shadow-2xl relative bg-white" style="width: fit-content;">
            <canvas id="pdf-render-canvas"></canvas>
            <div class="absolute top-0 left-0">
                <canvas id="fabric-canvas"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

<script>
    (function() {
        const file = JSON.parse(localStorage.getItem('siswa_viewing_file'));
        if (!file) return goBack();

        document.getElementById('display-filename').innerText = file.name;
        
        const pdfCanvas = document.getElementById('pdf-render-canvas');
        const pdfCtx = pdfCanvas.getContext('2d');
        let fCanvas; // Fabric Canvas instance
        let lastSyncedJSON = "";
        let isDrawingMode = false;

        async function initViewer() {
            try {
                const loadingTask = pdfjsLib.getDocument(file.data);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1); // Hanya page 1 untuk contoh ini
                
                const viewport = page.getViewport({ scale: 1.5 });
                pdfCanvas.height = viewport.height;
                pdfCanvas.width = viewport.width;

                await page.render({ canvasContext: pdfCtx, viewport: viewport }).promise;

                // Selepas PDF render, baru aktifkan Fabric.js di atasnya
                setupFabric(viewport.width, viewport.height);
                
                // Muat turun contengan lama dari Drive jika ada
                if (file.driveId) {
                    loadAnnotationsFromDrive(file.driveId);
                }
            } catch (err) {
                console.error("Gagal memuat PDF:", err);
            }
        }

        function setupFabric(width, height) {
            fCanvas = new fabric.Canvas('fabric-canvas', {
                width: width,
                height: height,
                isDrawingMode: false
            });

            fCanvas.freeDrawingBrush.color = '#3b82f6';
            fCanvas.freeDrawingBrush.width = 3;

            // Start Auto-Sync Interval (15 saat)
            setInterval(autoSync, 15000);
        }

        window.setMode = (mode) => {
            if (mode === 'draw') {
                isDrawingMode = !isDrawingMode;
                fCanvas.isDrawingMode = isDrawingMode;
                document.getElementById('btn-draw').classList.toggle('bg-blue-600', isDrawingMode);
                document.getElementById('btn-draw').classList.toggle('text-white', isDrawingMode);
            } else if (mode === 'text') {
                const text = new fabric.IText('Tulis sesuatu...', {
                    left: 100,
                    top: 100,
                    fontFamily: 'Plus Jakarta Sans',
                    fontSize: 20,
                    fill: document.getElementById('color-picker').value
                });
                fCanvas.add(text);
            }
        };

        window.updateColor = (color) => {
            fCanvas.freeDrawingBrush.color = color;
        };

        window.deleteObject = () => {
            const active = fCanvas.getActiveObject();
            if (active) fCanvas.remove(active);
        };

        async function autoSync() {
            if (!fCanvas || !file.driveId) return;

            const currentJSON = JSON.stringify(fCanvas.toJSON());
            if (currentJSON === lastSyncedJSON) return; // Tak perlu sync kalau tak berubah

            document.getElementById('sync-dot').classList.replace('bg-green-500', 'bg-amber-500');
            document.getElementById('sync-status').innerText = "MENYIMPAN KE DRIVE...";

            const accessToken = localStorage.getItem('siswaklik_access_token');
            
            try {
                // Simpan dalam 'appProperties' supaya tidak kacau fail PDF asal
                await fetch(`https://www.googleapis.com/drive/v3/files/${file.driveId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        appProperties: {
                            'annotations_v2': currentJSON
                        }
                    })
                });

                lastSyncedJSON = currentJSON;
                document.getElementById('sync-dot').classList.replace('bg-amber-500', 'bg-green-500');
                document.getElementById('sync-status').innerText = "SINCRONIZED (DRIVE)";
            } catch (err) {
                console.error("Auto-sync ralat:", err);
                document.getElementById('sync-status').innerText = "RALAT SYNC";
            }
        }

        async function loadAnnotationsFromDrive(driveId) {
            const accessToken = localStorage.getItem('siswaklik_access_token');
            try {
                const res = await fetch(`https://www.googleapis.com/drive/v3/files/${driveId}?fields=appProperties`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await res.json();
                
                if (data.appProperties && data.appProperties.annotations_v2) {
                    fCanvas.loadFromJSON(data.appProperties.annotations_v2, () => {
                        fCanvas.renderAll();
                        lastSyncedJSON = data.appProperties.annotations_v2;
                        console.log("Contengan dimuatkan dari Drive.");
                    });
                }
            } catch (err) {
                console.error("Gagal muat contengan:", err);
            }
        }

        initViewer();
    })();
</script>

<style>
    #pdf-wrapper canvas {
        display: block;
    }
    #pdf-scroll-container::-webkit-scrollbar {
        width: 8px;
    }
    #pdf-scroll-container::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
    }
    .canvas-container {
        position: absolute !important;
        top: 0;
        left: 0;
    }
</style>
