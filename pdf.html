<div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col h-[90vh] animate-in slide-in-from-bottom-4">
    <div class="p-6 border-b flex flex-wrap gap-2 items-center justify-between bg-white">
        <div class="flex items-center gap-4">
            <button onclick="goBack()" class="p-3 hover:bg-gray-100 rounded-full transition-all group">
                <i class="fas fa-arrow-left text-gray-400 group-hover:text-blue-600"></i>
            </button>
            <div>
                <h3 class="font-black text-slate-800 text-lg md:text-xl truncate max-w-[200px]" id="display-filename">Memuatkan...</h3>
                <div class="flex items-center gap-2">
                    <span id="sync-dot" class="w-2 h-2 bg-green-500 rounded-full"></span>
                    <p id="sync-status" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider text-blue-600">Paparan Dokumen</p>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="confirmDelete()" class="p-3 bg-red-50 text-red-500 hover:bg-red-100 rounded-2xl transition flex items-center gap-2 font-bold px-5 text-sm">
                <i class="fas fa-trash"></i> <span class="hidden md:inline">PADAM</span>
            </button>
            
            <button id="upload-drive-btn" onclick="uploadToDrive()" class="hidden bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition flex items-center gap-2">
                <i class="fas fa-cloud-upload-alt"></i> SIMPAN KE DRIVE
            </button>
        </div>
    </div>

    <div class="flex-1 bg-slate-100 overflow-hidden relative">
        <div id="loading-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-white">
            <i class="fas fa-circle-notch animate-spin text-5xl text-blue-600 mb-4"></i>
            <p class="text-slate-500 font-bold">Menghubungkan fail...</p>
        </div>
        
        <div id="pdf-container" class="w-full h-full">
            <div id="pdfViewer"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link href="https://cdn.syncfusion.com/ej2/23.1.36/material.css" rel="stylesheet" />
<script src="https://cdn.syncfusion.com/ej2/23.1.36/dist/ej2.min.js" type="text/javascript"></script>

<script>
    const editingId = localStorage.getItem('editing_file_id');
    const editingName = localStorage.getItem('editing_file_name');
    const accessToken = localStorage.getItem('siswaklik_access_token');
    
    // Gantikan URL ini dengan URL Server ASP.NET anda yang sedang berjalan
    const SERVICE_URL = "https://localhost:44396/PdfViewer"; 

    document.getElementById('display-filename').innerText = editingName || "Fail PDF";

    function goBack() {
        loadView('folder.html');
    }

    async function initViewer() {
        const loader = document.getElementById('loading-overlay');

        try {
            const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
            const fileData = localFiles.find(f => f.id === editingId || f.driveId === editingId);

            // Inisialisasi Syncfusion PDF Viewer
            var viewer = new ej.pdfviewer.PdfViewer({
                serviceUrl: SERVICE_URL,
                documentPath: editingName, // Nama fail yang akan dihantar ke Backend Load()
                style: { 'height': '100%' }
            });
            
            // Inject module yang diperlukan (sama seperti React Inject)
            ej.pdfviewer.PdfViewer.Inject(
                ej.pdfviewer.Toolbar, 
                ej.pdfviewer.Magnification, 
                ej.pdfviewer.Navigation, 
                ej.pdfviewer.Annotation, 
                ej.pdfviewer.TextSelection, 
                ej.pdfviewer.TextSearch
            );

            viewer.appendTo('#pdfViewer');

            if (fileData && fileData.content) {
                // JIKA FAIL TEMPATAN (BASE64)
                if (!fileData.driveId) document.getElementById('upload-drive-btn').classList.remove('hidden');
                
                // Kirim base64 ke viewer
                viewer.load(fileData.content, null);
                loader.classList.add('hidden');
            } 
            else if (editingId && !editingId.startsWith('local-')) {
                // JIKA FAIL GOOGLE DRIVE
                // Nota: Backend C# anda akan menggunakan 'editingName' untuk cari FileID di Drive
                document.getElementById('sync-status').innerText = "Cloud Sync Aktif";
                
                // Kita tunggu viewer siap render
                viewer.documentLoad = function() {
                    loader.classList.add('hidden');
                };
            } else {
                throw new Error("Fail tidak dijumpai.");
            }
        } catch (err) {
            console.error(err);
            loader.innerHTML = `<div class="p-6 text-center">
                <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i>
                <p class="font-bold text-slate-800">${err.message}</p>
                <button onclick="goBack()" class="mt-4 text-blue-600 font-bold">Kembali ke Folder</button>
            </div>`;
        }
    }

    // Fungsi Padam (Kekal UI Asal)
    async function confirmDelete() {
        const result = await Swal.fire({
            title: 'Padam Fail?',
            text: "Tindakan ini tidak boleh diundur!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'Ya, Padam',
            cancelButtonText: 'Batal'
        });

        if (result.isConfirmed) {
            let localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
            localStorage.setItem('siswa_local_files', JSON.stringify(localFiles.filter(f => f.id !== editingId && f.driveId !== editingId)));

            if (accessToken && editingId && !editingId.startsWith('local-')) {
                await fetch(`https://www.googleapis.com/drive/v3/files/${editingId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
            }
            goBack();
        }
    }

    // Fungsi Simpan ke Drive (Kekal UI Asal)
    async function uploadToDrive() {
        const btn = document.getElementById('upload-drive-btn');
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> Menyimpan...`;

        try {
            const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
            const file = localFiles.find(f => f.id === editingId);

            const metadata = {
                name: file.name,
                mimeType: 'application/pdf',
                parents: [localStorage.getItem('siswaklik_current_folder_id') || 'root']
            };

            const formData = new FormData();
            formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            formData.append('file', dataURLtoBlob(file.content));

            const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}` },
                body: formData
            });

            if (response.ok) {
                const driveData = await response.json();
                file.driveId = driveData.id;
                file.status = 'synced';
                localStorage.setItem('siswa_local_files', JSON.stringify(localFiles));
                Swal.fire('Berjaya', 'Tersimpan di Google Drive!', 'success');
                btn.classList.add('hidden');
            }
        } catch (err) {
            Swal.fire('Ralat', 'Gagal simpan ke Drive', 'error');
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> SIMPAN KE DRIVE`;
        }
    }

    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], {type:mime});
    }

    initViewer();
</script>

<style>
    #pdf-container {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
    }
    /* Memastikan Syncfusion Viewer memenuhi skrin */
    #pdfViewer {
        width: 100% !important;
        height: 100% !important;
    }
    /* Sembunyikan watermark Syncfusion jika perlu (opsyenal) */
    .e-pv-watermark { display: none !important; }
</style>
