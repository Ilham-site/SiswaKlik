<div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col h-[85vh] animate-in slide-in-from-bottom-4">
    <div class="p-6 border-b flex flex-wrap gap-2 items-center justify-between bg-white">
        <div class="flex items-center gap-4">
            <button onclick="loadView('folder.html')" class="p-2 hover:bg-gray-100 rounded-full transition">
                <i class="fas fa-arrow-left text-gray-400"></i>
            </button>
            <div>
                <h3 class="font-black text-slate-800" id="editing-filename">Memuatkan...</h3>
                <p id="sync-status" class="text-[10px] text-blue-500 font-bold uppercase tracking-wider italic">Sedia untuk diedit</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-2xl">
            <button onclick="setMode('select')" class="p-3 hover:bg-white rounded-xl transition shadow-sm" title="Pilih"><i class="fas fa-mouse-pointer"></i></button>
            <button onclick="setMode('text')" class="p-3 hover:bg-white rounded-xl transition shadow-sm" title="Teks"><i class="fas fa-font"></i></button>
            <button onclick="setMode('draw')" class="p-3 hover:bg-white rounded-xl transition shadow-sm" title="Conteng"><i class="fas fa-pen"></i></button>
            <button onclick="deleteObject()" class="p-3 hover:bg-white rounded-xl transition text-red-500" title="Padam"><i class="fas fa-trash"></i></button>
        </div>

        <div class="flex gap-3">
            <button onclick="processAndSave()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">
                SIMPAN KE DRIVE
            </button>
        </div>
    </div>

    <div class="flex-1 bg-slate-100 p-8 overflow-auto flex flex-col items-center">
        <div id="pdf-container" class="relative shadow-2xl bg-white mb-10">
            <canvas id="pdf-canvas" class="absolute top-0 left-0"></canvas>
            <canvas id="editor-canvas" class="absolute top-0 left-0"></canvas>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let fbCanvas;
    const editingId = localStorage.getItem('editing_file_id');
    const editingName = localStorage.getItem('editing_file_name');
    document.getElementById('editing-filename').innerText = editingName;

    async function initEditor() {
        const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
        const fileData = localFiles.find(f => f.id === editingId);

        if (!fileData) return alert("Fail tidak ditemui!");

        const loadingTask = pdfjsLib.getDocument(fileData.content);
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 1.5 });

        const canvas = document.getElementById('pdf-canvas');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;

        const container = document.getElementById('pdf-container');
        container.style.width = viewport.width + 'px';
        container.style.height = viewport.height + 'px';

        fbCanvas = new fabric.Canvas('editor-canvas', {
            width: viewport.width,
            height: viewport.height
        });

        if (fileData.annotations) {
            fbCanvas.loadFromJSON(fileData.annotations, fbCanvas.renderAll.bind(fbCanvas));
        }
    }

    function setMode(mode) {
        fbCanvas.isDrawingMode = (mode === 'draw');
        if (mode === 'draw') {
            fbCanvas.freeDrawingBrush.width = 3;
            fbCanvas.freeDrawingBrush.color = '#2563eb';
        } else if (mode === 'text') {
            fbCanvas.add(new fabric.IText('Tulis sini...', { left: 50, top: 50, fontSize: 20 }));
        }
    }

    function deleteObject() {
        fbCanvas.getActiveObjects().forEach(obj => fbCanvas.remove(obj));
        fbCanvas.discardActiveObject().renderAll();
    }

    // FUNGSI UTAMA: Gabungkan Contengan & PDF kemudian hantar ke Drive
    async function processAndSave() {
        document.getElementById('sync-status').innerText = "Sedang memproses fail...";
        
        // 1. Gabungkan PDF Canvas + Fabric Canvas jadi satu imej (DataURL)
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = fbCanvas.width;
        finalCanvas.height = fbCanvas.height;
        const ctx = finalCanvas.getContext('2d');
        
        ctx.drawImage(document.getElementById('pdf-canvas'), 0, 0);
        ctx.drawImage(fbCanvas.getElement(), 0, 0);
        const mergedDataUrl = finalCanvas.toDataURL('image/png');

        // 2. Kemaskini LocalStorage
        let localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
        const idx = localFiles.findIndex(f => f.id === editingId);
        
        if (idx !== -1) {
            localFiles[idx].content = mergedDataUrl; // Data baru yang sudah ada contengan
            localFiles[idx].annotations = JSON.stringify(fbCanvas); // Simpan untuk edit balik nanti
            localFiles[idx].status = 'pending_sync';
            localStorage.setItem('siswa_local_files', JSON.stringify(localFiles));
            
            // 3. Panggil fungsi update khusus untuk mengelakkan duplicate
            await updateExistingFileInDrive(localFiles[idx]);
        }
    }

    async function updateExistingFileInDrive(file) {
        const token = localStorage.getItem('siswaklik_access_token');
        if (!token || !file.driveId) {
            // Jika belum ada driveId, backgroundSync biasa akan buat fail baru
            if(typeof backgroundSync === 'function') backgroundSync();
            return;
        }

        try {
            document.getElementById('sync-status').innerText = "Mengemaskini Drive...";
            
            // Gunakan PATCH dan uploadType=media untuk overwrite kandungan fail sedia ada
            const response = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${file.driveId}?uploadType=media`, {
                method: 'PATCH',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'image/png'
                },
                body: dataURLtoBlob(file.content)
            });

            if (response.ok) {
                document.getElementById('sync-status').innerText = "Tersimpan di Drive & Lokal";
                Swal.fire({ icon: 'success', title: 'Berjaya!', text: 'Fail di Google Drive telah dikemaskini.', timer: 2000 });
            }
        } catch (err) {
            console.error("Gagal update:", err);
            document.getElementById('sync-status').innerText = "Ralat Sync";
        }
    }

    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], {type:mime});
    }

    initEditor();
</script>

<style>
    .canvas-container { position: absolute !important; top: 0; left: 0; z-index: 10; }
    #pdf-canvas { z-index: 5; }
</style>
