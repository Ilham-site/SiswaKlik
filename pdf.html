<div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col h-[90vh] animate-in slide-in-from-bottom-4">
    <div class="p-6 border-b flex flex-wrap gap-2 items-center justify-between bg-white">
        <div class="flex items-center gap-4">
            <button onclick="goBack()" class="p-3 hover:bg-gray-100 rounded-full transition-all group">
                <i class="fas fa-arrow-left text-gray-400 group-hover:text-blue-600"></i>
            </button>
            <div>
                <h3 class="font-black text-slate-800 text-lg md:text-xl truncate max-w-[200px]" id="display-filename">Memuatkan...</h3>
                <div class="flex items-center gap-2">
                    <span id="sync-dot" class="w-2 h-2 bg-green-500 rounded-full"></span>
                    <p id="sync-status" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider text-blue-600">Paparan Dokumen</p>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="confirmDelete()" class="p-3 bg-red-50 text-red-500 hover:bg-red-100 rounded-2xl transition flex items-center gap-2 font-bold px-5 text-sm">
                <i class="fas fa-trash"></i> <span class="hidden md:inline">PADAM</span>
            </button>
            
            <button id="upload-drive-btn" class="hidden bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition flex items-center gap-2">
                <i class="fas fa-cloud-upload-alt"></i> SIMPAN KE DRIVE
            </button>
        </div>
    </div>

    <div class="flex-1 bg-slate-100 overflow-hidden relative">
        <div id="status-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-white transition-opacity duration-300">
            <div id="loader-content" class="text-center">
                <i class="fas fa-circle-notch animate-spin text-5xl text-blue-600 mb-4"></i>
                <p class="text-slate-500 font-bold">Menyediakan pemapar PDF...</p>
            </div>
        </div>
        
        <div id="pdf-container" class="w-full h-full opacity-0 transition-opacity duration-500">
            <div id="pdfViewerElement"></div>
        </div>
    </div>
</div>

<link href="https://cdn.syncfusion.com/ej2/23.1.36/material.css" rel="stylesheet" />
<script src="https://cdn.syncfusion.com/ej2/23.1.36/dist/ej2.min.js" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    /**
     * KONFIGURASI GLOBAL
     * Pastikan SERVICE_URL sepadan dengan backend C# anda.
     */
    const SERVICE_URL = "https://localhost:44396/PdfViewer"; 
    const editingId = localStorage.getItem('editing_file_id');
    const editingName = localStorage.getItem('editing_file_name');
    const accessToken = localStorage.getItem('siswaklik_access_token');
    
    let pdfViewerInstance = null;

    document.getElementById('display-filename').innerText = editingName || "Fail PDF";

    /**
     * FUNGSI UTAMA: Inisialisasi Viewer
     * Menggunakan kawalan ralat untuk 'ej is not defined'
     */
    function initViewer() {
        const overlay = document.getElementById('status-overlay');
        const container = document.getElementById('pdf-container');

        // Pastikan library Syncfusion sudah dimuatkan
        if (typeof ej === 'undefined') {
            console.warn("Syncfusion belum sedia, cuba lagi dalam 500ms...");
            setTimeout(initViewer, 500);
            return;
        }

        try {
            // Register Syncfusion Modules (Sama seperti Inject dalam React)
            ej.pdfviewer.PdfViewer.Inject(
                ej.pdfviewer.Toolbar, 
                ej.pdfviewer.Magnification, 
                ej.pdfviewer.Navigation, 
                ej.pdfviewer.Annotation, 
                ej.pdfviewer.TextSelection, 
                ej.pdfviewer.TextSearch,
                ej.pdfviewer.Print,
                ej.pdfviewer.FormDesigner,
                ej.pdfviewer.FormFields
            );

            // Cipta Instance Viewer
            pdfViewerInstance = new ej.pdfviewer.PdfViewer({
                serviceUrl: SERVICE_URL,
                documentPath: editingName, // Akan dihantar ke backend sebagai jsonObject["document"]
                enableToolbar: true,
                locale: 'en-US',
                style: { 'height': '100%', 'width': '100%' }
            });

            // Handler: Apabila dokumen berjaya dimuatkan
            pdfViewerInstance.documentLoad = () => {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
                container.classList.remove('opacity-0');
                console.log("Dokumen berjaya dimuatkan dari server.");
            };

            // Handler: Jika berlaku ralat pemuatan
            pdfViewerInstance.ajaxRequestFailed = (args) => {
                showError("Gagal berhubung dengan server PDF (CORS atau URL tidak sah).");
            };

            // Pasangkan ke elemen HTML
            pdfViewerInstance.appendTo('#pdfViewerElement');

            // Logik Hybrid: Local vs Drive
            checkFileSource();

        } catch (err) {
            showError("Ralat sistem: " + err.message);
        }
    }

    /**
     * SEMAK SUMBER FAIL: LocalStorage vs Google Drive
     */
    async function checkFileSource() {
        const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
        const fileData = localFiles.find(f => f.id === editingId || f.driveId === editingId);

        if (fileData && fileData.content && !fileData.driveId) {
            // FAIL LOKAL: Tunjukkan butang simpan ke drive
            document.getElementById('upload-drive-btn').classList.remove('hidden');
            document.getElementById('upload-drive-btn').onclick = uploadToDrive;
            
            // Muatkan secara base64 terus ke viewer
            pdfViewerInstance.load(fileData.content, null);
        } else if (editingId && !editingId.startsWith('local-')) {
            // FAIL DRIVE: Sync dengan backend C#
            document.getElementById('sync-status').innerText = "Cloud Sync Aktif";
            // Viewer secara automatik akan memanggil ServiceURL/Load dengan documentPath
        } else if (!fileData && (!editingId || editingId.startsWith('local-'))) {
            showError("Fail tidak dijumpai dalam simpanan.");
        }
    }

    /**
     * FUNGSI: Papar Ralat pada Skrin
     */
    function showError(msg) {
        const loaderContent = document.getElementById('loader-content');
        loaderContent.innerHTML = `
            <i class="fas fa-exclamation-triangle text-red-500 text-5xl mb-4"></i>
            <p class="font-bold text-slate-800">${msg}</p>
            <button onclick="goBack()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-xl font-bold">Kembali ke Folder</button>
        `;
    }

    function goBack() {
        if (pdfViewerInstance) pdfViewerInstance.destroy();
        loadView('folder.html');
    }

    /**
     * FUNGSI: Padam Fail (UI Asal)
     */
    async function confirmDelete() {
        const result = await Swal.fire({
            title: 'Padam Fail?',
            text: "Tindakan ini tidak boleh diundur!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'Ya, Padam',
            cancelButtonText: 'Batal'
        });

        if (result.isConfirmed) {
            let localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
            localStorage.setItem('siswa_local_files', JSON.stringify(localFiles.filter(f => f.id !== editingId && f.driveId !== editingId)));

            if (accessToken && editingId && !editingId.startsWith('local-')) {
                try {
                    await fetch(`https://www.googleapis.com/drive/v3/files/${editingId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                } catch (e) { console.error("Drive delete error", e); }
            }
            goBack();
        }
    }

    /**
     * FUNGSI: Simpan ke Drive (UI Asal)
     */
    async function uploadToDrive() {
        const btn = document.getElementById('upload-drive-btn');
        const originalContent = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> Menyimpan...`;

        try {
            const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
            const file = localFiles.find(f => f.id === editingId);

            const metadata = {
                name: file.name,
                mimeType: 'application/pdf',
                parents: [localStorage.getItem('siswaklik_current_folder_id') || 'root']
            };

            const formData = new FormData();
            formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            formData.append('file', dataURLtoBlob(file.content));

            const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}` },
                body: formData
            });

            if (response.ok) {
                const driveData = await response.json();
                file.driveId = driveData.id;
                file.status = 'synced';
                localStorage.setItem('siswa_local_files', JSON.stringify(localFiles));
                Swal.fire('Berjaya', 'Tersimpan di Google Drive!', 'success');
                btn.classList.add('hidden');
            } else { throw new Error("Respons Drive tidak OK"); }
        } catch (err) {
            Swal.fire('Ralat', 'Gagal simpan ke Drive. Pastikan anda telah login.', 'error');
            btn.disabled = false;
            btn.innerHTML = originalContent;
        }
    }

    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], {type:mime});
    }

    // Mulakan proses pemuatan
    initViewer();
</script>

<style>
    /* Paksa container skrin penuh */
    #pdf-container {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
    }
    
    /* Memastikan elemen viewer Syncfusion mengisi ruang */
    #pdfViewerElement {
        display: block;
        width: 100% !important;
        height: 100% !important;
    }

    /* Penambahbaikan visual toolbar Syncfusion */
    .e-pdfviewer-toolbar {
        background-color: #f8fafc !important;
        border-bottom: 1px solid #e2e8f0 !important;
    }

    /* Sembunyikan watermark jika tidak diperlukan (opsyenal) */
    .e-pv-watermark { display: none !important; }
</style>
