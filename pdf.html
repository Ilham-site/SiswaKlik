<div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col h-[85vh] animate-in slide-in-from-bottom-4">
    <div class="p-6 border-b flex flex-wrap gap-2 items-center justify-between bg-white">
        <div class="flex items-center gap-4">
            <button onclick="loadView('folder.html')" class="p-2 hover:bg-gray-100 rounded-full transition">
                <i class="fas fa-arrow-left text-gray-400"></i>
            </button>
            <div>
                <h3 class="font-black text-slate-800" id="editing-filename">Memuatkan...</h3>
                <div class="flex items-center gap-2">
                    <span id="sync-dot" class="w-2 h-2 bg-green-500 rounded-full"></span>
                    <p id="sync-status" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Mod Penyuntingan Aktif</p>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-2xl">
            <button onclick="setMode('select')" class="p-3 hover:bg-white rounded-xl transition" title="Pilih"><i class="fas fa-mouse-pointer"></i></button>
            <button onclick="setMode('text')" class="p-3 hover:bg-white rounded-xl transition" title="Teks"><i class="fas fa-font"></i></button>
            <button onclick="setMode('draw')" class="p-3 hover:bg-white rounded-xl transition" title="Pen"><i class="fas fa-pen"></i></button>
            <button onclick="deleteObject()" class="p-3 hover:bg-white rounded-xl transition text-red-500"><i class="fas fa-trash"></i></button>
        </div>

        <div class="flex gap-3">
            <button onclick="manualSave()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition flex items-center gap-2">
                <i class="fas fa-cloud-upload-alt"></i> SIMPAN
            </button>
        </div>
    </div>

    <div class="flex-1 bg-slate-100 p-8 overflow-auto flex flex-col items-center">
        <div id="pdf-wrapper" class="relative shadow-2xl bg-white mb-10">
            <canvas id="pdf-background" class="absolute top-0 left-0"></canvas>
            <canvas id="editor-layer"></canvas>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let fbCanvas;
    const editingId = localStorage.getItem('editing_file_id');
    const editingName = localStorage.getItem('editing_file_name');
    document.getElementById('editing-filename').innerText = editingName;

    async function initEditor() {
        const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
        const fileData = localFiles.find(f => f.id === editingId);

        if (!fileData) return alert("Fail tidak ditemui!");

        // 1. Render PDF original sebagai background
        const loadingTask = pdfjsLib.getDocument(fileData.content);
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 1.5 });

        const bgCanvas = document.getElementById('pdf-background');
        bgCanvas.height = viewport.height;
        bgCanvas.width = viewport.width;
        await page.render({ canvasContext: bgCanvas.getContext('2d'), viewport: viewport }).promise;

        // 2. Setup Fabric Layer
        const wrapper = document.getElementById('pdf-wrapper');
        wrapper.style.width = viewport.width + 'px';
        wrapper.style.height = viewport.height + 'px';

        fbCanvas = new fabric.Canvas('editor-layer', {
            width: viewport.width,
            height: viewport.height
        });

        // 3. Load editan lama (koordinat JSON) supaya boleh edit balik
        if (fileData.annotations) {
            fbCanvas.loadFromJSON(fileData.annotations, fbCanvas.renderAll.bind(fbCanvas));
        }
    }

    function setMode(mode) {
        fbCanvas.isDrawingMode = (mode === 'draw');
        if (mode === 'draw') {
            fbCanvas.freeDrawingBrush.width = 3;
            fbCanvas.freeDrawingBrush.color = '#2563eb';
        } else if (mode === 'text') {
            const text = new fabric.IText('Tulis nota...', { left: 50, top: 50, fontSize: 20, fill: '#1e293b' });
            fbCanvas.add(text);
        }
    }

    function deleteObject() {
        fbCanvas.getActiveObjects().forEach(obj => fbCanvas.remove(obj));
        fbCanvas.discardActiveObject().renderAll();
    }

    // FUNGSI UTAMA: Simpan & Sync Tanpa Duplicate
    async function manualSave() {
        document.getElementById('sync-status').innerText = "Sedang Menghantar ke Drive...";
        document.getElementById('sync-dot').classList.add('animate-pulse', 'bg-yellow-500');

        // A. Gabungkan PDF Background + Contengan untuk nampak di Google Drive
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = fbCanvas.width;
        tempCanvas.height = fbCanvas.height;
        const ctx = tempCanvas.getContext('2d');
        ctx.drawImage(document.getElementById('pdf-background'), 0, 0);
        ctx.drawImage(fbCanvas.getElement(), 0, 0);
        
        const combinedDataURL = tempCanvas.toDataURL('image/jpeg', 0.8);

        // B. Update LocalStorage
        let localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
        const idx = localFiles.findIndex(f => f.id === editingId);

        if (idx !== -1) {
            localFiles[idx].annotations = JSON.stringify(fbCanvas); // Simpan JSON supaya boleh edit balik
            localFiles[idx].content = combinedDataURL; // Simpan rupa baru
            localFiles[idx].status = 'pending_sync';
            localStorage.setItem('siswa_local_files', JSON.stringify(localFiles));
            
            // C. Panggil Overwrite Sync (Khas untuk PDF)
            await performOverwriteSync(localFiles[idx]);
        }
    }

    async function performOverwriteSync(file) {
        const accessToken = localStorage.getItem('siswaklik_access_token');
        if (!accessToken) return;

        try {
            let url = 'https://www.googleapis.com/upload/drive/v3/files';
            let method = 'POST';

            // Jika file dah ada driveId, kita guna method PATCH untuk overwrite
            if (file.driveId) {
                url = `https://www.googleapis.com/upload/drive/v3/files/${file.driveId}?uploadType=media`;
                method = 'PATCH';
                
                // Upload content sahaja untuk PATCH
                const blob = dataURLtoBlob(file.content);
                await fetch(url, {
                    method: method,
                    headers: { 'Authorization': `Bearer ${accessToken}` },
                    body: blob
                });
            } else {
                // First time upload (create)
                if (typeof backgroundSync === 'function') backgroundSync();
            }

            document.getElementById('sync-status').innerText = "Tersimpan di Drive";
            document.getElementById('sync-dot').classList.remove('animate-pulse', 'bg-yellow-500');
            document.getElementById('sync-dot').classList.add('bg-green-500');
            
            Swal.fire({ icon: 'success', title: 'Berjaya', text: 'Fail telah dikemaskini di Google Drive!', timer: 1500, showConfirmButton: false });

        } catch (err) {
            console.error("Sync Error:", err);
            document.getElementById('sync-status').innerText = "Gagal Sync";
        }
    }

    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], {type:mime});
    }

    initEditor();
</script>

<style>
    .canvas-container { position: absolute !important; top: 0; left: 0; z-index: 10; }
    #pdf-background { z-index: 5; }
</style>
