<div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col h-[90vh] animate-in slide-in-from-bottom-6 border border-slate-100">
    <div class="p-6 border-b border-slate-100 flex flex-wrap gap-4 items-center justify-between bg-white/80 backdrop-blur-md sticky top-0 z-10">
        <div class="flex items-center gap-4">
            <button onclick="goBack()" class="p-3 hover:bg-blue-50 rounded-full transition-all group border border-transparent hover:border-blue-100">
                <i class="fas fa-arrow-left text-slate-400 group-hover:text-blue-600"></i>
            </button>
            <div>
                <h3 class="font-black text-slate-800 text-lg md:text-xl truncate max-w-[200px]" id="display-filename">Memuatkan...</h3>
                <div class="flex items-center gap-2">
                    <span id="sync-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <p id="sync-status" class="text-[10px] text-blue-600 font-black uppercase tracking-widest">Universal Viewer (PDF.js)</p>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button id="upload-drive-btn" class="hidden bg-blue-600 text-white px-5 py-2.5 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all active:scale-95 flex items-center gap-2 text-sm" onclick="uploadToDrive()">
                <i class="fas fa-cloud-upload-alt"></i> <span>SIMPAN</span>
            </button>

            <button onclick="confirmDelete()" class="p-3 bg-red-50 text-red-500 hover:bg-red-500 hover:text-white rounded-2xl transition-all flex items-center gap-2 font-bold px-5 text-sm border border-red-100">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
    </div>

    <div class="flex-1 bg-slate-200 overflow-auto relative p-4" id="pdf-scroll-container">
        <div id="loading-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-white/90 backdrop-blur-sm">
            <div class="relative">
                <div class="w-16 h-16 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                <i class="fas fa-file-pdf absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-red-500 text-xl"></i>
            </div>
            <p id="loading-text" class="text-slate-500 font-bold mt-4 tracking-tight">Menyediakan paparan mudah alih...</p>
        </div>
        
        <div id="pdf-render-wrapper" class="flex flex-col items-center gap-4"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    (function() {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const editingId = localStorage.getItem('editing_file_id');
        const editingName = localStorage.getItem('editing_file_name');
        const accessToken = localStorage.getItem('siswaklik_access_token');
        const currentFolderId = localStorage.getItem('siswaklik_current_folder_id') || 'root';

        document.getElementById('display-filename').innerText = editingName || "Fail PDF";

        window.goBack = function() {
            document.getElementById('pdf-render-wrapper').innerHTML = '';
            if (typeof loadView === 'function') loadView('folder.html');
        };

        async function initViewer() {
            const loader = document.getElementById('loading-overlay');
            const statusLabel = document.getElementById('sync-status');
            const dot = document.getElementById('sync-dot');
            
            try {
                let pdfData;
                const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
                // Cari fail dalam storage local dahulu
                const localData = localFiles.find(f => f.id === editingId || f.driveId === editingId);

                // KES 1: Fail ada dalam Local Storage (Belum Sync atau Cache)
                if (localData && localData.content) {
                    if (!localData.driveId) {
                        document.getElementById('upload-drive-btn').classList.remove('hidden');
                        statusLabel.innerText = "Mod Luar Talian (Offline)";
                        dot.classList.replace('bg-green-500', 'bg-amber-500');
                    }
                    pdfData = dataURLtoUint8Array(localData.content);
                } 
                // KES 2: Fail sedia ada dalam Google Drive (Detect terus dari Drive)
                else if (accessToken && editingId && !editingId.startsWith('local-')) {
                    statusLabel.innerText = "Menghubungkan ke Drive...";
                    
                    const response = await fetch(`https://www.googleapis.com/drive/v3/files/${editingId}?alt=media`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });

                    if (!response.ok) {
                        if (response.status === 404) throw new Error("Fail tidak ditemui di Google Drive.");
                        throw new Error("Akses Google Drive ditolak.");
                    }

                    const arrayBuffer = await response.arrayBuffer();
                    pdfData = new Uint8Array(arrayBuffer);
                    
                    statusLabel.innerText = "Paparan Cloud Google Drive";
                    dot.classList.replace('bg-green-500', 'bg-blue-500');
                } else {
                    throw new Error("ID Fail tidak sah atau data hilang.");
                }

                if (pdfData) {
                    renderPdf(pdfData);
                }

            } catch (err) {
                console.error("Viewer Error:", err);
                loader.innerHTML = `
                    <div class="text-center p-6">
                        <i class="fas fa-exclamation-triangle text-red-500 text-3xl mb-2"></i>
                        <p class="font-bold text-slate-800">${err.message}</p>
                        <button onclick="goBack()" class="mt-4 text-blue-600 font-bold">Kembali</button>
                    </div>`;
            }
        }

        async function renderPdf(data) {
            const wrapper = document.getElementById('pdf-render-wrapper');
            const loader = document.getElementById('loading-overlay');
            
            try {
                const pdf = await pdfjsLib.getDocument({data: data}).promise;
                wrapper.innerHTML = ''; 

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.className = "shadow-lg mb-4 max-w-full h-auto rounded-lg";
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    wrapper.appendChild(canvas);

                    await page.render({
                        canvasContext: context,
                        viewport: viewport
                    }).promise;
                }
                loader.classList.add('hidden');
            } catch (e) {
                console.error("Render error:", e);
                loader.innerHTML = `<p class="text-red-500 font-bold">Gagal memproses struktur PDF.</p>`;
            }
        }

        function dataURLtoUint8Array(dataurl) {
            var arr = dataurl.split(','),
                bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
            while(n--) u8arr[n] = bstr.charCodeAt(n);
            return u8arr;
        }

        window.confirmDelete = async function() {
            const result = await Swal.fire({
                title: 'Padam Fail?',
                text: "Tindakan ini tidak boleh diundur!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Padam'
            });

            if (result.isConfirmed) {
                // Padam dari local storage
                let localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
                localStorage.setItem('siswa_local_files', JSON.stringify(localFiles.filter(f => f.id !== editingId && f.driveId !== editingId)));
                
                // Padam dari Google Drive jika ada ID Drive
                if (accessToken && editingId && !editingId.startsWith('local-')) {
                    try {
                        await fetch(`https://www.googleapis.com/drive/v3/files/${editingId}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${accessToken}` }
                        });
                    } catch(e) { console.error("Drive delete error", e); }
                }
                goBack();
            }
        };

        window.uploadToDrive = async function() {
            const btn = document.getElementById('upload-drive-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i>';

            try {
                const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
                const file = localFiles.find(f => f.id === editingId);
                
                if (!file) throw new Error("Data fail tidak ditemui.");

                const metadata = { 
                    name: file.name, 
                    mimeType: 'application/pdf', 
                    parents: [currentFolderId] 
                };

                const formData = new FormData();
                formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                formData.append('file', new Blob([dataURLtoUint8Array(file.content)], { type: 'application/pdf' }));

                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` },
                    body: formData
                });

                if (response.ok) {
                    const driveData = await response.json();
                    file.driveId = driveData.id;
                    file.status = 'synced';
                    localStorage.setItem('siswa_local_files', JSON.stringify(localFiles));
                    
                    Swal.fire('Berjaya', 'Fail telah diselaraskan ke Google Drive', 'success');
                    btn.classList.add('hidden');
                    initViewer(); // Refresh status
                } else {
                    throw new Error("Gagal memuat naik.");
                }
            } catch (err) { 
                Swal.fire('Ralat', err.message, 'error'); 
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> <span>SIMPAN</span>';
            }
        };

        initViewer();
    })();
</script>

<style>
    canvas {
        max-width: 100% !important;
        height: auto !important;
        background: white;
    }
    #pdf-scroll-container::-webkit-scrollbar {
        width: 6px;
    }
    #pdf-scroll-container::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
    }
    .slide-in-from-bottom-6 {
        animation: slideIn 0.5s ease-out;
    }
    @keyframes slideIn {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
</style>
