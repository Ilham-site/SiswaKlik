<div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col h-[85vh] animate-in slide-in-from-bottom-4">
    <div class="p-6 border-b flex flex-wrap gap-2 items-center justify-between bg-white">
        <div class="flex items-center gap-4">
            <button onclick="loadView('folder.html')" class="p-2 hover:bg-gray-100 rounded-full transition">
                <i class="fas fa-arrow-left text-gray-400"></i>
            </button>
            <div>
                <h3 class="font-black text-slate-800" id="editing-filename">Editor PDF</h3>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Mod Penyuntingan Pintar</p>
            </div>
        </div>
        
        <div class="flex gap-3">
            <button onclick="saveChanges()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">
                SIMPAN & SYNC
            </button>
        </div>
    </div>

    <div class="flex-1 bg-slate-100 p-8 overflow-auto flex justify-center">
        <div class="bg-white shadow-2xl p-4 min-w-[300px] min-h-[400px] rounded-lg flex items-center justify-center">
            <p class="text-slate-400 italic">Memuatkan kandungan fail...</p>
        </div>
    </div>
</div>

<script>
    const editingId = localStorage.getItem('editing_file_id');
    const editingName = localStorage.getItem('editing_file_name');
    document.getElementById('editing-filename').innerText = editingName;

    function saveChanges() {
        let localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
        const fileIndex = localFiles.findIndex(f => f.id === editingId);

        if (fileIndex !== -1) {
            // Di sini anda akan ambil data dari canvas/editor anda
            // Contoh: const updatedContent = canvas.toDataURL();
            
            localFiles[fileIndex].status = 'pending_sync'; // Set balik ke pending supaya di-upload semula
            // localFiles[fileIndex].content = updatedContent; 

            localStorage.setItem('siswa_local_files', JSON.stringify(localFiles));
            
            alert("Perubahan disimpan secara lokal. Sync sedang berjalan di latar belakang.");
            loadView('folder.html');
        }
    }
</script>
