<section class="animate-in fade-in duration-500">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
        <div>
            <h2 class="text-3xl font-bold text-gray-900">Fail Peribadi</h2>
            <div class="flex items-center gap-2 mt-1">
                <span id="sync-status" class="flex h-2 w-2 rounded-full bg-green-500"></span>
                <p id="current-path" class="text-gray-500 font-medium text-sm text-blue-600 font-bold">Root /</p>
            </div>
        </div>
        <div class="flex gap-3 w-full md:w-auto">
            <button id="backBtn" onclick="goBack()" class="hidden bg-gray-100 px-5 py-3 rounded-2xl font-bold hover:bg-gray-200 transition">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button onclick="createNewFolder()" class="flex-1 bg-white border border-gray-200 px-6 py-3 rounded-2xl font-bold shadow-sm hover:bg-gray-50 transition">
                <i class="fas fa-folder-plus text-yellow-500 mr-2"></i> Folder
            </button>
            <label class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition cursor-pointer text-center">
                <i class="fas fa-cloud-upload-alt mr-2"></i> Upload
                <input type="file" id="driveUpload" class="hidden" onchange="handleFileUpload(this)" accept=".pdf">
            </label>
        </div>
    </div>

    <div id="driveContent" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div class="col-span-full text-center py-20" id="drive-loader">
            <i class="fas fa-circle-notch animate-spin text-4xl text-blue-600 mb-4"></i>
            <p class="text-slate-400 font-bold">Menyusun fail peribadi...</p>
        </div>
    </div>
</section>

<div id="editorModal" class="fixed inset-0 bg-slate-900 z-[100] hidden flex flex-col overflow-hidden">
    <div class="p-3 bg-white border-b flex flex-wrap gap-2 items-center justify-between shadow-md">
        <div class="flex items-center gap-1 bg-gray-50 p-1 rounded-xl">
            <button onclick="setMode('select')" class="tool-btn p-2 rounded-lg hover:bg-blue-100" title="Select/Lasso"><i class="fas fa-mouse-pointer"></i></button>
            <button onclick="setMode('pencil')" class="tool-btn p-2 rounded-lg hover:bg-blue-100" title="Pen"><i class="fas fa-pen"></i></button>
            <button onclick="setMode('eraser')" class="tool-btn p-2 rounded-lg hover:bg-blue-100" title="Eraser"><i class="fas fa-eraser"></i></button>
            <button onclick="setMode('text')" class="tool-btn p-2 rounded-lg hover:bg-blue-100" title="Taip Teks"><i class="fas fa-font"></i></button>
            <button onclick="toggleRuler()" class="tool-btn p-2 rounded-lg hover:bg-blue-100" title="Ruler"><i class="fas fa-ruler-horizontal"></i></button>
            <div class="h-6 w-[1px] bg-gray-300 mx-1"></div>
            <button onclick="deleteSelected()" class="p-2 rounded-lg hover:bg-red-100 text-red-500" title="Padam"><i class="fas fa-trash"></i></button>
        </div>

        <div class="flex items-center gap-3">
            <input type="color" id="penColor" onchange="updateBrush()" class="w-8 h-8 rounded-lg cursor-pointer border-none bg-transparent">
            <select id="penWidth" onchange="updateBrush()" class="bg-gray-50 border rounded-lg px-2 py-1 text-xs font-bold">
                <option value="2">Nipis</option>
                <option value="5" selected>Sederhana</option>
                <option value="10">Tebal</option>
            </select>
            <select id="fontSize" class="bg-gray-50 border rounded-lg px-2 py-1 text-xs font-bold">
                <option value="16">16px</option>
                <option value="24" selected>24px</option>
                <option value="48">48px</option>
                <option value="72">72px</option>
            </select>
            <div class="flex gap-1 border-l pl-3">
                <button onclick="undo()" class="p-2 hover:bg-gray-100 rounded-lg"><i class="fas fa-undo"></i></button>
                <button onclick="redo()" class="p-2 hover:bg-gray-100 rounded-lg"><i class="fas fa-redo"></i></button>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="addNewPage()" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">
                + New Page
            </button>
            <button onclick="saveAndSync()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg">
                SAVE & SYNC
            </button>
            <button onclick="closeEditor()" class="text-gray-400 hover:text-red-500 px-2 text-2xl font-bold">&times;</button>
        </div>
    </div>

    <div class="flex-1 overflow-auto bg-slate-200 p-4 md:p-10 flex flex-col items-center gap-4 relative" id="canvas-container">
        <div id="ruler-guide" class="hidden absolute top-0 left-0 w-full h-1 bg-blue-500/30 pointer-events-none z-10"></div>
        <div class="bg-white shadow-2xl relative" id="canvas-wrapper">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>
    let canvas, currentFileId, currentFolderId = 'root';
    let folderStack = [{id: 'root', name: 'Root'}];
    let undoStack = [], redoStack = [];
    const ACCESS_TOKEN = localStorage.getItem('siswaklik_access_token');

    // -- INITIALIZATION --
    function initCanvas() {
        canvas = new fabric.Canvas('pdf-canvas', {
            isDrawingMode: false,
            width: 800,
            height: 1100,
            backgroundColor: '#ffffff'
        });
        canvas.on('object:added', () => { if(!isLoading) saveState(); });
        canvas.on('object:modified', saveState);
    }

    // -- DRIVE LOGIC (FETCH & RENDER) --
    async function loadFiles(folderId = 'root') {
        currentFolderId = folderId;
        const loader = document.getElementById('drive-loader');
        if(loader) loader.style.display = 'block';
        
        try {
            const q = `'${folderId}' in parents and trashed = false`;
            const resp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,mimeType)&orderBy=folder,name`, {
                headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
            });
            const data = await resp.json();
            renderGrid(data.files || []);
        } catch (e) {
            Swal.fire('Ralat', 'Gagal menyambung ke Google Drive.', 'error');
        }
    }

    function renderGrid(files) {
        const container = document.getElementById('driveContent');
        document.getElementById('drive-loader').style.display = 'none';
        
        if (files.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center py-10 opacity-40 font-bold">Folder ini kosong</div>`;
            return;
        }

        container.innerHTML = files.map(f => {
            const isFolder = f.mimeType === 'application/vnd.google-apps.folder';
            return `
                <div onclick="${isFolder ? `openFolder('${f.id}', '${f.name}')` : `openEditor('${f.id}', '${f.name}')`}" 
                     class="bg-white p-6 rounded-[2.5rem] border border-gray-100 shadow-sm hover:shadow-xl transition-all cursor-pointer group animate-in slide-in-from-bottom-2">
                    <i class="fas ${isFolder ? 'fa-folder text-yellow-400' : 'fa-file-pdf text-red-500'} text-4xl mb-4"></i>
                    <h3 class="font-bold text-gray-800 truncate text-sm">${f.name}</h3>
                    <p class="text-[10px] text-gray-400 font-bold uppercase mt-1 italic">${isFolder ? 'Open Folder' : 'Edit PDF'}</p>
                </div>
            `;
        }).join('');
    }

    // -- FOLDER ACTIONS --
    async function createNewFolder() {
        const { value: folderName } = await Swal.fire({
            title: 'Folder Baru',
            input: 'text',
            inputPlaceholder: 'Masukkan nama folder...',
            showCancelButton: true
        });

        if (folderName) {
            Swal.showLoading();
            try {
                const resp = await fetch('https://www.googleapis.com/drive/v3/files', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: folderName,
                        mimeType: 'application/vnd.google-apps.folder',
                        parents: [currentFolderId === 'root' ? null : currentFolderId].filter(Boolean)
                    })
                });
                if(resp.ok) {
                    Swal.fire('Berjaya', 'Folder dicipta!', 'success');
                    loadFiles(currentFolderId);
                }
            } catch (e) { Swal.fire('Ralat', 'Gagal mencipta folder.', 'error'); }
        }
    }

    function openFolder(id, name) {
        folderStack.push({id, name});
        updatePathUI();
        loadFiles(id);
    }

    function goBack() {
        if (folderStack.length > 1) {
            folderStack.pop();
            const last = folderStack[folderStack.length - 1];
            updatePathUI();
            loadFiles(last.id);
        }
    }

    function updatePathUI() {
        const path = folderStack.map(f => f.name).join(' / ');
        document.getElementById('current-path').innerText = path;
        document.getElementById('backBtn').classList.toggle('hidden', folderStack.length === 1);
    }

    // -- FILE UPLOAD (HYBRID) --
    async function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;

        Swal.fire({ title: 'Memuat naik...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        // Simpan ke Drive
        const metadata = { name: file.name, parents: [currentFolderId === 'root' ? null : currentFolderId].filter(Boolean) };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', file);

        try {
            const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` },
                body: form
            });
            const data = await resp.json();
            
            // Simpan cache local
            const reader = new FileReader();
            reader.onload = e => localStorage.setItem(`pdf_cache_${data.id}`, e.target.result);
            reader.readAsDataURL(file);

            Swal.fire('Berjaya', 'Fail telah dimuat naik.', 'success');
            loadFiles(currentFolderId);
        } catch (e) { Swal.fire('Ralat', 'Muat naik gagal.', 'error'); }
    }

    // -- EDITOR LOGIC --
    let isLoading = false;
    async function openEditor(fileId, fileName) {
        isLoading = true;
        document.getElementById('editorModal').classList.remove('hidden');
        if (!canvas) initCanvas();
        canvas.clear();
        
        currentFileId = fileId;
        const cached = localStorage.getItem(`pdf_cache_${fileId}`);
        
        let blob;
        try {
            if (cached) {
                blob = await (await fetch(cached)).blob();
            } else {
                const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
                });
                blob = await resp.blob();
                // Cache it
                const reader = new FileReader();
                reader.onload = e => localStorage.setItem(`pdf_cache_${fileId}`, e.target.result);
                reader.readAsDataURL(blob);
            }

            const url = URL.createObjectURL(blob);
            const pdf = await pdfjsLib.getDocument(url).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 1.5 });

            const tempCanvas = document.createElement('canvas');
            tempCanvas.height = viewport.height;
            tempCanvas.width = viewport.width;
            await page.render({ canvasContext: tempCanvas.getContext('2d'), viewport }).promise;

            fabric.Image.fromURL(tempCanvas.toDataURL(), (img) => {
                canvas.setDimensions({ width: viewport.width, height: viewport.height });
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                isLoading = false;
                saveState();
            });
        } catch (e) { 
            Swal.fire('Ralat', 'Gagal membuka PDF.', 'error');
            closeEditor();
        }
    }

    function setMode(mode) {
        canvas.isDrawingMode = (mode === 'pencil' || mode === 'eraser');
        canvas.selection = (mode === 'select');
        
        if (mode === 'eraser') {
            canvas.freeDrawingBrush = new fabric.EraserBrush(canvas);
            canvas.freeDrawingBrush.width = 15;
        } else if (mode === 'pencil') {
            canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
            updateBrush();
        } else if (mode === 'text') {
            const text = new fabric.IText('Klik & Taip', {
                left: 100, top: 100,
                fontSize: parseInt(document.getElementById('fontSize').value),
                fill: document.getElementById('penColor').value,
                fontFamily: 'Arial'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }
    }

    function updateBrush() {
        if (canvas.isDrawingMode && !(canvas.freeDrawingBrush instanceof fabric.EraserBrush)) {
            canvas.freeDrawingBrush.color = document.getElementById('penColor').value;
            canvas.freeDrawingBrush.width = parseInt(document.getElementById('penWidth').value);
        }
    }

    function toggleRuler() {
        const ruler = document.getElementById('ruler-guide');
        ruler.classList.toggle('hidden');
        Swal.fire({ toast: true, position: 'top-end', title: 'Ruler Guide diaktifkan', showConfirmButton: false, timer: 1500 });
    }

    function addNewPage() {
        const currentHeight = canvas.getHeight();
        canvas.setHeight(currentHeight + 1100);
        // Tambah line pemisah visual
        const line = new fabric.Line([0, currentHeight, canvas.width, currentHeight], {
            stroke: '#cbd5e1', strokeWidth: 2, selectable: false, dashArray: [5, 5]
        });
        canvas.add(line);
        canvas.renderAll();
    }

    async function saveAndSync() {
        document.getElementById('sync-status').classList.replace('bg-green-500', 'bg-orange-500');
        Swal.fire({ title: 'Menyimpan & Sync...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const dataUrl = canvas.toDataURL({ format: 'png', quality: 1 });
        const pdfDoc = await PDFLib.PDFDocument.create();
        const page = pdfDoc.addPage([canvas.width, canvas.height]);
        const img = await pdfDoc.embedPng(dataUrl);
        page.drawImage(img, { x: 0, y: 0, width: canvas.width, height: canvas.height });

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });

        // Update Local Cache
        const reader = new FileReader();
        reader.onload = e => localStorage.setItem(`pdf_cache_${currentFileId}`, e.target.result);
        reader.readAsDataURL(blob);

        try {
            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${currentFileId}?uploadType=media`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}`, 'Content-Type': 'application/pdf' },
                body: blob
            });
            document.getElementById('sync-status').classList.replace('bg-orange-500', 'bg-green-500');
            Swal.fire('Berjaya!', 'Fail telah dikemas kini ke Drive.', 'success');
        } catch (e) {
            Swal.fire('Sync Tertunda', 'Fail disimpan secara local. Akan sync bila internet stabil.', 'warning');
        }
    }

    function saveState() {
        if(isLoading) return;
        undoStack.push(canvas.toJSON());
        redoStack = [];
    }

    function undo() {
        if (undoStack.length > 1) {
            redoStack.push(undoStack.pop());
            isLoading = true;
            canvas.loadFromJSON(undoStack[undoStack.length - 1], () => {
                canvas.renderAll();
                isLoading = false;
            });
        }
    }

    function deleteSelected() {
        canvas.getActiveObjects().forEach(obj => canvas.remove(obj));
        canvas.discardActiveObject().renderAll();
    }

    function closeEditor() {
        document.getElementById('editorModal').classList.add('hidden');
    }

    // Auto-start
    loadFiles();
</script>

<style>
    .tool-btn:hover { background-color: #f0f7ff; color: #2563eb; }
    canvas { cursor: crosshair; }
    #canvas-container::-webkit-scrollbar { width: 8px; }
    #canvas-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
