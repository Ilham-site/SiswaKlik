<section class="animate-in fade-in duration-500">
    <div id="file-system-content">
        <div class="text-center py-20">
            <i class="fas fa-circle-notch animate-spin text-4xl text-blue-600 mb-4"></i>
            <p class="text-slate-400 font-bold">Memuatkan sistem fail...</p>
        </div>
    </div>
</section>

<style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Amiri:ital@0;1&family=Quicksand:wght@300;400;500;600;700&display=swap');

        :root {
            --emerald-primary: #10b981;
            --emerald-dark: #064e3b;
            --emerald-bright: #34d399;
            --emerald-glow: rgba(16, 185, 129, 0.4);
        }

        .dark { background-color: #0f172a; color: #ffffff; }
        .light { background-color: #f8fafc; color: #0f172a; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.4s ease;
            min-height: 100vh;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: url('https://i.ibb.co/8nn2Pd1n/Pngtree-abstract-gradient-crystal-texure-background-1391215.png');
            background-size: cover;
            background-attachment: fixed;
        }

        .dark .bg-overlay { filter: brightness(0.3) contrast(1.1); }
        .light .bg-overlay { filter: brightness(1) opacity(0.2); }

        .glass {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .dark .glass { background: rgba(30, 41, 59, 0.7); }
        .light .glass { background: rgba(255, 255, 255, 0.8); }

        .sidebar {
            transform: translateX(-110%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        .sidebar.active { transform: translateX(0); }

        .nav-button {
            padding: 20px;
            border-radius: 24px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .active-emerald {
            background: linear-gradient(135deg, var(--emerald-primary), var(--emerald-dark)) !important;
            color: white !important;
            box-shadow: 0 10px 20px var(--emerald-glow);
        }

        .swal-emerald-popup {
            border-radius: 30px !important;
            border: 2px solid var(--emerald-primary) !important;
        }
        .dark .swal-emerald-popup { background: #1e293b !important; color: white !important; }

        .arabic { font-family: 'Amiri', serif; }
        
        .section-fade { animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<script>
    // 1. PENGURUSAN VIEW (Memuatkan folder.html atau pdf.html ke dalam fail.html)
    async function loadView(fileName, callback) {
        try {
            const response = await fetch(fileName);
            const html = await response.text();
            const container = document.getElementById('file-system-content');
            container.innerHTML = html;

            // Menjalankan semula script yang ada dalam file yang di-fetch
            const scripts = container.querySelectorAll("script");
            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });

            if (callback) callback();
        } catch (error) {
            console.error("Ralat memuatkan pandangan:", error);
            document.getElementById('file-system-content').innerHTML = `
                <div class="text-center py-20 text-red-500">
                    <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                    <p class="font-bold">Gagal memuatkan sistem fail. Sila cuba lagi.</p>
                </div>`;
        }
    }

    // 2. LOGIK AUTO-SYNC BACKGROUND
    // Fungsi ini memastikan fail yang dimuat naik secara 'offline' dihantar ke Drive secara automatik
    async function backgroundSync() {
        const accessToken = localStorage.getItem('siswaklik_access_token');
        if (!accessToken) return;

        let localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
        const pendingFiles = localFiles.filter(f => f.status === 'pending_sync');

        if (pendingFiles.length === 0) return;

        for (const file of pendingFiles) {
            try {
                // Gunakan parentId fail tersebut, jika tiada hantar ke root Drive SiswaKlik
                const targetFolderId = file.parentId || localStorage.getItem('siswaklik_drive_folder_id') || 'root';

                const metadata = {
                    name: file.name,
                    parents: [targetFolderId]
                };

                const formData = new FormData();
                formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                formData.append('file', dataURLtoBlob(file.content));

                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` },
                    body: formData
                });

                if (response.ok) {
                    const driveFile = await response.json();
                    
                    // Kemaskini status fail dalam local storage
                    let currentFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
                    const fileIndex = currentFiles.findIndex(f => f.id === file.id);
                    if (fileIndex !== -1) {
                        currentFiles[fileIndex].status = 'synced';
                        currentFiles[fileIndex].driveId = driveFile.id;
                        localStorage.setItem('siswa_local_files', JSON.stringify(currentFiles));
                    }
                    
                    // Jika pengguna sedang melihat folder yang sama, refresh senarai fail
                    if (typeof renderFiles === 'function') {
                        renderFiles();
                    }
                }
            } catch (err) {
                console.error("Sync gagal untuk:", file.name, err);
            }
        }
    }

    // Penukaran data URL ke Blob untuk penghantaran API
    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], {type:mime});
    }

    // Jalankan sync setiap 15 saat
    if (!window.syncInterval) {
        window.syncInterval = setInterval(backgroundSync, 15000);
    }

    // Mula-mula, muat naik folder.html (UI senarai fail)
    loadView('folder.html');
</script>
