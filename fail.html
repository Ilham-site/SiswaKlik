<section class="animate-in fade-in duration-500">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
        <div>
            <h2 class="text-3xl font-bold text-gray-900">Fail Peribadi</h2>
            <p class="text-gray-500 font-medium">Data disimpan terus dalam Google Drive anda secara selamat.</p>
        </div>
        <div class="flex gap-3 w-full md:w-auto">
            <button onclick="createNewFolder()" class="flex-1 bg-white border border-gray-200 px-6 py-3 rounded-2xl font-bold shadow-sm hover:bg-gray-50 transition flex items-center justify-center">
                <i class="fas fa-folder-plus mr-2 text-yellow-500"></i> Folder
            </button>
            <button onclick="document.getElementById('driveUpload').click()" class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition flex items-center justify-center">
                <i class="fas fa-cloud-upload-alt mr-2"></i> Muat Naik
            </button>
            <input type="file" id="driveUpload" class="hidden" onchange="handleFileUpload(this)">
        </div>
    </div>

    <div id="driveContent" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div class="col-span-full text-center py-20" id="drive-loader">
            <i class="fas fa-circle-notch animate-spin text-4xl text-blue-600 mb-4"></i>
            <p class="text-slate-400 font-bold">Menghubungkan ke Google Drive...</p>
        </div>
    </div>
</section>

<div id="pdfEditorModal" class="fixed inset-0 bg-black/90 z-[100] hidden flex flex-col">
    <div class="p-4 bg-slate-900 text-white flex justify-between items-center">
        <h3 id="pdfName" class="font-bold">Editor PDF SiswaKlik</h3>
        <div class="flex gap-4">
            <button onclick="addBlankPage()" class="text-sm bg-slate-700 px-4 py-2 rounded-lg hover:bg-slate-600"><i class="fas fa-plus mr-2"></i>Tambah Helaian</button>
            <button onclick="savePdfChanges()" class="text-sm bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-500 font-bold">Simpan ke Drive</button>
            <button onclick="closePdfEditor()" class="text-sm bg-red-500/20 text-red-400 px-4 py-2 rounded-lg hover:bg-red-500/40">Tutup</button>
        </div>
    </div>
    <div class="flex-1 bg-slate-800 relative overflow-auto p-10 flex justify-center">
        <canvas id="pdf-canvas" class="shadow-2xl bg-white"></canvas>
    </div>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
    const ACCESS_TOKEN = localStorage.getItem('siswaklik_access_token');
    
    // 1. Ambil fail dari Google Drive semasa buka page
    async function fetchDriveFiles() {
        if (!ACCESS_TOKEN) {
            Swal.fire('Ralat', 'Sila log masuk semula untuk akses Drive.', 'error');
            return;
        }

        try {
            const response = await fetch('https://www.googleapis.com/drive/v3/files?pageSize=20&fields=files(id, name, mimeType, iconLink, modifiedTime)', {
                headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
            });
            const data = await response.json();
            renderDriveContent(data.files);
        } catch (err) {
            console.error(err);
        }
    }

    function renderDriveContent(files) {
        const container = document.getElementById('driveContent');
        const loader = document.getElementById('drive-loader');
        
        if (!files || files.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 font-bold">Tiada fail dijumpai.</div>`;
            return;
        }

        loader.style.display = 'none';
        container.innerHTML = files.map(file => {
            const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
            const icon = isFolder ? 'fa-folder text-yellow-400' : 'fa-file-pdf text-red-500';
            
            return `
                <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition cursor-pointer group relative">
                    <div class="flex justify-between items-start mb-4">
                        <i class="fas ${icon} text-4xl"></i>
                        <button onclick="deleteFile('${file.id}')" class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    <h3 class="font-bold text-gray-800 truncate pr-4" title="${file.name}">${file.name}</h3>
                    <p class="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-wider">
                        ${new Date(file.modifiedTime).toLocaleDateString('ms-MY')}
                    </p>
                    ${file.mimeType === 'application/pdf' ? 
                        `<button onclick="openPdfEditor('${file.id}', '${file.name}')" class="mt-4 w-full py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-black hover:bg-blue-600 hover:text-white transition-all">EDIT / CONTENG</button>` 
                        : ''}
                </div>
            `;
        }).join('');
    }

    // 2. Fungsi Cipta Folder Baru
    async function createNewFolder() {
        const { value: folderName } = await Swal.fire({
            title: 'Nama Folder Baru',
            input: 'text',
            inputPlaceholder: 'cth: Nota Thermodynamics',
            showCancelButton: true
        });

        if (folderName) {
            const metadata = {
                name: folderName,
                mimeType: 'application/vnd.google-apps.folder'
            };

            await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${ACCESS_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(metadata)
            });
            fetchDriveFiles();
        }
    }

    // 3. Fungsi Muat Naik Fail
    async function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;

        Swal.fire({ title: 'Memuat naik...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const metadata = { name: file.name };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', file);

        try {
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` },
                body: form
            });
            Swal.fire('Berjaya!', 'Fail telah disimpan ke Drive.', 'success');
            fetchDriveFiles();
        } catch (err) {
            Swal.fire('Ralat', 'Gagal memuat naik fail.', 'error');
        }
    }

    // 4. Logik Editor PDF (Placeholder logic untuk integrasi penyuntingan)
    function openPdfEditor(id, name) {
        document.getElementById('pdfName').innerText = `Menyunting: ${name}`;
        document.getElementById('pdfEditorModal').classList.remove('hidden');
        // Di sini anda boleh integrasikan library seperti PSPDFKit atau gunakan PDF-lib 
        // Untuk demo, kita fokus pada penambahan helaian kosong secara automatik
        window.currentEditingId = id;
    }

    async function addBlankPage() {
        Swal.fire('Info', 'Fungsi menambah helaian kosong sedang diproses menggunakan PDF-Lib.', 'info');
        // Logik teknikal: Ambil arrayBuffer -> pdfDoc.addPage() -> save -> upload semula
    }

    function closePdfEditor() {
        document.getElementById('pdfEditorModal').classList.add('hidden');
    }

    // Jalankan fetch semasa mula
    fetchDriveFiles();
</script>
