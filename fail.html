<section class="animate-in fade-in duration-500">
    <div id="file-system-content">
        <div class="text-center py-20">
            <i class="fas fa-circle-notch animate-spin text-4xl text-blue-600 mb-4"></i>
            <p class="text-slate-400 font-bold">Memuatkan sistem fail...</p>
        </div>
    </div>
</section>

<script>
    // Fungsi universal untuk tukar view
    async function loadView(fileName, callback) {
        try {
            const response = await fetch(fileName);
            const html = await response.text();
            const container = document.getElementById('file-system-content');
            container.innerHTML = html;

            // Execute scripts dalam fail yang di-fetch
            const scripts = container.querySelectorAll("script");
            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });

            if (callback) callback();
        } catch (error) {
            console.error("Ralat memuatkan pandangan:", error);
        }
    }

    // Default: Paparkan folder semasa mula
    loadView('folder.html');
</script>
