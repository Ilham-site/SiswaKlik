<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalendar SiswaKlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: transparent; 
            overflow: hidden; 
        }

        .fc { 
            --fc-border-color: #f1f5f9; 
            --fc-button-bg-color: #ffffff;
            --fc-button-border-color: #e2e8f0;
            --fc-button-text-color: #64748b;
            --fc-button-active-bg-color: #2563eb;
            --fc-button-active-border-color: #2563eb;
            --fc-today-bg-color: #eff6ff;
        }

        .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 800; color: #1e293b; }
        
        .fc .fc-button {
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 5px 12px;
        }

        .fc-event {
            cursor: pointer;
            border-radius: 6px;
            padding: 2px 5px;
            border: none !important;
            transition: transform 0.1s;
        }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }

        .color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; }
        .color-opt:hover { transform: scale(1.2); }
        .color-opt.active { ring: 2px; ring-offset: 2px; ring-color: #64748b; }

        input, select, textarea {
            font-size: 0.9rem !important;
        }
    </style>
</head>
<body class="p-2">

    <div class="max-w-full bg-white rounded-[2rem] shadow-sm border border-slate-100">
        <div class="p-6 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <h2 class="text-xl font-extrabold text-slate-800">Perancang Akademik</h2>
            </div>
            <button onclick="openModal()" class="w-full md:w-auto bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-plus text-xs"></i> Tambah Aktiviti
            </button>
        </div>

        <div class="p-4">
            <div id="calendar"></div>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center mb-5">
                <h3 id="modalTitle" class="text-lg font-extrabold text-slate-800">Aktiviti Baru</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-4">
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tajuk</label>
                        <input type="text" id="title" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Warna</label>
                        <div class="flex gap-1 mt-2" id="colorPicker">
                            <div class="color-opt bg-red-500" onclick="selectColor('#ef4444', this)"></div>
                            <div class="color-opt bg-orange-500" onclick="selectColor('#f97316', this)"></div>
                            <div class="color-opt bg-yellow-400" onclick="selectColor('#facc15', this)"></div>
                            <div class="color-opt bg-green-500" onclick="selectColor('#22c55e', this)"></div>
                            <div class="color-opt bg-blue-500 active" onclick="selectColor('#3b82f6', this)"></div>
                            <div class="color-opt bg-indigo-500" onclick="selectColor('#6366f1', this)"></div>
                            <div class="color-opt bg-purple-500" onclick="selectColor('#a855f7', this)"></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tarikh Mula</label>
                        <input type="date" id="startDate" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tarikh Tamat</label>
                        <input type="date" id="endDate" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Masa Mula</label>
                        <input type="time" id="startTime" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Masa Tamat</label>
                        <input type="time" id="endTime" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Ulang (Repeat)</label>
                    <select id="repeatType" onchange="toggleCustomRepeat()" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                        <option value="none">Tiada</option>
                        <option value="daily">Setiap Hari</option>
                        <option value="weekly">Setiap Minggu</option>
                        <option value="monthly">Setiap Bulan</option>
                        <option value="yearly">Setiap Tahun</option>
                        <option value="custom">Custom...</option>
                    </select>
                </div>

                <div id="customRepeatPanel" class="hidden p-4 bg-blue-50 rounded-2xl border border-blue-100 space-y-3">
                    <div class="flex items-center gap-2 text-sm">
                        <span>Ulang setiap</span>
                        <input type="number" id="customValue" value="1" class="w-16 p-1 rounded-lg border text-center">
                        <select id="customUnit" class="bg-transparent font-bold">
                            <option value="day">Hari</option>
                            <option value="week">Minggu</option>
                            <option value="month">Bulan</option>
                            <option value="year">Tahun</option>
                        </select>
                    </div>
                    <div class="text-sm">
                        <label class="block font-bold mb-1">Berakhir pada:</label>
                        <div class="flex flex-col gap-1">
                            <label><input type="radio" name="ends" value="never" checked> Never</label>
                            <label class="flex items-center gap-2"><input type="radio" name="ends" value="on"> Pada: <input type="date" id="endOnDate" class="p-1 rounded border"></label>
                            <label class="flex items-center gap-2"><input type="radio" name="ends" value="after"> Selepas: <input type="number" id="endAfterCount" value="1" class="w-12 p-1 rounded border"> kali</label>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Lokasi</label>
                        <input type="text" id="location" placeholder="Lokasi/Link" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Peringatan</label>
                        <select id="reminder" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                            <option value="5">5 Minit sebelum</option>
                            <option value="10">10 Minit sebelum</option>
                            <option value="30">30 Minit sebelum</option>
                            <option value="60">1 Jam sebelum</option>
                            <option value="1440">1 Hari sebelum</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Nota / Deskripsi</label>
                    <textarea id="description" rows="2" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></textarea>
                </div>

                <div class="pt-2 flex gap-3">
                    <button onclick="closeModal()" class="flex-1 py-3 text-slate-500 font-bold hover:bg-slate-50 rounded-xl transition-all">Batal</button>
                    <button onclick="saveEvent()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">Simpan Aktiviti</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let calendar;
        let selectedColor = '#3b82f6';

        // Data Ekstraksi dari Malaysia Calendar API (.md)
        const malaysiaHolidays = [
            {
                title: 'Hari Raya Aidilfitri',
                start: '2026-03-21',
                end: '2026-03-23',
                backgroundColor: '#10b981', // Hijau (Islamic)
                extendedProps: { description: 'Cuti Umum Persekutuan', location: 'Seluruh Malaysia', type: 'federal' }
            },
            {
                title: 'Hari Pekerja',
                start: '2026-05-01',
                backgroundColor: '#ef4444', // Merah (Fixed)
                extendedProps: { description: 'Cuti Umum Persekutuan', location: 'Seluruh Malaysia', type: 'federal' }
            },
            {
                title: 'Hari Kebangsaan',
                start: '2026-08-31',
                backgroundColor: '#ef4444',
                extendedProps: { description: 'Cuti Umum Persekutuan', location: 'Seluruh Malaysia', type: 'federal' }
            },
            {
                title: 'Hari Malaysia',
                start: '2026-09-16',
                backgroundColor: '#ef4444',
                extendedProps: { description: 'Cuti Umum Persekutuan', location: 'Seluruh Malaysia', type: 'federal' }
            },
            {
                title: 'Cuti Penggal 1 (Kump B)',
                start: '2026-05-23',
                end: '2026-06-08',
                backgroundColor: '#f59e0b', // Amber (School)
                extendedProps: { description: 'Takwim Akademik KPM', location: 'Kumpulan B', type: 'school' }
            },
            {
                title: 'Cuti Pertengahan Tahun (Kump B)',
                start: '2026-09-12',
                end: '2026-09-28',
                backgroundColor: '#f59e0b',
                extendedProps: { description: 'Takwim Akademik KPM', location: 'Kumpulan B', type: 'school' }
            },
            {
                title: 'Peperiksaan SPM 2026',
                start: '2026-12-01', // Contoh tarikh tentative
                backgroundColor: '#6366f1', // Indigo (Exam)
                extendedProps: { description: 'Sijil Pelajaran Malaysia', location: 'Pusat Peperiksaan', type: 'exam' }
            }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ms',
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,listMonth'
                },
                editable: true,
                events: malaysiaHolidays, // Memasukkan data Malaysia Calendar
                eventClick: function(info) {
                    showEventDetails(info.event);
                }
            });
            
            calendar.render();
        });

        function selectColor(color, el) {
            selectedColor = color;
            document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('active', 'ring-2'));
            el.classList.add('active', 'ring-2');
        }

        function toggleCustomRepeat() {
            const type = document.getElementById('repeatType').value;
            const panel = document.getElementById('customRepeatPanel');
            panel.classList.toggle('hidden', type !== 'custom');
        }

        function openModal() {
            document.getElementById('eventModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
        }

        function saveEvent() {
            const title = document.getElementById('title').value;
            const startDate = document.getElementById('startDate').value;
            const startTime = document.getElementById('startTime').value || '00:00';
            const endDate = document.getElementById('endDate').value || startDate;
            const endTime = document.getElementById('endTime').value || '23:59';
            const repeat = document.getElementById('repeatType').value;

            if(!title || !startDate) {
                Swal.fire('Ralat', 'Sila isi tajuk dan tarikh!', 'error');
                return;
            }

            let eventData = {
                title: title,
                start: `${startDate}T${startTime}`,
                end: `${endDate}T${endTime}`,
                backgroundColor: selectedColor,
                extendedProps: {
                    description: document.getElementById('description').value,
                    location: document.getElementById('location').value,
                    repeat: repeat,
                    reminder: document.getElementById('reminder').value
                }
            };

            calendar.addEvent(eventData);
            closeModal();
            Swal.fire({
                title: 'Berjaya!',
                text: 'Aktiviti anda telah disimpan.',
                icon: 'success',
                confirmButtonColor: '#2563eb'
            });
        }

        function showEventDetails(event) {
            const props = event.extendedProps;
            Swal.fire({
                title: `<span style="color:${event.backgroundColor}">${event.title}</span>`,
                html: `
                    <div class="text-left text-sm space-y-2 border-t pt-4">
                        <p><strong><i class="fas fa-clock mr-2"></i>Mula:</strong> ${event.start.toLocaleString('ms-MY')}</p>
                        <p><strong><i class="fas fa-flag-checkered mr-2"></i>Tamat:</strong> ${event.end ? event.end.toLocaleString('ms-MY') : 'Satu Hari'}</p>
                        <p><strong><i class="fas fa-map-marker-alt mr-2"></i>Lokasi:</strong> ${props.location || 'N/A'}</p>
                        <p><strong><i class="fas fa-info-circle mr-2"></i>Kategori:</strong> ${props.description || 'Tiada nota tambahan.'}</p>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Tutup',
                cancelButtonText: 'Padam Aktiviti',
                cancelButtonColor: '#ef4444',
                confirmButtonColor: '#2563eb'
            }).then((result) => {
                if (result.dismiss === Swal.DismissReason.cancel) {
                    // Cuti umum tidak boleh dipadam secara manual (logik tambahan)
                    if(props.type === 'federal' || props.type === 'school') {
                        Swal.fire('Info', 'Cuti rasmi tidak boleh dipadam.', 'info');
                    } else {
                        event.remove();
                        Swal.fire('Dipadam', 'Aktiviti telah dibuang.', 'success');
                    }
                }
            });
        }
    </script>
</body>
</html>
