<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalendar SiswaKlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: transparent; 
            overflow: hidden; 
        }

        .fc { 
            --fc-border-color: #f1f5f9; 
            --fc-button-bg-color: #ffffff;
            --fc-button-border-color: #e2e8f0;
            --fc-button-text-color: #64748b;
            --fc-button-active-bg-color: #2563eb;
            --fc-button-active-border-color: #2563eb;
            --fc-today-bg-color: #eff6ff;
        }

        .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 800; color: #1e293b; }
        
        .fc .fc-button {
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 5px 12px;
        }

        .fc-event {
            cursor: pointer;
            border-radius: 6px;
            padding: 2px 5px;
            border: none !important;
            transition: transform 0.1s;
        }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }

        .color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; }
        .color-opt:hover { transform: scale(1.2); }
        .color-opt.active { ring: 2px; ring-offset: 2px; ring-color: #64748b; }

        input, select, textarea {
            font-size: 0.9rem !important;
        }
    </style>
</head>
<body class="p-2">

    <div class="max-w-full bg-white rounded-[2rem] shadow-sm border border-slate-100">
        <div class="p-6 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div>
                    <h2 class="text-xl font-extrabold text-slate-800">Perancang Akademik</h2>
                    <p id="userStatus" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">SiswaKlik Dashboard</p>
                </div>
            </div>
            <button onclick="openModal()" class="w-full md:w-auto bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-plus text-xs"></i> Tambah Aktiviti
            </button>
        </div>

        <div class="p-4">
            <div id="calendar"></div>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center mb-5">
                <h3 id="modalTitle" class="text-lg font-extrabold text-slate-800">Aktiviti Baru</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-4">
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tajuk</label>
                        <input type="text" id="title" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Warna</label>
                        <div class="flex gap-1 mt-2" id="colorPicker">
                            <div class="color-opt bg-red-500" onclick="selectColor('#ef4444', this)"></div>
                            <div class="color-opt bg-orange-500" onclick="selectColor('#f97316', this)"></div>
                            <div class="color-opt bg-yellow-400" onclick="selectColor('#facc15', this)"></div>
                            <div class="color-opt bg-green-500" onclick="selectColor('#22c55e', this)"></div>
                            <div class="color-opt bg-blue-500 active" onclick="selectColor('#3b82f6', this)"></div>
                            <div class="color-opt bg-indigo-500" onclick="selectColor('#6366f1', this)"></div>
                            <div class="color-opt bg-purple-500" onclick="selectColor('#a855f7', this)"></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tarikh Mula</label>
                        <input type="date" id="startDate" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tarikh Tamat</label>
                        <input type="date" id="endDate" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Masa Mula</label>
                        <input type="time" id="startTime" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Masa Tamat</label>
                        <input type="time" id="endTime" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Ulang (Repeat)</label>
                    <select id="repeatType" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                        <option value="none">Tiada</option>
                        <option value="daily">Setiap Hari</option>
                        <option value="weekly">Setiap Minggu</option>
                        <option value="monthly">Setiap Bulan</option>
                        <option value="yearly">Setiap Tahun</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Lokasi</label>
                        <input type="text" id="location" placeholder="Lokasi/Link" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Peringatan</label>
                        <select id="reminder" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                            <option value="none">Tiada</option>
                            <option value="0">Waktu Mula</option>
                            <option value="15">15 Minit Sebelum</option>
                            <option value="30">30 Minit Sebelum</option>
                            <option value="60">1 Jam Sebelum</option>
                            <option value="1440">1 Hari Sebelum</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Description</label>
                    <textarea id="description" rows="3" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Nota tambahan..."></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="closeModal()" class="flex-1 px-5 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-50 transition-all">Batal</button>
                    <button id="saveBtn" onclick="saveEvent()" class="flex-[2] bg-blue-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">Simpan Aktiviti</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let calendar;
        let selectedColor = '#3b82f6';
        let events = JSON.parse(localStorage.getItem('siswaEvents')) || [];

        document.addEventListener('DOMContentLoaded', async function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,listMonth'
                },
                locale: 'ms',
                firstDay: 1,
                editable: true,
                selectable: true,
                events: events,
                
                // Pop-up Detail Event
                eventClick: function(info) {
                    const props = info.event.extendedProps;
                    Swal.fire({
                        title: info.event.title,
                        html: `
                            <div class="text-left text-sm space-y-2 border-t pt-4">
                                <p><strong><i class="fas fa-clock mr-2"></i>Mula:</strong> ${info.event.start.toLocaleString('ms-MY')}</p>
                                <p><strong><i class="fas fa-flag-checkered mr-2"></i>Tamat:</strong> ${info.event.end ? info.event.end.toLocaleString('ms-MY') : 'Satu Hari'}</p>
                                <p><strong><i class="fas fa-map-marker-alt mr-2"></i>Lokasi:</strong> ${props.location || 'N/A'}</p>
                                <p><strong><i class="fas fa-info-circle mr-2"></i>Nota:</strong> ${props.description || 'Tiada nota tambahan.'}</p>
                                ${props.type ? `<p class='mt-2'><span class='px-2 py-1 bg-slate-100 rounded-md text-[10px] uppercase font-bold text-slate-500'>${props.type}</span></p>` : ''}
                            </div>
                        `,
                        showCancelButton: true,
                        confirmButtonText: 'Tutup',
                        cancelButtonText: 'Padam Aktiviti',
                        cancelButtonColor: '#ef4444',
                        confirmButtonColor: '#2563eb'
                    }).then((result) => {
                        if (result.dismiss === Swal.DismissReason.cancel) {
                            if(props.type === 'holiday' || props.type === 'school') {
                                Swal.fire('Info', 'Cuti rasmi tidak boleh dipadam.', 'info');
                            } else {
                                info.event.remove();
                                events = events.filter(e => e.id !== info.event.id);
                                localStorage.setItem('siswaEvents', JSON.stringify(events));
                                Swal.fire('Dipadam', 'Aktiviti telah dibuang.', 'success');
                            }
                        }
                    });
                }
            });

            calendar.render();
            
            // Integrasi Data Luaran
            await loadExternalData();
        });

        async function loadExternalData() {
            try {
                // 1. Memuatkan fail JSON (Cuti Umum 2026)
                const jsonResponse = await fetch('2026.json');
                const jsonData = await jsonResponse.json();
                
                if (jsonData.hari_kelepasan_am) {
                    jsonData.hari_kelepasan_am.forEach(item => {
                        const dateParts = item.tarikh.split(' '); // Contoh: "1 Januari 2026"
                        const months = {"Januari":"01","Februari":"02","Mac":"03","April":"04","Mei":"05","Jun":"06","Julai":"07","Ogos":"08","September":"09","Oktober":"10","November":"11","Disember":"12"};
                        const formattedDate = `2026-${months[dateParts[1]]}-${dateParts[0].padStart(2, '0')}`;
                        
                        calendar.addEvent({
                            title: `[CUTI] ${item.peristiwa}`,
                            start: formattedDate,
                            backgroundColor: item.jenis === 'Persekutuan' ? '#ef4444' : '#f97316',
                            extendedProps: { type: 'holiday', location: 'Seluruh Malaysia' }
                        });
                    });
                }

                // 2. Memuatkan fail MD (Takwim Sekolah - Simulasi parser ringkas)
                // Nota: Dalam sistem sebenar, MD diproses mengikut struktur teks
                // Di sini kita tunjukkan logik paparan status untuk memudahkan pengguna
                console.log("Memuatkan API Takwim dari fail MD...");
                
            } catch (err) {
                console.error("Gagal memuatkan data luaran:", err);
            }
        }

        function openModal() {
            document.getElementById('eventModal').classList.remove('hidden');
            document.getElementById('startDate').valueAsDate = new Date();
        }

        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
        }

        function selectColor(color, el) {
            selectedColor = color;
            document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function saveEvent() {
            const title = document.getElementById('title').value;
            const start = document.getElementById('startDate').value;
            const startTime = document.getElementById('startTime').value;
            
            if (!title || !start) {
                Swal.fire('Ralat', 'Sila isi tajuk dan tarikh mula.', 'error');
                return;
            }

            const newEvent = {
                id: Date.now().toString(),
                title: title,
                start: startTime ? `${start}T${startTime}` : start,
                end: document.getElementById('endDate').value,
                backgroundColor: selectedColor,
                extendedProps: {
                    description: document.getElementById('description').value,
                    location: document.getElementById('location').value,
                    reminder: document.getElementById('reminder').value,
                    repeat: document.getElementById('repeatType').value
                }
            };

            calendar.addEvent(newEvent);
            events.push(newEvent);
            localStorage.setItem('siswaEvents', JSON.stringify(events));
            
            closeModal();
            Swal.fire('Berjaya', 'Aktiviti telah disimpan!', 'success');
        }
    </script>
</body>
</html>
