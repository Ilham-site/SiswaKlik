<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalendar SiswaKlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: transparent; 
            overflow: hidden; 
        }

        .fc { 
            --fc-border-color: #f1f5f9; 
            --fc-button-bg-color: #ffffff;
            --fc-button-border-color: #e2e8f0;
            --fc-button-text-color: #64748b;
            --fc-button-active-bg-color: #2563eb;
            --fc-button-active-border-color: #2563eb;
            --fc-today-bg-color: #eff6ff;
        }

        .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 800; color: #1e293b; }
        
        .fc .fc-button {
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 5px 12px;
        }

        .fc-event {
            cursor: pointer;
            border-radius: 6px;
            padding: 2px 5px;
            border: none !important;
            transition: transform 0.1s;
        }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }

        .color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; border: 2px solid transparent; }
        .color-opt:hover { transform: scale(1.2); }
        .color-opt.active { border-color: #64748b; transform: scale(1.1); }

        input, select, textarea {
            font-size: 0.9rem !important;
        }
    </style>
</head>
<body class="p-2">

    <div class="max-w-full bg-white rounded-[2rem] shadow-sm border border-slate-100">
        <div class="p-6 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div>
                    <h2 class="text-xl font-extrabold text-slate-800">Perancang Akademik</h2>
                    <p id="syncStatus" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Menyemak Sambungan Cloud...</p>
                </div>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button onclick="syncWithCloud()" class="bg-emerald-50 text-emerald-600 px-4 py-2.5 rounded-xl font-bold text-xs hover:bg-emerald-100 transition-all flex items-center gap-2">
                    <i class="fas fa-cloud-download-alt"></i> Sync
                </button>
                <button onclick="openModal()" class="flex-1 md:flex-none bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-plus text-xs"></i> Tambah Aktiviti
                </button>
            </div>
        </div>

        <div class="p-4">
            <div id="calendar"></div>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center mb-5">
                <h3 id="modalTitle" class="text-lg font-extrabold text-slate-800">Aktiviti Baru</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-4">
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tajuk</label>
                        <input type="text" id="title" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Warna</label>
                        <div class="flex gap-1 mt-2" id="colorPicker">
                            <div class="color-opt bg-red-500" onclick="selectColor('#ef4444', this)"></div>
                            <div class="color-opt bg-orange-500" onclick="selectColor('#f97316', this)"></div>
                            <div class="color-opt bg-yellow-400" onclick="selectColor('#facc15', this)"></div>
                            <div class="color-opt bg-green-500" onclick="selectColor('#22c55e', this)"></div>
                            <div class="color-opt bg-blue-500 active" onclick="selectColor('#3b82f6', this)"></div>
                            <div class="color-opt bg-indigo-500" onclick="selectColor('#6366f1', this)"></div>
                            <div class="color-opt bg-purple-500" onclick="selectColor('#a855f7', this)"></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tarikh Mula</label>
                        <input type="date" id="startDate" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tarikh Tamat</label>
                        <input type="date" id="endDate" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Masa Mula</label>
                        <input type="time" id="startTime" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Masa Tamat</label>
                        <input type="time" id="endTime" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Ulang (Repeat)</label>
                    <select id="repeatType" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                        <option value="none">Tiada</option>
                        <option value="daily">Setiap Hari</option>
                        <option value="weekly">Setiap Minggu</option>
                        <option value="monthly">Setiap Bulan</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Lokasi</label>
                    <input type="text" id="location" placeholder="Lokasi/Link" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Description</label>
                    <textarea id="description" rows="2" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none" placeholder="Nota tambahan..."></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="closeModal()" class="flex-1 px-5 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-50 transition-all">Batal</button>
                    <button id="saveBtn" onclick="saveEvent()" class="flex-[2] bg-blue-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">Simpan ke Cloud</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let calendar;
        let selectedColor = '#3b82f6';
        let spreadsheetId = localStorage.getItem('siswaklik_spreadsheet_id');
        const accessToken = localStorage.getItem('siswaklik_access_token');

        document.addEventListener('DOMContentLoaded', async function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listMonth' },
                locale: 'ms',
                firstDay: 1,
                events: [],
                eventClick: function(info) {
                    const props = info.event.extendedProps;
                    const isHoliday = props.type === 'holiday';
                    
                    Swal.fire({
                        title: info.event.title,
                        html: `<div class="text-left text-sm space-y-2 border-t pt-4">
                                <p><strong>Mula:</strong> ${info.event.start.toLocaleString('ms-MY')}</p>
                                <p><strong>Lokasi:</strong> ${props.location || 'N/A'}</p>
                                <p><strong>Nota:</strong> ${props.description || '-'}</p>
                               </div>`,
                        showCancelButton: !isHoliday,
                        confirmButtonText: 'Tutup',
                        cancelButtonText: 'Padam Aktiviti',
                        confirmButtonColor: '#2563eb',
                        cancelButtonColor: '#ef4444',
                        reverseButtons: true
                    }).then((result) => {
                        if (result.dismiss === Swal.DismissReason.cancel) {
                            confirmDelete(info.event);
                        }
                    });
                }
            });
            calendar.render();

            await loadExternalData();
            
            if (accessToken) {
                initCloudStorage();
            } else {
                document.getElementById('syncStatus').innerText = "Mod Luar Talian (Tiada Token)";
            }
        });

        // --- GOOGLE SHEETS LOGIC ---

        async function initCloudStorage() {
            try {
                if (!spreadsheetId) {
                    document.getElementById('syncStatus').innerText = "Menyediakan Cloud Storage...";
                    let folderId = await getOrCreateFolder("SiswaKlik");
                    spreadsheetId = await getOrCreateSpreadsheet("SiswaKlik Time Management", folderId);
                    localStorage.setItem('siswaklik_spreadsheet_id', spreadsheetId);
                }
                document.getElementById('syncStatus').innerText = "Cloud Terhubung";
                syncWithCloud();
            } catch (err) {
                console.error(err);
                document.getElementById('syncStatus').innerText = "Gagal Sync Cloud";
            }
        }

        async function getOrCreateFolder(folderName) {
            const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${folderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            }).then(r => r.json());

            if (search.files && search.files.length > 0) return search.files[0].id;

            const create = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: folderName, mimeType: 'application/vnd.google-apps.folder' })
            }).then(r => r.json());
            return create.id;
        }

        async function getOrCreateSpreadsheet(name, folderId) {
            const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${name}' and trashed=false`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            }).then(r => r.json());

            if (search.files && search.files.length > 0) return search.files[0].id;

            const create = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, mimeType: 'application/vnd.google-apps.spreadsheet', parents: [folderId] })
            }).then(r => r.json());

            await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${create.id}/values/A1:I1?valueInputOption=USER_ENTERED`, {
                method: 'PUT',
                headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ values: [["Tajuk", "Warna", "T.Mula", "T.Tamat", "M.Mula", "M.Tamat", "Lokasi", "Ulang", "Deskripsi"]] })
            });

            return create.id;
        }

        async function syncWithCloud() {
            if (!spreadsheetId) return;
            document.getElementById('syncStatus').innerText = "Menyelaras...";
            try {
                // Mengambil data sehingga baris 1000 untuk memastikan semua dipaparkan
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/A2:I1000`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());

                if (response.values) {
                    calendar.getEvents().forEach(ev => {
                        if (ev.extendedProps.type !== 'holiday') ev.remove();
                    });

                    response.values.forEach((row, index) => {
                        if(row[0]) { // Pastikan baris tidak kosong
                            calendar.addEvent({
                                title: row[0],
                                backgroundColor: row[1],
                                start: row[4] ? `${row[2]}T${row[4]}` : row[2],
                                end: row[5] ? `${row[3]}T${row[5]}` : row[3],
                                extendedProps: { 
                                    location: row[6], 
                                    repeat: row[7], 
                                    description: row[8],
                                    sheetRow: index + 2 // Simpan index baris untuk rujukan
                                }
                            });
                        }
                    });
                }
                document.getElementById('syncStatus').innerText = "SiswaKlik Cloud: Terkini";
            } catch (e) {
                document.getElementById('syncStatus').innerText = "Gagal Memuat Data";
            }
        }

        async function saveEvent() {
            const title = document.getElementById('title').value;
            const start = document.getElementById('startDate').value;
            if (!title || !start) return Swal.fire('Ralat', 'Tajuk & Tarikh wajib diisi', 'error');

            const eventData = [
                title, 
                selectedColor, 
                start, 
                document.getElementById('endDate').value || start,
                document.getElementById('startTime').value,
                document.getElementById('endTime').value,
                document.getElementById('location').value,
                document.getElementById('repeatType').value,
                document.getElementById('description').value
            ];

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });

            try {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/A2:append?valueInputOption=USER_ENTERED`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: [eventData] })
                });

                await syncWithCloud();
                closeModal();
                Swal.fire('Berjaya', 'Aktiviti Anda Telah Direkodkan!', 'success');
            } catch (err) {
                Swal.fire('Gagal', 'Sila log masuk semula', 'error');
            }
        }

        async function confirmDelete(event) {
            const result = await Swal.fire({
                title: 'Padam Aktiviti?',
                text: `Adakah anda pasti ingin memadam "${event.title}"?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Ya, Padam',
                cancelButtonText: 'Batal'
            });

            if (result.isConfirmed) {
                deleteEventFromCloud(event);
            }
        }

        async function deleteEventFromCloud(event) {
            Swal.fire({ title: 'Memadam...', didOpen: () => Swal.showLoading() });
            
            try {
                // Ambil semua data untuk cari baris yang betul
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/A:I`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());

                const rows = response.values;
                let rowIndexToDelete = -1;

                // Cari baris berdasarkan tajuk dan tarikh mula (untuk ketepatan)
                const eventStartDate = event.startStr.split('T')[0];
                
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i][0] === event.title && rows[i][2] === eventStartDate) {
                        rowIndexToDelete = i;
                        break;
                    }
                }

                if (rowIndexToDelete !== -1) {
                    // Gunakan batchUpdate untuk memadam baris
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            requests: [{
                                deleteDimension: {
                                    range: {
                                        sheetId: 0, 
                                        dimension: "ROWS",
                                        startIndex: rowIndexToDelete,
                                        endIndex: rowIndexToDelete + 1
                                    }
                                }
                            }]
                        })
                    });

                    await syncWithCloud();
                    Swal.fire('Dipadam', 'Aktiviti telah dikeluarkan daripada kalendar.', 'success');
                } else {
                    throw new Error("Data tidak dijumpai di Cloud");
                }
            } catch (err) {
                console.error(err);
                Swal.fire('Gagal', 'Tidak dapat memadam dari Cloud. Sila cuba lagi.', 'error');
            }
        }

        // --- UI & DATA LOKAL ---

        async function loadExternalData() {
            try {
                const jsonResponse = await fetch('2026.json');
                const jsonData = await jsonResponse.json();
                if (jsonData.hari_kelepasan_am) {
                    jsonData.hari_kelepasan_am.forEach(item => {
                        const dateParts = item.tarikh.split(' ');
                        const months = {"Januari":"01","Februari":"02","Mac":"03","April":"04","Mei":"05","Jun":"06","Julai":"07","Ogos":"08","September":"09","Oktober":"10","November":"11","Disember":"12"};
                        const formattedDate = `2026-${months[dateParts[1]]}-${dateParts[0].padStart(2, '0')}`;
                        calendar.addEvent({
                            title: `[CUTI] ${item.peristiwa}`,
                            start: formattedDate,
                            backgroundColor: item.jenis === 'Persekutuan' ? '#ef4444' : '#f97316',
                            extendedProps: { type: 'holiday', location: 'Seluruh Malaysia' }
                        });
                    });
                }
            } catch (err) { console.warn("Fail 2026.json tidak dijumpai."); }
        }

        function openModal() { 
            // Reset form
            document.getElementById('title').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('eventModal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('eventModal').classList.add('hidden'); }
        function selectColor(color, el) {
            selectedColor = color;
            document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
