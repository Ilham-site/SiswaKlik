<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadual Kelas SiswaKlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: transparent; }
        
        /* Grid 5 kolum untuk Isnin - Jumaat */
        .timetable-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
        
        .class-card { 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; 
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .class-card:hover { 
            transform: translateY(-5px) scale(1.02); 
            filter: brightness(1.1); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .color-dot { width: 32px; height: 32px; border-radius: 10px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .color-dot.active { border-color: #1e293b; transform: scale(1.1) rotate(5deg); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .modal-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-full bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
        <div class="p-8 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-6 bg-gradient-to-r from-white to-slate-50">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-3 rounded-2xl text-white shadow-lg shadow-blue-200">
                    <i class="fas fa-calendar-alt text-xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Jadual Kuliah</h2>
                    <div class="flex items-center gap-2">
                        <span id="syncDot" class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>
                        <p id="syncStatus" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Menyambung ke Cloud...</p>
                    </div>
                </div>
            </div>
            <button onclick="toggleModal()" class="w-full md:w-auto bg-slate-900 text-white px-8 py-3.5 rounded-2xl font-bold text-sm hover:bg-blue-600 transition-all duration-300 flex items-center justify-center gap-3 shadow-lg hover:shadow-blue-200">
                <i class="fas fa-plus-circle"></i> Tambah Kelas
            </button>
        </div>

        <div class="p-6 overflow-x-auto">
            <div class="min-w-[1100px]">
                <div class="timetable-grid mb-8">
                    <div class="text-center font-extrabold text-slate-500 p-4 bg-slate-50 rounded-2xl border border-slate-100 text-xs tracking-widest uppercase">Isnin</div>
                    <div class="text-center font-extrabold text-slate-500 p-4 bg-slate-50 rounded-2xl border border-slate-100 text-xs tracking-widest uppercase">Selasa</div>
                    <div class="text-center font-extrabold text-slate-500 p-4 bg-slate-50 rounded-2xl border border-slate-100 text-xs tracking-widest uppercase">Rabu</div>
                    <div class="text-center font-extrabold text-slate-500 p-4 bg-slate-50 rounded-2xl border border-slate-100 text-xs tracking-widest uppercase">Khamis</div>
                    <div class="text-center font-extrabold text-slate-500 p-4 bg-slate-50 rounded-2xl border border-slate-100 text-xs tracking-widest uppercase">Jumaat</div>
                </div>
                
                <div id="timetableContent" class="timetable-grid items-start">
                    </div>
            </div>
        </div>
    </div>

    <div id="classModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-lg shadow-2xl max-h-[95vh] overflow-y-auto border border-white/20">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-extrabold text-slate-800 tracking-tight">Maklumat Kelas</h3>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <i class="fas fa-times-circle text-2xl"></i>
                </button>
            </div>
            
            <div class="space-y-5">
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">Kod</label>
                        <input type="text" id="subjectCode" placeholder="LMCW" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-blue-500 focus:bg-white transition-all">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">Nama Subjek</label>
                        <input type="text" id="subjectName" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-blue-500 focus:bg-white transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">Set</label>
                        <input type="text" id="classSet" placeholder="1" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-blue-500 focus:bg-white transition-all">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">Nama Pensyarah</label>
                        <input type="text" id="lecturer" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-blue-500 focus:bg-white transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">Hari</label>
                        <select id="classDay" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-blue-500">
                            <option value="1">Isnin</option>
                            <option value="2">Selasa</option>
                            <option value="3">Rabu</option>
                            <option value="4">Khamis</option>
                            <option value="5">Jumaat</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">Tempat</label>
                        <input type="text" id="location" placeholder="DK / Zoom" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">Masa Mula</label>
                        <input type="time" id="startTime" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">Masa Tamat</label>
                        <input type="time" id="endTime" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase mb-3 text-center tracking-widest">Tema Warna</label>
                    <div class="flex justify-between p-4 bg-slate-50 rounded-[2rem] border border-slate-100" id="colorPicker">
                        <div class="color-dot bg-red-500 shadow-lg shadow-red-200" data-color="#ef4444" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-orange-500 shadow-lg shadow-orange-200" data-color="#f97316" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-amber-400 shadow-lg shadow-amber-200" data-color="#fbbf24" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-emerald-500 shadow-lg shadow-emerald-200" data-color="#10b981" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-blue-500 active shadow-lg shadow-blue-200" data-color="#3b82f6" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-indigo-500 shadow-lg shadow-indigo-200" data-color="#6366f1" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-purple-500 shadow-lg shadow-purple-200" data-color="#a855f7" onclick="selectColor(this)"></div>
                    </div>
                </div>

                <div class="flex gap-4 pt-6">
                    <button onclick="toggleModal()" class="flex-1 py-4 text-slate-400 font-bold hover:text-slate-600 transition-colors">Batal</button>
                    <button onclick="saveClass()" class="flex-[2] bg-blue-600 text-white py-4 rounded-[1.5rem] font-bold shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95">Simpan Jadual</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedColor = '#3b82f6';
        let spreadsheetId = localStorage.getItem('siswaklik_spreadsheet_id');
        let accessToken = localStorage.getItem('siswaklik_access_token');

        // Automatik baca token dari login.html
        document.addEventListener('DOMContentLoaded', () => {
            if (accessToken && spreadsheetId) {
                initSheet2();
            } else {
                updateStatus("Ralat: Sila Log Masuk Semula", "bg-red-500");
                // Optional: window.location.href = 'login.html';
            }
        });

        function updateStatus(text, colorClass = "bg-blue-500") {
            const status = document.getElementById('syncStatus');
            const dot = document.getElementById('syncDot');
            status.innerText = text;
            dot.className = `w-2 h-2 rounded-full animate-pulse ${colorClass}`;
        }

        function toggleModal() {
            document.getElementById('classModal').classList.toggle('hidden');
        }

        function selectColor(el) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            selectedColor = el.getAttribute('data-color');
        }

        async function initSheet2() {
            try {
                const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());

                const sheet2Exists = meta.sheets.some(s => s.properties.title === 'Sheet2');

                if (!sheet2Exists) {
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            requests: [{ addSheet: { properties: { title: 'Sheet2' } } }]
                        })
                    });
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A1:I1?valueInputOption=USER_ENTERED`, {
                        method: 'PUT',
                        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: [["Kod", "Subjek", "Set", "Pensyarah", "Hari", "Masa Mula", "Masa Tamat", "Tempat", "Warna"]] })
                    });
                }
                loadTimetable();
            } catch (err) { 
                console.error(err);
                updateStatus("Ralat Akses Cloud", "bg-red-500");
            }
        }

        async function saveClass() {
            const data = [
                document.getElementById('subjectCode').value,
                document.getElementById('subjectName').value,
                document.getElementById('classSet').value,
                document.getElementById('lecturer').value,
                document.getElementById('classDay').value,
                document.getElementById('startTime').value,
                document.getElementById('endTime').value,
                document.getElementById('location').value,
                selectedColor
            ];

            if(!data[0] || !data[1] || !data[5]) return Swal.fire('Ralat', 'Sila isi maklumat wajib', 'warning');

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });

            try {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A2:append?valueInputOption=USER_ENTERED`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: [data] })
                });
                toggleModal();
                Swal.fire({ icon: 'success', title: 'Berjaya', text: 'Jadual telah dikemaskini!', showConfirmButton: false, timer: 1500 });
                loadTimetable();
            } catch (err) { Swal.fire('Gagal', 'Masalah cloud storage', 'error'); }
        }

        async function loadTimetable() {
            updateStatus("Menyegerak...");
            try {
                const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A2:I100`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());

                renderTimetable(res.values || []);
                updateStatus("Jadual Terkini", "bg-emerald-500");
            } catch (err) { updateStatus("Ralat Cloud", "bg-red-500"); }
        }

        function renderTimetable(data) {
            const container = document.getElementById('timetableContent');
            container.innerHTML = '';
            const dayColumns = { 1: [], 2: [], 3: [], 4: [], 5: [] };

            // Inject index untuk memudahkan proses padam
            data.forEach((row, index) => {
                const day = parseInt(row[4]);
                if(dayColumns[day]) dayColumns[day].push({...row, rowIndex: index + 2}); 
            });

            Object.keys(dayColumns).forEach(d => {
                dayColumns[d].sort((a, b) => a[5].localeCompare(b[5]));
            });

            for (let i = 1; i <= 5; i++) {
                let columnHtml = `<div class="flex flex-col gap-4">`;
                
                if (dayColumns[i].length === 0) {
                    columnHtml += `<div class="border-2 border-dashed border-slate-100 rounded-[2rem] h-32 flex items-center justify-center text-[10px] text-slate-300 font-bold uppercase tracking-widest">Kosong</div>`;
                } else {
                    dayColumns[i].forEach(row => {
                        columnHtml += `
                            <div onclick="showDetail(${JSON.stringify(row).replace(/"/g, '&quot;')})" 
                                 class="class-card p-5 rounded-[2rem] text-white shadow-lg" 
                                 style="background: linear-gradient(135deg, ${row[8]}, ${row[8]}dd)">
                                <div class="flex justify-between items-start mb-2">
                                    <p class="text-[9px] font-black bg-white/20 px-2 py-1 rounded-lg uppercase">${row[0]} • S${row[2]}</p>
                                </div>
                                <p class="text-[15px] font-extrabold mb-4 leading-tight h-10 overflow-hidden line-clamp-2">${row[1]}</p>
                                <div class="space-y-1.5 border-t border-white/10 pt-3">
                                    <div class="flex items-center gap-2 text-[10px] font-bold">
                                        <i class="far fa-clock opacity-70"></i> ${row[5]} - ${row[6]}
                                    </div>
                                    <div class="flex items-center gap-2 text-[10px] font-bold">
                                        <i class="fas fa-map-marker-alt opacity-70"></i> ${row[7]}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                columnHtml += `</div>`;
                container.innerHTML += columnHtml;
            }
        }

        async function deleteClass(rowIndex) {
            const result = await Swal.fire({
                title: 'Padam Kelas?',
                text: "Tindakan ini tidak boleh diundur!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'Ya, Padam!',
                cancelButtonText: 'Batal'
            });

            if (result.isConfirmed) {
                Swal.fire({ title: 'Memadam...', didOpen: () => Swal.showLoading() });
                try {
                    // Nota: Google Sheets API tidak menyokong DELETE row secara direct guna range.
                    // Cara termudah: Clear values.
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A${rowIndex}:I${rowIndex}:clear`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${accessToken}` }
                    });
                    
                    Swal.fire('Dipadam!', 'Jadual telah dikemaskini.', 'success');
                    loadTimetable();
                } catch (err) {
                    Swal.fire('Ralat', 'Gagal memadam data.', 'error');
                }
            }
        }

        function showDetail(row) {
            const {0: kod, 1: subjek, 2: set, 3: pensyarah, 4: hari, 5: mula, 6: tamat, 7: tempat, 8: warna, rowIndex} = row;
            const hariNama = ["", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat"][hari];

            Swal.fire({
                title: `<div class="flex justify-between items-center w-full pr-8">
                            <span class="text-white text-sm font-black tracking-widest uppercase">${kod}</span>
                            <button onclick="deleteClass(${rowIndex})" class="bg-white/20 hover:bg-white/40 p-2 rounded-xl text-white transition-all">
                                <i class="fas fa-trash-alt text-sm"></i>
                            </button>
                        </div>`,
                background: warna,
                html: `
                    <div class="bg-white/95 rounded-[2rem] p-8 text-left shadow-inner mt-4">
                        <h4 class="font-black text-slate-800 text-2xl mb-1 leading-tight">${subjek}</h4>
                        <p class="text-blue-600 font-bold mb-6 flex items-center gap-2">
                           <span class="bg-blue-50 px-3 py-1 rounded-full text-xs">Kumpulan ${set}</span>
                        </p>
                        
                        <div class="space-y-4">
                            <div class="flex items-center gap-4 p-3 rounded-2xl bg-slate-50 border border-slate-100">
                                <div class="bg-white p-2.5 rounded-xl shadow-sm text-slate-400"><i class="fas fa-user-tie w-4"></i></div>
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Pensyarah</p>
                                    <p class="font-bold text-slate-700 text-sm">${pensyarah || 'Tiada Nama'}</p>
                                </div>
                            </div>

                            <div class="flex items-center gap-4 p-3 rounded-2xl bg-slate-50 border border-slate-100">
                                <div class="bg-white p-2.5 rounded-xl shadow-sm text-slate-400"><i class="fas fa-clock w-4"></i></div>
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Hari & Masa</p>
                                    <p class="font-bold text-slate-700 text-sm">${hariNama} (${mula} - ${tamat})</p>
                                </div>
                            </div>

                            <div class="flex items-center gap-4 p-3 rounded-2xl bg-slate-50 border border-slate-100">
                                <div class="bg-white p-2.5 rounded-xl shadow-sm text-slate-400"><i class="fas fa-map-marker-alt w-4"></i></div>
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Lokasi</p>
                                    <p class="font-bold text-slate-700 text-sm">${tempat || 'Atas Talian'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `,
                showConfirmButton: false,
                showCloseButton: true,
                customClass: {
                    popup: 'rounded-[3rem] border-none overflow-hidden',
                    closeButton: 'text-white hover:text-slate-200'
                }
            });
        }
    </script>
</body>
</html>
