<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadual Kelas SiswaKlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: transparent; }
        /* Grid 5 kolum untuk Isnin - Jumaat */
        .timetable-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .class-card { cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
        .class-card:hover { transform: translateY(-2px); filter: brightness(1.05); shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .color-dot.active { border-color: #1e293b; transform: scale(1.2); }
    </style>
</head>
<body class="p-2">

    <div class="max-w-full bg-white rounded-[2rem] shadow-sm border border-slate-100">
        <div class="p-6 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div>
                    <h2 class="text-xl font-extrabold text-slate-800">Jadual Kuliah</h2>
                    <p id="syncStatus" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Menyambung ke Cloud...</p>
                </div>
            </div>
            <button onclick="toggleModal()" class="w-full md:w-auto bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-plus"></i> Tambah Kelas
            </button>
        </div>

        <div class="p-4 overflow-x-auto">
            <div class="min-w-[1000px]">
                <div class="timetable-grid mb-6">
                    <div class="text-center font-bold text-slate-700 p-3 bg-slate-50 rounded-xl border border-slate-100">ISNIN</div>
                    <div class="text-center font-bold text-slate-700 p-3 bg-slate-50 rounded-xl border border-slate-100">SELASA</div>
                    <div class="text-center font-bold text-slate-700 p-3 bg-slate-50 rounded-xl border border-slate-100">RABU</div>
                    <div class="text-center font-bold text-slate-700 p-3 bg-slate-50 rounded-xl border border-slate-100">KHAMIS</div>
                    <div class="text-center font-bold text-slate-700 p-3 bg-slate-50 rounded-xl border border-slate-100">JUMAAT</div>
                </div>
                
                <div id="timetableContent" class="timetable-grid items-start">
                    </div>
            </div>
        </div>
    </div>

    <div id="classModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-extrabold text-slate-800 mb-6">Maklumat Kelas Baru</h3>
            
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Kod</label>
                        <input type="text" id="subjectCode" placeholder="KKKK1234" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Nama Subjek</label>
                        <input type="text" id="subjectName" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Set</label>
                        <input type="text" id="classSet" placeholder="Set 1" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Nama Pensyarah</label>
                        <input type="text" id="lecturer" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Hari</label>
                        <select id="classDay" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                            <option value="1">Isnin</option>
                            <option value="2">Selasa</option>
                            <option value="3">Rabu</option>
                            <option value="4">Khamis</option>
                            <option value="5">Jumaat</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Tempat</label>
                        <input type="text" id="location" placeholder="DK / Makmal" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Masa Mula</label>
                        <input type="time" id="startTime" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Masa Tamat</label>
                        <input type="time" id="endTime" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 text-center">Pilihan Warna Pelangi</label>
                    <div class="flex justify-between p-3 bg-slate-50 rounded-2xl" id="colorPicker">
                        <div class="color-dot bg-red-500" data-color="#ef4444" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-orange-500" data-color="#f97316" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-yellow-400" data-color="#facc15" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-green-500" data-color="#22c55e" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-blue-500 active" data-color="#3b82f6" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-indigo-500" data-color="#6366f1" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-purple-500" data-color="#a855f7" onclick="selectColor(this)"></div>
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="toggleModal()" class="flex-1 py-3 text-slate-400 font-bold hover:text-slate-600">Batal</button>
                    <button onclick="saveClass()" class="flex-[2] bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">Simpan Jadual</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedColor = '#3b82f6';
        const spreadsheetId = localStorage.getItem('siswaklik_spreadsheet_id');
        const accessToken = localStorage.getItem('siswaklik_access_token');

        document.addEventListener('DOMContentLoaded', () => {
            if (accessToken && spreadsheetId) {
                initSheet2();
            } else {
                document.getElementById('syncStatus').innerText = "Ralat: Tiada Akses";
            }
        });

        function toggleModal() {
            document.getElementById('classModal').classList.toggle('hidden');
        }

        function selectColor(el) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            selectedColor = el.getAttribute('data-color');
        }

        async function initSheet2() {
            try {
                const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());

                const sheet2Exists = meta.sheets.some(s => s.properties.title === 'Sheet2');

                if (!sheet2Exists) {
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            requests: [{ addSheet: { properties: { title: 'Sheet2' } } }]
                        })
                    });
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A1:I1?valueInputOption=USER_ENTERED`, {
                        method: 'PUT',
                        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: [["Kod", "Subjek", "Set", "Pensyarah", "Hari", "Masa Mula", "Masa Tamat", "Tempat", "Warna"]] })
                    });
                }
                loadTimetable();
            } catch (err) { console.error(err); }
        }

        async function saveClass() {
            const data = [
                document.getElementById('subjectCode').value,
                document.getElementById('subjectName').value,
                document.getElementById('classSet').value,
                document.getElementById('lecturer').value,
                document.getElementById('classDay').value,
                document.getElementById('startTime').value,
                document.getElementById('endTime').value,
                document.getElementById('location').value,
                selectedColor
            ];

            if(!data[0] || !data[1] || !data[5]) return Swal.fire('Ralat', 'Sila isi maklumat wajib', 'warning');

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });

            try {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A2:append?valueInputOption=USER_ENTERED`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: [data] })
                });
                toggleModal();
                Swal.fire('Berjaya', 'Jadual dikemaskini!', 'success');
                loadTimetable();
            } catch (err) { Swal.fire('Gagal', 'Masalah cloud storage', 'error'); }
        }

        async function loadTimetable() {
            document.getElementById('syncStatus').innerText = "Menyegerak...";
            try {
                const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A2:I100`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());

                renderTimetable(res.values || []);
                document.getElementById('syncStatus').innerText = "Jadual Terkini";
            } catch (err) { document.getElementById('syncStatus').innerText = "Ralat Cloud"; }
        }

        function renderTimetable(data) {
            const container = document.getElementById('timetableContent');
            container.innerHTML = '';

            // Wujudkan 5 kolum (Isnin-Jumaat)
            const dayColumns = { 1: [], 2: [], 3: [], 4: [], 5: [] };

            data.forEach(row => {
                const day = parseInt(row[4]);
                if(dayColumns[day]) dayColumns[day].push(row);
            });

            // Susun setiap kolum mengikut masa mula
            Object.keys(dayColumns).forEach(d => {
                dayColumns[d].sort((a, b) => a[5].localeCompare(b[5]));
            });

            for (let i = 1; i <= 5; i++) {
                let columnHtml = `<div class="flex flex-col gap-3">`;
                
                if (dayColumns[i].length === 0) {
                    columnHtml += `<div class="border border-dashed border-slate-100 rounded-3xl h-32 flex items-center justify-center text-[10px] text-slate-200 font-bold uppercase">Tiada Kelas</div>`;
                } else {
                    dayColumns[i].forEach(row => {
                        columnHtml += `
                            <div onclick="showDetail(${JSON.stringify(row).replace(/"/g, '&quot;')})" 
                                 class="class-card p-4 rounded-3xl text-white shadow-lg" 
                                 style="background-color: ${row[8]}">
                                <p class="text-[10px] font-black opacity-80 uppercase mb-1">${row[0]} • SET ${row[2]}</p>
                                <p class="text-sm font-extrabold mb-3 leading-tight">${row[1]}</p>
                                <div class="flex flex-col gap-1 opacity-90">
                                    <div class="flex items-center gap-2 text-[10px] font-bold">
                                        <i class="fas fa-clock"></i> ${row[5]} - ${row[6]}
                                    </div>
                                    <div class="flex items-center gap-2 text-[10px] font-bold">
                                        <i class="fas fa-location-dot"></i> ${row[7]}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                columnHtml += `</div>`;
                container.innerHTML += columnHtml;
            }
        }

        function showDetail(row) {
            const [kod, subjek, set, pensyarah, hari, mula, tamat, tempat, warna] = row;
            const hariNama = ["", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat"][hari];

            Swal.fire({
                title: `<span style="color: white">${kod}</span>`,
                background: warna,
                html: `
                    <div class="bg-white rounded-3xl p-6 text-left shadow-inner">
                        <h4 class="font-black text-slate-800 text-xl mb-1">${subjek}</h4>
                        <p class="text-blue-600 font-bold mb-4">Set ${set}</p>
                        
                        <div class="space-y-3">
                            <div class="flex items-start gap-3">
                                <div class="bg-slate-50 p-2 rounded-lg text-slate-400"><i class="fas fa-user-tie w-4"></i></div>
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase">Pensyarah</p>
                                    <p class="font-bold text-slate-700">${pensyarah}</p>
                                </div>
                            </div>

                            <div class="flex items-start gap-3">
                                <div class="bg-slate-50 p-2 rounded-lg text-slate-400"><i class="fas fa-calendar-day w-4"></i></div>
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase">Hari & Masa</p>
                                    <p class="font-bold text-slate-700">${hariNama} (${mula} - ${tamat})</p>
                                </div>
                            </div>

                            <div class="flex items-start gap-3">
                                <div class="bg-slate-50 p-2 rounded-lg text-slate-400"><i class="fas fa-map-marker-alt w-4"></i></div>
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase">Tempat</p>
                                    <p class="font-bold text-slate-700">${tempat}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `,
                showConfirmButton: false,
                showCloseButton: true,
                customClass: {
                    popup: 'rounded-[2.5rem] border-none',
                    closeButton: 'text-white hover:text-slate-200'
                }
            });
        }
    </script>
</body>
</html>
