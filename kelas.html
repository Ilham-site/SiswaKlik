<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadual Kelas SiswaKlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: transparent; }
        
        .timetable-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        
        .class-card { 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; 
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            min-width: 0;
        }
        
        .class-card:hover { 
            transform: translateY(-3px);
            filter: brightness(1.05); 
        }

        .color-dot { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .color-dot.active { border-color: #1e293b; transform: scale(2.0); }
        
        .modal-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
        }

        .swal-popup-custom {
            padding: 0 !important;
            border-radius: 2rem !important;
            overflow: visible !important;
            box-shadow: 0 25px 50px -12px var(--theme-shadow) !important;
            margin: 20px !important;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.8;
            opacity: 0.15;
            position: absolute;
            bottom: -10px;
            left: -5px;
            pointer-events: none;
            white-space: nowrap;
        }

        .truncate-text {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }

        :root {
            --theme-shadow: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body class="p-2">

    <div class="max-w-screen-xl mx-auto bg-white rounded-[2rem] shadow-lg border border-slate-100 overflow-hidden">
        <div class="p-6 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4 bg-gradient-to-r from-white to-slate-50">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2.5 rounded-xl text-white shadow-md">
                    <i class="fas fa-calendar-alt text-lg"></i>
                </div>
                <div>
                    <h2 class="text-xl font-extrabold text-slate-800">Jadual Kuliah</h2>
                    <div class="flex items-center gap-2">
                        <span id="syncDot" class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>
                        <p id="syncStatus" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Memulakan...</p>
                    </div>
                </div>
            </div>
            <button onclick="toggleModal()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-xs hover:bg-blue-600 transition-all flex items-center gap-2 shadow-lg">
                <i class="fas fa-plus-circle"></i> Tambah Kelas
            </button>
        </div>

        <div class="p-4 overflow-x-auto">
            <div class="min-w-[900px]"> 
                <div class="timetable-grid mb-4">
                    <div class="text-center font-extrabold text-slate-400 p-3 bg-slate-50 rounded-xl border border-slate-100 text-[10px] tracking-widest uppercase">Isnin</div>
                    <div class="text-center font-extrabold text-slate-400 p-3 bg-slate-50 rounded-xl border border-slate-100 text-[10px] tracking-widest uppercase">Selasa</div>
                    <div class="text-center font-extrabold text-slate-400 p-3 bg-slate-50 rounded-xl border border-slate-100 text-[10px] tracking-widest uppercase">Rabu</div>
                    <div class="text-center font-extrabold text-slate-400 p-3 bg-slate-50 rounded-xl border border-slate-100 text-[10px] tracking-widest uppercase">Khamis</div>
                    <div class="text-center font-extrabold text-slate-400 p-3 bg-slate-50 rounded-xl border border-slate-100 text-[10px] tracking-widest uppercase">Jumaat</div>
                </div>
                
                <div id="timetableContent" class="timetable-grid items-start">
                </div>
            </div>
        </div>
    </div>

    <div id="classModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-extrabold text-slate-800">Maklumat Kelas</h3>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-red-500">
                    <i class="fas fa-times-circle text-xl"></i>
                </button>
            </div>
            
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <div class="col-span-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Kod</label>
                        <input type="text" id="subjectCode" placeholder="LMCW" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500 transition-all text-sm">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Nama Subjek</label>
                        <input type="text" id="subjectName" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500 transition-all text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Set</label>
                        <input type="text" id="classSet" placeholder="1" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500 text-sm">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Nama Pensyarah</label>
                        <input type="text" id="lecturer" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Hari</label>
                        <select id="classDay" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500 text-sm">
                            <option value="1">Isnin</option>
                            <option value="2">Selasa</option>
                            <option value="3">Rabu</option>
                            <option value="4">Khamis</option>
                            <option value="5">Jumaat</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Tempat</label>
                        <input type="text" id="location" placeholder="DK / Zoom" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Mula</label>
                        <input type="time" id="startTime" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Tamat</label>
                        <input type="time" id="endTime" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500 text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 text-center tracking-widest">Tema Warna Pelangi</label>
                    <div class="flex justify-between p-3 bg-slate-50 rounded-2xl border border-slate-100" id="colorPicker">
                        <div class="color-dot bg-red-500" data-color="#ef4444" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-orange-500" data-color="#f97316" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-yellow-400" data-color="#fbbf24" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-emerald-500" data-color="#10b981" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-blue-500 active" data-color="#3b82f6" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-indigo-600" data-color="#4f46e5" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-purple-500" data-color="#a855f7" onclick="selectColor(this)"></div>
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="toggleModal()" class="flex-1 py-3 text-slate-400 font-bold hover:text-slate-600 text-sm">Batal</button>
                    <button onclick="saveClass()" class="flex-[2] bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 text-sm active:scale-95 transition-all">Simpan Jadual</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSheetId = null;
        let selectedColor = '#3b82f6';
        let accessToken = localStorage.getItem('siswaklik_access_token');
        let spreadsheetId = localStorage.getItem('siswaklik_spreadsheet_id');

        const colorMap = {
            '#ef4444': 'merah.jpg',
            '#f97316': 'jingga.jpg',
            '#fbbf24': 'kuning.jpg',
            '#10b981': 'hijau.jpg',
            '#3b82f6': 'biru.jpg',
            '#4f46e5': 'nila.jpg',
            '#a855f7': 'ungu.jpg'
        };

        // Mendengar data dari parent
        window.addEventListener('message', function(event) {
            if (event.data.type === 'SISWAKLIK_AUTH') {
                accessToken = event.data.token;
                spreadsheetId = event.data.spreadsheetId;
                if (accessToken && spreadsheetId) initSheet2();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (accessToken && spreadsheetId) {
                initSheet2();
            } else {
                updateStatus("Menunggu Akses...", "bg-amber-400");
                const checkStorage = setInterval(() => {
                    accessToken = localStorage.getItem('siswaklik_access_token');
                    spreadsheetId = localStorage.getItem('siswaklik_spreadsheet_id');
                    if(accessToken && spreadsheetId) {
                        initSheet2();
                        clearInterval(checkStorage);
                    }
                }, 2000);
            }
        });

        function updateStatus(text, colorClass = "bg-blue-500") {
            const status = document.getElementById('syncStatus');
            const dot = document.getElementById('syncDot');
            if(status) status.innerText = text;
            if(dot) dot.className = `w-2 h-2 rounded-full animate-pulse ${colorClass}`;
        }

        function toggleModal() {
            document.getElementById('classModal').classList.toggle('hidden');
        }

        function selectColor(el) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            selectedColor = el.getAttribute('data-color');
        }

        async function initSheet2() {
            if (!accessToken || !spreadsheetId) return;
            try {
                const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());

                const sheet2 = meta.sheets.find(s => s.properties.title === 'Sheet2');

                if (!sheet2) {
                    const createRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            requests: [{ addSheet: { properties: { title: 'Sheet2' } } }]
                        })
                    }).then(r => r.json());
                    
                    currentSheetId = createRes.replies[0].addSheet.properties.sheetId;

                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A1:I1?valueInputOption=USER_ENTERED`, {
                        method: 'PUT',
                        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: [["Kod", "Subjek", "Set", "Pensyarah", "Hari", "Masa Mula", "Masa Tamat", "Tempat", "Warna"]] })
                    });
                } else {
                    currentSheetId = sheet2.properties.sheetId;
                }
                loadTimetable();
            } catch (err) { 
                updateStatus("Sesi Tamat/Ralat", "bg-red-500");
            }
        }

        async function saveClass() {
            const data = [
                document.getElementById('subjectCode').value,
                document.getElementById('subjectName').value,
                document.getElementById('classSet').value,
                document.getElementById('lecturer').value,
                document.getElementById('classDay').value,
                document.getElementById('startTime').value,
                document.getElementById('endTime').value,
                document.getElementById('location').value,
                selectedColor
            ];

            if(!data[0] || !data[1] || !data[5]) return Swal.fire('Ralat', 'Sila isi maklumat wajib', 'warning');

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });

            try {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A2:append?valueInputOption=USER_ENTERED`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: [data] })
                });
                toggleModal();
                Swal.fire({ icon: 'success', title: 'Berjaya', text: 'Jadual disimpan!', showConfirmButton: false, timer: 1500 });
                loadTimetable();
            } catch (err) { Swal.fire('Gagal', 'Masalah cloud storage', 'error'); }
        }

        async function loadTimetable() {
            updateStatus("Menyegerak...");
            try {
                const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A2:I100`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());

                renderTimetable(res.values || []);
                updateStatus("Terkini", "bg-emerald-500");
            } catch (err) { updateStatus("Ralat Cloud", "bg-red-500"); }
        }

        function renderTimetable(data) {
            const container = document.getElementById('timetableContent');
            container.innerHTML = '';
            const dayColumns = { 1: [], 2: [], 3: [], 4: [], 5: [] };

            data.forEach((row, index) => {
                if(row[0]) {
                    const day = parseInt(row[4]);
                    if(dayColumns[day]) dayColumns[day].push({...row, rowIndex: index + 2}); 
                }
            });

            Object.keys(dayColumns).forEach(d => {
                dayColumns[d].sort((a, b) => {
                    // Mengambil nilai Masa Mula (Index 5 dalam Sheet2)
                    const timeA = a[5] || "00:00";
                    const timeB = b[5] || "00:00";
                    return timeA.localeCompare(timeB);
                });
            });
            
            for (let i = 1; i <= 5; i++) {
                let columnHtml = `<div class="flex flex-col gap-3 min-w-0">`;
                
                if (dayColumns[i].length === 0) {
                    columnHtml += `<div class="border border-dashed border-slate-200 rounded-3xl h-24 flex items-center justify-center text-[9px] text-slate-300 font-bold uppercase">Tiada Kelas</div>`;
                } else {
                    dayColumns[i].forEach(row => {
                        columnHtml += `
                            <div onclick="showDetail(${JSON.stringify(row).replace(/"/g, '&quot;')})" 
                                 class="class-card p-4 rounded-3xl text-white shadow-md" 
                                 style="background: linear-gradient(135deg, ${row[8]}, ${row[8]}cc)">
                                <div class="mb-1 truncate">
                                    <span class="text-[8px] font-black bg-white/20 px-2 py-0.5 rounded-md uppercase">${row[0]}</span>
                                </div>
                                <p class="text-[13px] font-extrabold mb-3 leading-tight truncate-text h-8">${row[1]}</p>
                                <div class="text-[9px] font-bold opacity-90">
                                    <p class="truncate"><i class="far fa-clock mr-1"></i> ${row[5]} - ${row[6]}</p>
                                    <p class="truncate"><i class="fas fa-map-marker-alt mr-1"></i> ${row[7] || 'N/A'}</p>
                                </div>
                            </div>
                        `;
                    });
                }
                columnHtml += `</div>`;
                container.innerHTML += columnHtml;
            }
        }

        async function deleteClass(rowIndex) {
            const result = await Swal.fire({
                title: 'Padam Kelas?',
                text: "Data akan dibuang dari Cloud secara kekal.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Padam',
                cancelButtonText: 'Batal',
                borderRadius: '1.5rem'
            });

            if (result.isConfirmed) {
                Swal.fire({ 
                    title: 'Memadam...', 
                    allowOutsideClick: false,
                    didOpen: () => Swal.showLoading() 
                });

                try {
                    // Menggunakan batchUpdate untuk deleteDimension
                    const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
                        method: 'POST',
                        headers: { 
                            Authorization: `Bearer ${accessToken}`, 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({
                            requests: [{
                                deleteDimension: {
                                    range: { 
                                        sheetId: currentSheetId,
                                        dimension: "ROWS", 
                                        startIndex: rowIndex - 1, 
                                        endIndex: rowIndex 
                                    }
                                }
                            }]
                        })
                    });

                    if (!response.ok) throw new Error('Gagal memadam');

                    Swal.fire({
                        icon: 'success',
                        title: 'Berjaya',
                        text: 'Kelas telah dipadam.',
                        timer: 1500,
                        showConfirmButton: false
                    });
            
                    loadTimetable();
                } catch (err) { 
                    Swal.fire('Ralat', 'Gagal memadam data.', 'error'); 
                }
            }
        }

        function showDetail(row) {
            const kod = row[0];
            const subjek = row[1];
            const set = row[2];
            const pensyarah = row[3];
            const hari = row[4];
            const mula = row[5];
            const tamat = row[6];
            const tempat = row[7];
            const warna = row[8];
            const rowIndex = row.rowIndex;

            const hariNama = ["", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat"][hari];
            const bgImg = colorMap[warna] || 'biru.jpg';

            document.documentElement.style.setProperty('--theme-shadow', `${warna}75`);

            Swal.fire({
                width: '450px',
                customClass: { popup: 'swal-popup-custom' },
                html: `
                    <div style="background-image: url('${bgImg}'); background-size: cover; background-position: center;" 
                         class="h-40 flex items-center justify-center p-6 relative overflow-hidden">
                        
                        <h1 class="hero-title text-white">${kod}</h1>

                        <div class="absolute top-4 right-4 flex gap-2 z-10">
                             <button onclick="deleteClass(${rowIndex})" class="bg-white/20 hover:bg-red-500 w-8 h-8 rounded-full text-white backdrop-blur-md transition-all border border-white/30">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                        
                        <span class="z-10 bg-white/20 backdrop-blur-md text-white text-[12px] font-black px-4 py-1.5 rounded-xl uppercase tracking-widest border border-white/30 shadow-lg">
                            ${kod}
                        </span>
                    </div>
                    
                    <div class="p-8 text-left bg-white">
                        <h4 class="font-black text-slate-800 text-2xl mb-1 leading-tight">${subjek}</h4>
                        <p class="font-extrabold text-sm mb-6" style="color: ${warna}">Set ${set}</p>
                        
                        <div class="space-y-3">
                            <div class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100">
                                <i class="fas fa-user-tie text-slate-400 text-lg"></i>
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Pensyarah</p>
                                    <p class="font-bold text-slate-700 text-sm">${pensyarah || 'Tiada Maklumat'}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100">
                                <i class="fas fa-clock text-slate-400 text-lg"></i>
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Waktu Kuliah</p>
                                    <p class="font-bold text-slate-700 text-sm">${hariNama}, ${mula} - ${tamat}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100">
                                <i class="fas fa-map-marker-alt text-slate-400 text-lg"></i>
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Lokasi</p>
                                    <p class="font-bold text-slate-700 text-sm">${tempat || 'Atas Talian'}</p>
                                </div>
                            </div>
                        </div>
                        <button onclick="Swal.close()" class="w-full mt-8 py-4 bg-slate-900 rounded-2xl font-bold text-white text-xs hover:opacity-90 transition-all shadow-lg">Tutup Paparan</button>
                    </div>
                `,
                showConfirmButton: false
            });
        }
    </script>
</body>
</html>
