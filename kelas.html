<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadual Kelas SiswaKlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: transparent; 
            margin: 0;
            padding: 0;
        }
        
        /* Grid Penyesuaian Iframe */
        .timetable-grid { 
            display: grid; 
            grid-template-columns: repeat(5, minmax(180px, 1fr)); 
            gap: 12px; 
        }
        
        .class-card { 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; 
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .class-card:hover { 
            transform: translateY(-3px); 
            filter: brightness(1.05); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .color-dot { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .color-dot.active { border-color: #1e293b; transform: scale(1.1); }
        
        /* Custom Scrollbar untuk Iframe */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="p-2">

    <div class="max-w-full bg-white rounded-[2rem]">
        <div class="p-5 border-b border-slate-50 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2.5 rounded-xl text-white shadow-md">
                    <i class="fas fa-calendar-alt text-lg"></i>
                </div>
                <div>
                    <h2 class="text-lg font-extrabold text-slate-800 leading-tight">Jadual Kuliah</h2>
                    <div class="flex items-center gap-1.5">
                        <span id="syncDot" class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span>
                        <p id="syncStatus" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Menghubung...</p>
                    </div>
                </div>
            </div>
            <button onclick="toggleModal()" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold text-xs hover:bg-blue-600 transition-all flex items-center gap-2 shadow-sm">
                <i class="fas fa-plus-circle"></i> Tambah Kelas
            </button>
        </div>

        <div class="p-4 overflow-x-auto">
            <div class="min-w-max">
                <div class="timetable-grid mb-4">
                    <div class="text-center font-extrabold text-slate-400 py-2 bg-slate-50 rounded-xl text-[10px] uppercase tracking-tighter">Isnin</div>
                    <div class="text-center font-extrabold text-slate-400 py-2 bg-slate-50 rounded-xl text-[10px] uppercase tracking-tighter">Selasa</div>
                    <div class="text-center font-extrabold text-slate-400 py-2 bg-slate-50 rounded-xl text-[10px] uppercase tracking-tighter">Rabu</div>
                    <div class="text-center font-extrabold text-slate-400 py-2 bg-slate-50 rounded-xl text-[10px] uppercase tracking-tighter">Khamis</div>
                    <div class="text-center font-extrabold text-slate-400 py-2 bg-slate-50 rounded-xl text-[10px] uppercase tracking-tighter">Jumaat</div>
                </div>
                
                <div id="timetableContent" class="timetable-grid items-start pb-4">
                    </div>
            </div>
        </div>
    </div>

    <div id="classModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-md shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-extrabold text-slate-800">Tambah Kelas</h3>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <i class="fas fa-times-circle text-xl"></i>
                </button>
            </div>
            
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <div class="col-span-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Kod</label>
                        <input type="text" id="subjectCode" placeholder="LMCW" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Subjek</label>
                        <input type="text" id="subjectName" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Hari</label>
                        <select id="classDay" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                            <option value="1">Isnin</option>
                            <option value="2">Selasa</option>
                            <option value="3">Rabu</option>
                            <option value="4">Khamis</option>
                            <option value="5">Jumaat</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Tempat</label>
                        <input type="text" id="location" placeholder="DK / Zoom" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Mula</label>
                        <input type="time" id="startTime" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Tamat</label>
                        <input type="time" id="endTime" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-100 outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="pt-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 text-center tracking-widest">Pilih Warna</label>
                    <div class="flex justify-between p-3 bg-slate-50 rounded-2xl border border-slate-100" id="colorPicker">
                        <div class="color-dot bg-red-500 shadow-sm" data-color="#ef4444" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-orange-500 shadow-sm" data-color="#f97316" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-amber-400 shadow-sm" data-color="#fbbf24" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-emerald-500 shadow-sm" data-color="#10b981" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-blue-500 active shadow-sm" data-color="#3b82f6" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-purple-500 shadow-sm" data-color="#a855f7" onclick="selectColor(this)"></div>
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="toggleModal()" class="flex-1 py-3 text-slate-400 font-bold text-sm">Batal</button>
                    <button onclick="saveClass()" class="flex-[2] bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedColor = '#3b82f6';
        let spreadsheetId = localStorage.getItem('siswaklik_spreadsheet_id');
        let accessToken = localStorage.getItem('siswaklik_access_token');

        document.addEventListener('DOMContentLoaded', () => {
            if (accessToken && spreadsheetId) {
                initSheet2();
            } else {
                updateStatus("Sila Log Masuk", "bg-red-500");
            }
        });

        function updateStatus(text, colorClass = "bg-blue-500") {
            const status = document.getElementById('syncStatus');
            const dot = document.getElementById('syncDot');
            if(status) status.innerText = text;
            if(dot) dot.className = `w-1.5 h-1.5 rounded-full animate-pulse ${colorClass}`;
        }

        function toggleModal() {
            document.getElementById('classModal').classList.toggle('hidden');
        }

        function selectColor(el) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            selectedColor = el.getAttribute('data-color');
        }

        async function initSheet2() {
            try {
                const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());

                const sheet2Exists = meta.sheets.some(s => s.properties.title === 'Sheet2');

                if (!sheet2Exists) {
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            requests: [{ addSheet: { properties: { title: 'Sheet2' } } }]
                        })
                    });
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A1:I1?valueInputOption=USER_ENTERED`, {
                        method: 'PUT',
                        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: [["Kod", "Subjek", "Set", "Pensyarah", "Hari", "Masa Mula", "Masa Tamat", "Tempat", "Warna"]] })
                    });
                }
                loadTimetable();
            } catch (err) { 
                updateStatus("Ralat Cloud", "bg-red-500");
            }
        }

        async function saveClass() {
            const data = [
                document.getElementById('subjectCode').value || '-',
                document.getElementById('subjectName').value,
                '-', '-', // Set & Pensyarah default
                document.getElementById('classDay').value,
                document.getElementById('startTime').value,
                document.getElementById('endTime').value,
                document.getElementById('location').value || 'DK',
                selectedColor
            ];

            if(!data[1] || !data[5]) return Swal.fire('Ralat', 'Nama subjek & masa wajib diisi', 'warning');

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });

            try {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A2:append?valueInputOption=USER_ENTERED`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: [data] })
                });
                toggleModal();
                Swal.fire({ icon: 'success', title: 'Berjaya', showConfirmButton: false, timer: 1000 });
                loadTimetable();
            } catch (err) { Swal.fire('Gagal', 'Masalah cloud storage', 'error'); }
        }

        async function loadTimetable() {
            updateStatus("Menyegerak...");
            try {
                const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A2:I100`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());

                renderTimetable(res.values || []);
                updateStatus("Terkini", "bg-emerald-500");
            } catch (err) { updateStatus("Ralat", "bg-red-500"); }
        }

        function renderTimetable(data) {
            const container = document.getElementById('timetableContent');
            container.innerHTML = '';
            const dayColumns = { 1: [], 2: [], 3: [], 4: [], 5: [] };

            data.forEach((row, index) => {
                if(!row[4]) return;
                const day = parseInt(row[4]);
                if(dayColumns[day]) dayColumns[day].push({...row, rowIndex: index + 2}); 
            });

            Object.keys(dayColumns).forEach(d => {
                dayColumns[d].sort((a, b) => a[5].localeCompare(b[5]));
            });

            for (let i = 1; i <= 5; i++) {
                let columnHtml = `<div class="flex flex-col gap-3">`;
                
                if (dayColumns[i].length === 0) {
                    columnHtml += `<div class="border-2 border-dashed border-slate-50 rounded-3xl h-24 flex items-center justify-center text-[9px] text-slate-300 font-bold uppercase">Tiada</div>`;
                } else {
                    dayColumns[i].forEach(row => {
                        columnHtml += `
                            <div onclick="showDetail(${JSON.stringify(row).replace(/"/g, '&quot;')})" 
                                 class="class-card p-4 rounded-3xl text-white" 
                                 style="background: linear-gradient(135deg, ${row[8]}, ${row[8]}dd)">
                                <p class="text-[8px] font-black bg-white/20 w-fit px-1.5 py-0.5 rounded mb-1 uppercase">${row[0]}</p>
                                <p class="text-xs font-extrabold mb-3 leading-tight line-clamp-2">${row[1]}</p>
                                <div class="text-[9px] font-bold opacity-90 space-y-0.5">
                                    <div class="flex items-center gap-1.5"><i class="far fa-clock"></i> ${row[5]}</div>
                                    <div class="flex items-center gap-1.5"><i class="fas fa-map-marker-alt"></i> ${row[7]}</div>
                                </div>
                            </div>
                        `;
                    });
                }
                columnHtml += `</div>`;
                container.innerHTML += columnHtml;
            }
        }

        function showDetail(row) {
            const {0: kod, 1: subjek, 5: mula, 6: tamat, 7: tempat, 8: warna, rowIndex} = row;
            Swal.fire({
                title: `<p class="text-sm font-black text-white uppercase">${kod}</p>`,
                background: warna,
                html: `
                    <div class="bg-white rounded-3xl p-6 text-left">
                        <h4 class="font-black text-slate-800 text-lg mb-4">${subjek}</h4>
                        <div class="space-y-2 text-sm text-slate-600 font-bold">
                            <p><i class="fas fa-clock w-5 text-blue-500"></i> ${mula} - ${tamat}</p>
                            <p><i class="fas fa-map-marker-alt w-5 text-rose-500"></i> ${tempat}</p>
                        </div>
                        <button onclick="deleteClass(${rowIndex})" class="mt-6 w-full py-3 bg-red-50 text-red-500 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">
                            Padam Rekod
                        </button>
                    </div>
                `,
                showConfirmButton: false,
                showCloseButton: true,
                customClass: { popup: 'rounded-[2.5rem]' }
            });
        }

        async function deleteClass(rowIndex) {
            const result = await Swal.fire({
                title: 'Padam?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Ya',
                cancelButtonText: 'Batal'
            });

            if (result.isConfirmed) {
                try {
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet2!A${rowIndex}:I${rowIndex}:clear`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${accessToken}` }
                    });
                    Swal.fire('Berjaya', '', 'success');
                    loadTimetable();
                } catch (err) { Swal.fire('Ralat', '', 'error'); }
            }
        }
    </script>
</body>
</html>
