<section class="animate-fade-in">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
        <div>
            <h2 class="text-3xl font-bold text-gray-900">Fail Peribadi</h2>
            <p class="text-gray-500">Data disimpan terus dalam Google Drive anda.</p>
        </div>
        <div class="flex gap-3 w-full md:w-auto">
            <button onclick="createFolder()" class="flex-1 bg-white border border-gray-200 px-6 py-3 rounded-2xl font-bold shadow-sm hover:bg-gray-50 transition">
                <i class="fas fa-folder-plus mr-2 text-yellow-500"></i> Folder Baru
            </button>
            <button onclick="document.getElementById('driveUpload').click()" class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">
                <i class="fas fa-cloud-upload-alt mr-2"></i> Muat Naik
            </button>
            <input type="file" id="driveUpload" class="hidden" onchange="uploadFile(this)">
        </div>
    </div>

    <div id="driveContent" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition cursor-pointer group">
            <div class="flex justify-between items-start mb-4">
                <i class="fas fa-folder text-4xl text-yellow-400"></i>
                <button class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500"><i class="fas fa-ellipsis-v"></i></button>
            </div>
            <h3 class="font-bold text-gray-800">Nota Kuliah UKM</h3>
            <p class="text-xs text-gray-400 mt-1">12 Fail • Dikemaskini semalam</p>
        </div>
    </div>
</section>

<script>
    // Logik Google Drive API akan diletakkan di sini
    function createFolder() {
        const name = prompt("Nama folder baru:");
        if(name) {
            alert(`Folder "${name}" akan dicipta dalam Google Drive anda.`);
            // Integrasi API: gapi.client.drive.files.create(...)
        }
    }

    function uploadFile(input) {
        const file = input.files[0];
        if(file) {
            alert(`Memuat naik ${file.name} ke Drive...`);
        }
    }
</script>
