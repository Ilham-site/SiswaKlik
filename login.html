<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik | Log Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div class="max-w-md w-full space-y-8 relative">
        <div class="absolute -top-20 -left-20 w-64 h-64 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-float"></div>
        <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-float" style="animation-delay: 1.5s;"></div>

        <div class="glass-card p-10 rounded-[3rem] shadow-2xl border border-white/50 relative z-10 text-center">
            <div class="mb-8">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center shadow-lg shadow-blue-200 mb-6 rotate-3">
                    <i class="fas fa-graduation-cap text-3xl text-white"></i>
                </div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Siswa<span class="text-blue-600">Klik</span></h1>
                <p class="text-slate-500 mt-3 font-medium">Hub Akademik & Pengurusan Fail Digital</p>
            </div>

            <div id="login-status" class="hidden mb-6 p-4 rounded-2xl bg-blue-50 text-blue-700 text-sm font-bold animate-pulse">
                Sila tunggu, sedang menyediakan ruang kerja...
            </div>

            <button onclick="handleAuthClick()" class="w-full group bg-white hover:bg-slate-50 text-slate-700 font-bold py-4 px-6 rounded-2xl border-2 border-slate-100 shadow-sm transition-all duration-300 flex items-center justify-center gap-3 active:scale-95">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6" alt="Google">
                Log Masuk dengan Google
            </button>

            <p class="mt-8 text-xs text-slate-400 font-medium leading-relaxed">
                Dengan log masuk, folder <b>"SiswaKlik"</b> akan dicipta secara automatik dalam Google Drive anda untuk penyelarasan fail.
            </p>
        </div>
    </div>

    <script>
        let tokenClient;
        let accessToken = null;

        // KEKALKAN CLIENT ID ASAL ANDA DI SINI
        const CLIENT_ID = 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com'; 
        const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile';

        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: async (response) => {
                    if (response.error !== undefined) {
                        throw (response);
                    }
                    
                    document.getElementById('login-status').classList.remove('hidden');
                    accessToken = response.access_token;
                    
                    localStorage.setItem('siswaklik_access_token', accessToken);
                    localStorage.setItem('siswaklik_login_time', Date.now());

                    // 1. Ambil Profil & 2. Pastikan Folder SiswaKlik wujud
                    await fetchUserProfile(accessToken);
                    await initializeSiswaKlikFolder(accessToken);
                    
                    window.location.href = 'index.html';
                },
            });
        };

        function handleAuthClick() {
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        async function fetchUserProfile(token) {
            try {
                const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const userData = await res.json();
                localStorage.setItem('siswaklik_user', JSON.stringify(userData));
            } catch (err) {
                console.error('Gagal mengambil profil:', err);
            }
        }

        async function initializeSiswaKlikFolder(token) {
            try {
                // Cari jika folder "SiswaKlik" sudah ada
                const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='SiswaKlik' and mimeType='application/vnd.google-apps.folder' and trashed=false`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const searchData = await searchRes.json();

                if (searchData.files && searchData.files.length > 0) {
                    // Folder wujud, simpan ID
                    localStorage.setItem('siswaklik_folder_id', searchData.files[0].id);
                    console.log("Folder SiswaKlik ditemui:", searchData.files[0].id);
                } else {
                    // Folder tidak wujud, cipta baru
                    const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: 'SiswaKlik',
                            mimeType: 'application/vnd.google-apps.folder',
                            description: 'Folder utama untuk semua aktiviti dan fail SiswaKlik'
                        })
                    });
                    const folderData = await createRes.json();
                    localStorage.setItem('siswaklik_folder_id', folderData.id);
                    console.log("Folder SiswaKlik baru dicipta:", folderData.id);
                }
            } catch (err) {
                console.error('Ralat penyediaan folder Google Drive:', err);
            }
        }
    </script>
</body>
</html>
