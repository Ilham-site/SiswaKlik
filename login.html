<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>SiswaKlik | Log Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center p-6">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-gray-100 text-center">
        <div class="bg-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center text-white text-3xl mx-auto mb-6 shadow-lg">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Selamat Datang</h1>
        <p class="text-gray-400 mb-8">Sila sahkan anda bukan robot untuk mula.</p>

        <div class="flex justify-center mb-8">
            <div class="cf-turnstile" data-sitekey="YOUR_CLOUDFLARE_SITE_KEY"></div>
        </div>

        <div id="g_id_onload"
             data-client_id="755048052549-ldo2fp40r8bsk8n0f2gpsjuimdls5o1j.apps.googleusercontent.com"
             data-callback="onSignIn">
        </div>
        <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-size="large" data-logo_alignment="left"></div>
    </div>

    <script>
        function onSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('siswaklik_user', JSON.stringify(payload));
            localStorage.setItem('siswaklik_token', response.credential);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
