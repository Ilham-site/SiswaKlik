<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik | Log Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 min-h-screen flex items-center justify-center p-6">
    
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-blue-200 rounded-full blur-3xl opacity-30"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-200 rounded-full blur-3xl opacity-30"></div>
    </div>

    <div class="glass-card p-8 md:p-12 rounded-[3rem] shadow-2xl w-full max-w-md border border-white text-center relative">
        <div class="bg-gradient-to-tr from-blue-600 to-indigo-600 w-24 h-24 rounded-[2rem] flex items-center justify-center text-white text-4xl mx-auto mb-8 shadow-xl shadow-blue-200 animate-float">
            <i class="fas fa-graduation-cap"></i>
        </div>

        <h1 class="text-4xl font-extrabold text-gray-900 mb-3 tracking-tight">SiswaKlik</h1>
        <p class="text-gray-500 mb-10 font-medium">Satu klik untuk kejayaan akademik anda.</p>

        <div class="flex justify-center mb-8">
            <div class="cf-turnstile" data-sitekey="YOUR_CLOUDFLARE_SITE_KEY" data-theme="light"></div>
        </div>

        <div class="space-y-6">
            <div id="g_id_onload"
                 data-client_id="755048052549-ldo2fp40r8bsk8n0f2gpsjuimdls5o1j.apps.googleusercontent.com"
                 data-callback="onSignIn"
                 data-auto_prompt="false">
            </div>
            
            <div class="flex justify-center transform hover:scale-105 transition duration-300">
                <div class="g_id_signin" 
                     data-type="standard" 
                     data-shape="pill" 
                     data-size="large" 
                     data-theme="outline" 
                     data-text="signin_with" 
                     data-logo_alignment="left">
                </div>
            </div>
        </div>

        <p class="mt-12 text-xs text-gray-400">
            &copy; 2026 SiswaKlik Hub Akademik. <br> Dibina dengan ❤️ untuk mahasiswa.
        </p>
    </div>

    <script>
        function onSignIn(response) {
            // Decode JWT untuk ambil data user
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            
            // Simpan masa log masuk (untuk tujuan timer)
            localStorage.setItem('siswaklik_login_time', Date.now());
            localStorage.setItem('siswaklik_user', JSON.stringify(payload));
            localStorage.setItem('siswaklik_token', response.credential);
            
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
