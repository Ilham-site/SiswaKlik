<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik | Log Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div class="max-w-md w-full space-y-8 animate-in fade-in zoom-in duration-700">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-[2rem] shadow-2xl shadow-blue-200 mb-6 animate-float">
                <i class="fas fa-graduation-cap text-3xl text-white"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Siswa<span class="text-blue-600">Klik</span></h1>
            <p class="text-slate-500 mt-2 font-medium">Hub Akademik Digital Anda</p>
        </div>

        <div class="glass-card p-10 rounded-[2.5rem] shadow-xl border border-white/50">
            <div class="space-y-6">
                <div class="text-center">
                    <h2 class="text-xl font-bold text-slate-800">Selamat Datang</h2>
                    <p class="text-sm text-slate-500 mt-1">Log masuk dengan akaun Google untuk bermula</p>
                </div>

                <button onclick="handleAuthClick()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-100 py-4 rounded-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-blue-100 transition-all duration-300 group">
                    <img src="https://www.gstatic.com/images/branding/googleg/80dp/logo_googleg_color_96dp.png" class="w-6 h-6 group-hover:scale-110 transition-transform" alt="Google">
                    Teruskan dengan Google
                </button>

                <div class="relative py-2">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-4 text-slate-400 font-bold tracking-widest">Sekuriti Google</span></div>
                </div>

                <p class="text-[10px] text-center text-slate-400 leading-relaxed px-4">
                    Dengan log masuk, folder <b>SiswaKlik</b> akan dicipta secara automatik dalam Google Drive anda untuk penyelarasan data.
                </p>
            </div>
        </div>

        <p class="text-center text-slate-400 text-sm font-medium">
            &copy; 2026 SiswaKlik Ecosystem
        </p>
    </div>

    <script>
        let tokenClient;

        window.onload = function () {
            // Gantikan YOUR_CLIENT_ID dengan Client ID Google Cloud anda
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: 'YOUR_CLIENT_ID.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/drive.file',
                callback: async (response) => {
                    if (response.error !== undefined) {
                        throw (response);
                    }
                    
                    localStorage.setItem('siswaklik_access_token', response.access_token);
                    localStorage.setItem('siswaklik_login_time', Date.now());

                    // Jalankan proses semakan folder dan profil
                    await initializeSiswaKlik(response.access_token);
                },
            });
        };

        function handleAuthClick() {
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        async function initializeSiswaKlik(accessToken) {
            try {
                // 1. Ambil Profil User
                const resProfile = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const userData = await resProfile.json();
                localStorage.setItem('siswaklik_user', JSON.stringify(userData));

                // 2. Semak/Cipta Folder SiswaKlik di Drive
                const folderId = await checkAndCreateSiswaFolder(accessToken);
                localStorage.setItem('siswaklik_drive_folder_id', folderId);
                
                // Redirect ke index.html
                window.location.href = 'index.html';
            } catch (err) {
                console.error('Ralat semasa inisialisasi:', err);
                alert('Gagal menyediakan sistem SiswaKlik. Sila cuba lagi.');
            }
        }

        async function checkAndCreateSiswaFolder(token) {
            // Cari jika folder "SiswaKlik" sudah wujud
            const searchUrl = `https://www.googleapis.com/drive/v3/files?q=name='SiswaKlik' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
            
            const response = await fetch(searchUrl, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            if (data.files && data.files.length > 0) {
                console.log("Folder SiswaKlik sedia ada ditemui.");
                return data.files[0].id;
            } else {
                // Jika tidak wujud, cipta folder baru
                console.log("Mencipta folder SiswaKlik baru...");
                const createResponse = await fetch('https://www.googleapis.com/drive/v3/files', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: 'SiswaKlik',
                        mimeType: 'application/vnd.google-apps.folder'
                    })
                });
                const newFolder = await createResponse.json();
                return newFolder.id;
            }
        }
    </script>
</body>
</html>
