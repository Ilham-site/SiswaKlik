<div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col h-[85vh] animate-in slide-in-from-bottom-4">
    <div class="p-6 border-b flex flex-wrap gap-2 items-center justify-between bg-white">
        <div class="flex items-center gap-4">
            <button onclick="loadView('folder2.html')" class="p-2 hover:bg-gray-100 rounded-full transition">
                <i class="fas fa-arrow-left text-gray-400"></i>
            </button>
            <div>
                <h3 class="font-black text-slate-800" id="editing-filename">Memuatkan PDF...</h3>
                <div class="flex items-center gap-2">
                    <span id="sync-dot" class="w-2 h-2 bg-green-500 rounded-full"></span>
                    <p id="sync-status" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Mod Cloud Editor</p>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-2xl">
            <button onclick="setMode('select')" class="p-3 hover:bg-white rounded-xl transition" title="Pilih"><i class="fas fa-mouse-pointer"></i></button>
            <button onclick="setMode('text')" class="p-3 hover:bg-white rounded-xl transition" title="Teks"><i class="fas fa-font"></i></button>
            <button onclick="setMode('draw')" class="p-3 hover:bg-white rounded-xl transition" title="Pen"><i class="fas fa-pen"></i></button>
            <button onclick="deleteObject()" class="p-3 hover:bg-white rounded-xl transition text-red-500"><i class="fas fa-trash"></i></button>
        </div>

        <div class="flex gap-3">
            <button onclick="saveToDrive()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition flex items-center gap-2">
                <i class="fas fa-cloud-upload-alt"></i> SIMPAN KE DRIVE
            </button>
        </div>
    </div>

    <div class="flex-1 bg-slate-100 p-8 overflow-auto flex flex-col items-center">
        <div id="pdf-wrapper" class="relative shadow-2xl bg-white mb-10">
            <canvas id="pdf-background" class="absolute top-0 left-0"></canvas>
            <canvas id="editor-layer"></canvas>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let fbCanvas;
    const fileId = localStorage.getItem('editing_file_id');
    const fileName = localStorage.getItem('editing_file_name');
    const accessToken = localStorage.getItem('siswaklik_access_token');
    document.getElementById('editing-filename').innerText = fileName;

    async function initEditor() {
        if (!fileId || !accessToken) return alert("Sesi tamat atau fail tidak sah.");

        try {
            // 1. Download PDF dari Google Drive
            const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const blob = await response.blob();
            const arrayBuffer = await blob.arrayBuffer();

            // 2. Render PDF Background
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 1.5 });

            const bgCanvas = document.getElementById('pdf-background');
            bgCanvas.height = viewport.height;
            bgCanvas.width = viewport.width;
            await page.render({ canvasContext: bgCanvas.getContext('2d'), viewport: viewport }).promise;

            // 3. Setup Fabric Layer
            const wrapper = document.getElementById('pdf-wrapper');
            wrapper.style.width = viewport.width + 'px';
            wrapper.style.height = viewport.height + 'px';

            fbCanvas = new fabric.Canvas('editor-layer', {
                width: viewport.width,
                height: viewport.height
            });

            // 4. Load Nota (Jika ada dalam LocalStorage)
            const savedNotes = JSON.parse(localStorage.getItem(`notes_${fileId}`));
            if (savedNotes) {
                fbCanvas.loadFromJSON(savedNotes, fbCanvas.renderAll.bind(fbCanvas));
            }
        } catch (err) {
            console.error(err);
            alert("Gagal memuatkan PDF dari Drive.");
        }
    }

    function setMode(mode) {
        fbCanvas.isDrawingMode = (mode === 'draw');
        if (mode === 'draw') {
            fbCanvas.freeDrawingBrush.width = 3;
            fbCanvas.freeDrawingBrush.color = '#2563eb';
        } else if (mode === 'text') {
            fbCanvas.add(new fabric.IText('Nota baru...', { left: 100, top: 100, fontSize: 20, fill: '#1e293b' }));
        }
    }

    function deleteObject() {
        fbCanvas.getActiveObjects().forEach(obj => fbCanvas.remove(obj));
        fbCanvas.discardActiveObject().renderAll();
    }

    async function saveToDrive() {
        document.getElementById('sync-status').innerText = "Menyimpan...";
        document.getElementById('sync-dot').classList.add('animate-pulse', 'bg-yellow-500');

        // Simpan JSON koordinat ke LocalStorage supaya boleh edit balik
        localStorage.setItem(`notes_${fileId}`, JSON.stringify(fbCanvas));

        // Gabungkan untuk visual di Drive
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = fbCanvas.width;
        tempCanvas.height = fbCanvas.height;
        const ctx = tempCanvas.getContext('2d');
        ctx.drawImage(document.getElementById('pdf-background'), 0, 0);
        ctx.drawImage(fbCanvas.getElement(), 0, 0);
        
        const combinedBlob = await new Promise(resolve => tempCanvas.toBlob(resolve, 'image/jpeg', 0.9));

        try {
            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${accessToken}` },
                body: combinedBlob
            });

            document.getElementById('sync-status').innerText = "Tersimpan di Drive";
            document.getElementById('sync-dot').classList.remove('animate-pulse', 'bg-yellow-500');
            Swal.fire({ icon: 'success', title: 'Berjaya', text: 'Fail dikemaskini!', timer: 1000, showConfirmButton: false });
        } catch (err) {
            alert("Gagal sync ke Drive.");
        }
    }

    initEditor();
</script>
<style>
    .canvas-container { position: absolute !important; top: 0; left: 0; z-index: 10; }
    #pdf-background { z-index: 5; }
</style>
