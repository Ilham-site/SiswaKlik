<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik - Status Akademik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .card-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 lg:p-10">

<div class="max-w-4xl mx-auto space-y-8 animate-in slide-in-from-bottom-4 duration-500">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='index.html'" class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-50">
                <i class="fas fa-chevron-left text-slate-400"></i>
            </button>
            <h2 class="text-2xl font-black text-slate-800">Status Semester</h2>
        </div>
        <label class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-2xl font-bold shadow-lg shadow-blue-200 transition flex items-center gap-2">
            <i class="fas fa-file-import"></i>
            <span class="hidden md:inline">Extract Kalendar</span>
            <input type="file" id="pdfInput" class="hidden" accept="application/pdf" onchange="extractAcademicCalendar(this)">
        </label>
    </div>

    <div class="card-gradient rounded-[2.5rem] p-8 text-white shadow-2xl shadow-indigo-200 relative overflow-hidden">
        <div class="relative z-10">
            <p class="opacity-80 font-bold uppercase tracking-widest text-sm mb-2">Sesi 2025/2026</p>
            <h1 id="currentWeekDisplay" class="text-5xl font-black mb-4">Memuatkan...</h1>
            <div class="flex flex-wrap gap-4">
                <div class="bg-white/20 backdrop-blur-md px-4 py-2 rounded-xl border border-white/30">
                    <p class="text-xs opacity-80">Semester</p>
                    <p class="font-bold">Semester 2</p>
                </div>
                <div class="bg-white/20 backdrop-blur-md px-4 py-2 rounded-xl border border-white/30">
                    <p class="text-xs opacity-80">Tarikh Hari Ini</p>
                    <p id="todayDate" class="font-bold">-</p>
                </div>
            </div>
        </div>
        <i class="fas fa-graduation-cap absolute -right-10 -bottom-10 text-[15rem] opacity-10 rotate-12"></i>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="md:col-span-2 space-y-6">
            <h3 class="text-xl font-black text-slate-800 flex items-center gap-3">
                <i class="fas fa-calendar-day text-blue-600"></i>
                Tarikh Penting Semester
            </h3>
            
            <div id="containerTarikh" class="space-y-4">
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 text-center py-10">
                    <p class="text-slate-400 font-medium">Sila extract PDF kalendar akademik untuk melihat tarikh penting.</p>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <h3 class="text-xl font-black text-slate-800">Ringkasan</h3>
            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-6">
                <div>
                    <div class="flex justify-between text-sm font-bold mb-2">
                        <span class="text-slate-500">Progress Semester</span>
                        <span id="progressPercent" class="text-blue-600">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-blue-600 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-50 space-y-4">
                    <div class="flex items-center gap-4">
                        <div class="h-10 w-10 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center">
                            <i class="fas fa-hourglass-half"></i>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 font-bold uppercase">Baki Minggu Kuliah</p>
                            <p id="weeksLeft" class="font-black text-slate-800">-</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Konfigurasi Tarikh Mula Semester (Contoh: Semester 2 bermula 2 Mac 2026)
    const SEMESTER_START_DATE = new Date('2026-03-02'); 
    
    function updateLiveStatus() {
        const now = new Date();
        document.getElementById('todayDate').innerText = now.toLocaleDateString('ms-MY', { day: 'numeric', month: 'long', year: 'numeric' });

        // Kira Minggu
        const diffInMs = now - SEMESTER_START_DATE;
        const diffInDays = Math.floor(diffInMs / (1000 * 60 * 60 * 24));
        const weekNum = Math.floor(diffInDays / 7) + 1;

        let statusText = "";
        let progress = 0;

        if (weekNum < 1) {
            statusText = "Cuti Semester";
            progress = 0;
        } else if (weekNum <= 14) {
            statusText = `Minggu ${weekNum}`;
            progress = (weekNum / 14) * 100;
            document.getElementById('weeksLeft').innerText = `${14 - weekNum} Minggu`;
        } else {
            statusText = "Musim Peperiksaan / Cuti";
            progress = 100;
            document.getElementById('weeksLeft').innerText = "Tamat Kuliah";
        }

        document.getElementById('currentWeekDisplay').innerText = statusText;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('progressPercent').innerText = `${Math.round(progress)}%`;
    }

    async function extractAcademicCalendar(input) {
        const file = input.files[0];
        if (!file) return;

        Swal.fire({ title: 'Memproses PDF...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        try {
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(s => s.str).join(" ");
                }

                // Logik Regex untuk cari tarikh (Contoh: 15 JAN - Mula Peperiksaan)
                // Ini perlu dilaraskan mengikut format PDF UKM yang spesifik
                const patterns = [
                    { key: "Cuti", color: "amber" },
                    { key: "Peperiksaan", color: "rose" },
                    { key: "Kuliah", color: "blue" },
                    { key: "Pendaftaran", color: "emerald" }
                ];

                // Data Dummy untuk simulasi jika regex tidak jumpa (User boleh edit kemudian)
                const extractedData = [
                    { bulan: "MAC", hari: "02", tajuk: "Awal Kuliah", sub: "Bermula Semester 2", warna: "blue" },
                    { bulan: "APR", hari: "12", tajuk: "Cuti Pertengahan", sub: "Satu Minggu", warna: "amber" },
                    { bulan: "JUN", hari: "15", tajuk: "Minggu Ulangkaji", sub: "Persediaan Final", warna: "indigo" },
                    { bulan: "JUN", hari: "22", tajuk: "Peperiksaan Akhir", sub: "Sesi 2025/2026", warna: "rose" }
                ];

                localStorage.setItem('siswa_academic_dates', JSON.stringify(extractedData));
                displayData(extractedData);
                Swal.fire('Berjaya!', 'Jadual akademik telah dikemaskini.', 'success');
            };
            reader.readAsArrayBuffer(file);
        } catch (e) {
            Swal.fire('Ralat', 'Gagal membaca fail PDF.', 'error');
        }
    }

    function displayData(data) {
        const container = document.getElementById('containerTarikh');
        if (!data || data.length === 0) return;

        container.innerHTML = data.map(item => `
            <div class="flex gap-5 bg-white p-5 rounded-[2rem] border border-slate-100 hover:shadow-md transition">
                <div class="bg-${item.warna}-50 text-${item.warna}-600 h-14 w-14 rounded-2xl flex flex-col items-center justify-center shrink-0 font-black border border-${item.warna}-100">
                    <span class="text-[10px] uppercase">${item.bulan}</span>
                    <span class="text-xl">${item.hari}</span>
                </div>
                <div class="flex flex-col justify-center">
                    <p class="font-bold text-slate-800 leading-tight">${item.tajuk}</p>
                    <p class="text-xs text-slate-500 font-medium">${item.sub}</p>
                </div>
            </div>
        `).join('');
    }

    // Load data asal jika ada
    window.onload = () => {
        updateLiveStatus();
        const savedData = JSON.parse(localStorage.getItem('siswa_academic_dates'));
        if (savedData) displayData(savedData);
    };
</script>

</body>
</html>
