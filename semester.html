<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik - Kalendar Akademik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .card-gradient { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .animate-fade-up { animation: fadeUp 0.5s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC] p-4 md:p-8 lg:p-10">

<div class="max-w-4xl mx-auto mb-6">
    <a href="dashboard.html" class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-2xl text-slate-700 font-bold text-sm hover:bg-slate-50 transition-all shadow-sm">
        <i class="fas fa-arrow-left text-blue-600"></i> Dashboard Utama
    </a>
</div>

<div class="max-w-4xl mx-auto space-y-6 animate-fade-up">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Kalendar Akademik</h1>
            <p class="text-slate-500 font-medium">Data diekstrak secara automatik daripada dokumen rasmi.</p>
        </div>
        <div class="flex gap-2">
            <button onclick="fetchAndProcessStaticPDF()" class="bg-blue-600 px-5 py-3 rounded-2xl text-sm font-bold text-white hover:bg-blue-700 transition flex items-center gap-2 shadow-lg shadow-blue-200">
                <i class="fas fa-sync-alt"></i> Kemaskini
            </button>
        </div>
    </div>

    <div class="card-gradient rounded-[3rem] p-8 md:p-10 text-white shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <div class="flex items-center justify-between mb-8">
                <span class="bg-white/20 backdrop-blur-md px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest border border-white/10">Sesi Akademik 2025/2026</span>
                <i class="fas fa-university text-white/30 text-2xl"></i>
            </div>
            
            <div class="space-y-6">
                <div>
                    <h2 class="text-3xl md:text-4xl font-black mb-2" id="currentActivity">Sedia Memproses</h2>
                    <p class="text-blue-100 font-medium" id="dateRange">Menunggu data kalendar...</p>
                </div>
                
                <div class="pt-4 border-t border-white/10">
                    <div class="flex justify-between items-end mb-3">
                        <p class="text-[10px] font-bold uppercase tracking-widest text-blue-200">Progres Semester</p>
                        <p class="text-2xl font-black" id="progressText">0%</p>
                    </div>
                    <div class="w-full h-3 bg-black/20 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-emerald-400 rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(52,211,153,0.5)]" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
        <i class="fas fa-calendar-check absolute -right-8 -bottom-8 text-white/5 text-[15rem]"></i>
    </div>

    <div class="space-y-4">
        <div class="flex items-center justify-between px-2">
            <h3 class="font-extrabold text-slate-800 flex items-center gap-2">
                <i class="fas fa-list-ul text-blue-600"></i> Aliran Kalendar Akademik
            </h3>
        </div>
        
        <div id="calendarList" class="grid gap-3">
            <div class="bg-white p-12 rounded-[2.5rem] border border-dashed border-slate-200 text-center" id="loadingState">
                <p class="text-slate-400 font-medium">Sila pastikan fail 'kalendar_akademik.pdf' tersedia.</p>
            </div>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Pastikan nama fail ini sama dengan yang anda upload di GitHub
    const PDF_URL = 'kalendar_akademik.pdf'; 

    async function fetchAndProcessStaticPDF() {
        try {
            // Tunjukkan data lama jika ada
            const cachedData = localStorage.getItem('siswa_academic_calendar');
            if (cachedData) renderUI(JSON.parse(cachedData));

            const response = await fetch(PDF_URL);
            if (!response.ok) {
                console.warn("Fail PDF tidak dijumpai di server.");
                return; // Berhenti senyap-senyap tanpa pop-up
            }
            
            const arrayBuffer = await response.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(item => item.str).join(" ") + " ";
            }

            const events = parseUKMCalendar(fullText);
            if (events.length > 0) {
                localStorage.setItem('siswa_academic_calendar', JSON.stringify(events));
                renderUI(events);
            }
        } catch (e) {
            console.error("Proses senyap: Gagal memproses PDF.", e);
        }
    }

    function parseUKMCalendar(text) {
        const events = [];
        const regex = /([A-Za-z\s\/]+)\s+(\d{1,2}\s+[A-Z][a-z]+\.?\s?[-–]\s?\d{1,2}\s+[A-Z][a-z]+\.?\s\d{4})/g;
        
        let m;
        while ((m = regex.exec(text)) !== null) {
            const title = m[1].trim();
            const rawDate = m[2].trim();
            const parts = rawDate.split(/[-–]/);
            const startStr = parts[0].trim();
            const yearMatch = rawDate.match(/\d{4}/);
            const year = yearMatch ? yearMatch[0] : new Date().getFullYear();
            
            events.push({
                title: title,
                rawDate: rawDate,
                startDate: new Date(`${startStr} ${year}`).getTime() || 0
            });
        }
        return events.sort((a, b) => a.startDate - b.startDate);
    }

    function renderUI(data) {
        const container = document.getElementById('calendarList');
        const now = new Date().getTime();
        
        if (!data || data.length === 0) return;

        let activeEvent = data[0];
        let passedEvents = 0;

        data.forEach(ev => { 
            if(now >= ev.startDate) {
                activeEvent = ev;
                passedEvents++;
            }
        });

        const progressPercent = Math.round((passedEvents / data.length) * 100);

        document.getElementById('currentActivity').innerText = activeEvent.title;
        document.getElementById('dateRange').innerText = activeEvent.rawDate;
        document.getElementById('progressBar').style.width = progressPercent + '%';
        document.getElementById('progressText').innerText = progressPercent + '%';

        container.innerHTML = data.map(item => {
            const isPast = now > item.startDate;
            return `
                <div class="flex items-center gap-5 bg-white p-5 rounded-3xl border ${isPast ? 'border-slate-100 opacity-60' : 'border-blue-100 shadow-sm'} transition-all">
                    <div class="h-14 w-14 ${isPast ? 'bg-slate-50 text-slate-400' : 'bg-blue-50 text-blue-600'} rounded-2xl flex flex-col items-center justify-center font-black border border-blue-50 shrink-0">
                        <i class="fas ${isPast ? 'fa-check-circle' : 'fa-calendar-day'} text-lg"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-slate-800 leading-tight">${item.title}</h4>
                        <p class="text-xs text-slate-500 mt-1 font-medium">${item.rawDate}</p>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.onload = fetchAndProcessStaticPDF;
</script>
</body>
</html>
