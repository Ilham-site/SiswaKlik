<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik - Kalendar Akademik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .card-gradient { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .animate-fade-up { animation: fadeUp 0.5s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC] p-4 md:p-8 lg:p-10">

<div class="max-w-4xl mx-auto mb-6">
    <button onclick="goToHome()" class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-2xl text-slate-700 font-bold text-sm hover:bg-slate-50 transition-all shadow-sm">
        <i class="fas fa-arrow-left text-blue-600"></i> Dashboard Utama
    </button>
</div>

<div class="max-w-4xl mx-auto space-y-6 animate-fade-up">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Kalendar Akademik</h1>
            <p class="text-slate-500 font-medium">Sesi 2025/2026 diekstrak daripada dokumen rasmi UKM.</p>
        </div>
        <div class="flex gap-2">
            <button onclick="fetchAndProcessStaticPDF()" class="bg-blue-600 px-5 py-3 rounded-2xl text-sm font-bold text-white hover:bg-blue-700 transition flex items-center gap-2 shadow-lg shadow-blue-200">
                <i class="fas fa-sync-alt"></i> Kemaskini Data
            </button>
        </div>
    </div>

    <div class="card-gradient rounded-[3rem] p-8 md:p-10 text-white shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <div class="flex items-center justify-between mb-8">
                <span class="bg-white/20 backdrop-blur-md px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest border border-white/10">Status Semester</span>
                <i class="fas fa-university text-white/30 text-2xl"></i>
            </div>
            
            <div class="space-y-6">
                <div>
                    <h2 class="text-3xl md:text-4xl font-black mb-2" id="currentActivity">Sedia Memproses</h2>
                    <p class="text-blue-100 font-medium" id="dateRange">Sila tekan butang kemaskini...</p>
                </div>
                
                <div class="pt-4 border-t border-white/10">
                    <div class="flex justify-between items-end mb-3">
                        <p class="text-[10px] font-bold uppercase tracking-widest text-blue-200">Progres Sesi</p>
                        <p class="text-2xl font-black" id="progressText">0%</p>
                    </div>
                    <div class="w-full h-3 bg-black/20 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-emerald-400 rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(52,211,153,0.5)]" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
        <i class="fas fa-calendar-check absolute -right-8 -bottom-8 text-white/5 text-[15rem]"></i>
    </div>

    <div class="space-y-4">
        <div class="flex items-center justify-between px-2">
            <h3 class="font-extrabold text-slate-800 flex items-center gap-2">
                <i class="fas fa-list-ul text-blue-600"></i> Aliran Kalendar Akademik (11 Fasa)
            </h3>
        </div>
        
        <div id="calendarList" class="grid gap-3 pb-10">
            <div class="bg-white p-12 rounded-[2.5rem] border border-dashed border-slate-200 text-center" id="loadingState">
                <p class="text-slate-400 font-medium">Memuatkan data dari kalendar_akademik.pdf...</p>
            </div>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Nama fail PDF yang diupload ke Github
    const PDF_URL = 'kalendar_akademik.pdf'; 

    function goToHome() {
        // Jika dalam konteks SPA index.html, gunakan fungsi loadPage parent
        if (window.parent && typeof window.parent.loadPage === 'function') {
            window.parent.loadPage('dashboard.html');
        } else {
            // Jika akses terus, kembali ke root
            window.location.href = '/';
        }
    }

    async function fetchAndProcessStaticPDF() {
        Swal.fire({ title: 'Menyemak Fail...', text: 'Mengekstrak 11 data akademik UKM', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        try {
            const response = await fetch(PDF_URL);
            if (!response.ok) throw new Error("Fail PDF tidak ditemui di server.");
            
            const arrayBuffer = await response.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(item => item.str).join(" ") + " ";
            }

            const events = parseUKMCalendar(fullText);
            
            if (events.length > 0) {
                localStorage.setItem('siswa_academic_calendar', JSON.stringify(events));
                renderUI(events);
                Swal.fire('Berjaya!', '11 fasa akademik telah dikemaskini.', 'success');
            } else {
                throw new Error("Tiada format tarikh yang sah dikesan.");
            }
        } catch (e) {
            console.error(e);
            Swal.fire('Ralat', 'Gagal memproses kalendar_akademik.pdf. Sila pastikan fail tersebut ada di GitHub anda.', 'error');
        }
    }

    function parseUKMCalendar(text) {
        // Membersihkan teks daripada ruang kosong berlebihan
        const cleanText = text.replace(/\s+/g, ' ');
        const events = [];
        
        // Regex khusus untuk format UKM: Perkara + Tarikh (e.g. "Sesi Pembelajaran 6 Okt-16 Nov. 2025")
        // Mencari 11 fasa utama mengikut dokumen
        const phases = [
            "Pendaftaran Diri Pelajar Baharu",
            "Lapor Diri Pelajar Baharu dan MAW",
            "Sesi Pembelajaran (Prasiswazah dan Pascasiswazah)",
            "Cuti Pertengahan Semester",
            "Majlis Konvokesyen UKM ke-53",
            "Minggu Ulangkaji",
            "Peperiksaan",
            "Cuti Semester",
            "Cuti Perayaan",
            "Hari Raya Aidilfitri",
            "Semester 3"
        ];

        // Pattern tarikh UKM: dd mmm - dd mmm yyyy
        const dateRegex = /(\d{1,2}\s+[A-Z][a-z]+\.?\s?[-–]\s?\d{1,2}\s+[A-Z][a-z]+\.?\s\d{4})/g;
        
        let m;
        while ((m = dateRegex.exec(cleanText)) !== null) {
            const rawDate = m[0];
            const pos = m.index;
            
            // Ambil teks sebelum tarikh sebagai tajuk
            let titleArea = cleanText.substring(pos - 100, pos).trim();
            let matchedTitle = "Aktiviti Akademik";

            for (let phase of phases) {
                if (titleArea.toLowerCase().includes(phase.toLowerCase())) {
                    matchedTitle = phase;
                    break;
                }
            }

            // Ekstrak tarikh mula untuk sorting
            const startPart = rawDate.split(/[-–]/)[0].trim();
            const yearMatch = rawDate.match(/\d{4}/);
            const year = yearMatch ? yearMatch[0] : "2025";
            
            events.push({
                title: matchedTitle,
                rawDate: rawDate,
                startDate: new Date(`${startPart} ${year}`).getTime() || 0
            });
        }

        // Susun mengikut kronologi dan ambil fasa yang unik (elakkan duplikasi)
        return events.sort((a, b) => a.startDate - b.startDate).slice(0, 11);
    }

    function renderUI(data) {
        const container = document.getElementById('calendarList');
        const now = new Date().getTime();
        
        if (!data || data.length === 0) return;

        let activeEvent = data[0];
        let passedEvents = 0;

        data.forEach(ev => { 
            if(now >= ev.startDate) {
                activeEvent = ev;
                passedEvents++;
            }
        });

        const progressPercent = Math.round((passedEvents / data.length) * 100);

        document.getElementById('currentActivity').innerText = activeEvent.title;
        document.getElementById('dateRange').innerText = activeEvent.rawDate;
        document.getElementById('progressBar').style.width = progressPercent + '%';
        document.getElementById('progressText').innerText = progressPercent + '%';

        container.innerHTML = data.map((item, index) => {
            const isPast = now > item.startDate;
            const isActive = item.startDate === activeEvent.startDate;
            
            return `
                <div class="flex items-center gap-5 bg-white p-5 rounded-3xl border ${isActive ? 'border-blue-500 ring-2 ring-blue-100' : (isPast ? 'border-slate-100 opacity-60' : 'border-slate-200')} transition-all">
                    <div class="h-12 w-12 ${isPast ? 'bg-slate-100 text-slate-400' : 'bg-blue-600 text-white'} rounded-2xl flex items-center justify-center font-black shrink-0 shadow-sm">
                        ${index + 1}
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-800 leading-tight">${item.title}</h4>
                        <p class="text-xs text-slate-500 mt-1 font-medium italic">${item.rawDate}</p>
                    </div>
                    ${isActive ? '<span class="text-[10px] bg-blue-100 text-blue-600 px-3 py-1 rounded-full font-bold animate-pulse">AKTIF</span>' : ''}
                </div>
            `;
        }).join('');
    }

    // Auto-load data jika sudah ada dalam cache
    window.onload = () => {
        const cached = localStorage.getItem('siswa_academic_calendar');
        if (cached) renderUI(JSON.parse(cached));
    };
</script>
</body>
</html>
