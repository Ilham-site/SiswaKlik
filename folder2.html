<div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
    <div>
        <h2 class="text-3xl font-bold text-gray-900">Sistem Fail Cloud</h2>
        <div class="flex items-center gap-2 mt-1">
            <span class="flex h-2 w-2 rounded-full bg-blue-500"></span>
            <p id="current-folder-display" class="text-gray-500 font-medium text-sm font-bold italic">Memuatkan lokasi...</p>
        </div>
    </div>
    <div class="flex gap-3 w-full md:w-auto">
        <button onclick="loadView('folder.html')" class="bg-white text-slate-600 border px-6 py-3 rounded-2xl font-bold hover:bg-slate-50 transition">
            <i class="fas fa-home"></i>
        </button>
        <label class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition cursor-pointer text-center md:flex-none">
            <i class="fas fa-file-upload mr-2"></i> Muat Naik Ke Sini
            <input type="file" id="localUpload" class="hidden" onchange="uploadToCurrentFolder(this)" accept=".pdf">
        </label>
    </div>
</div>

<div id="fileList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

<script>
    let activeFolderId = localStorage.getItem('siswaklik_current_folder_id') || 'root';
    let activeFolderName = localStorage.getItem('siswaklik_current_folder_name') || 'Utama';
    document.getElementById('current-folder-display').innerText = `Lokasi: ${activeFolderName}`;

    async function fetchFiles() {
        const container = document.getElementById('fileList');
        const token = localStorage.getItem('siswaklik_access_token');
        
        container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400 animate-pulse">Menghubungi Drive...</div>`;

        try {
            const q = `'${activeFolderId}' in parents and trashed = false`;
            const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id, name, mimeType)`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            const items = data.files || [];

            if (items.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400">Tiada fail dalam folder ini.</div>`;
                return;
            }

            container.innerHTML = '';
            items.forEach(file => {
                const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md transition-all">
                        <div class="${isFolder ? 'text-amber-400' : 'text-blue-600'} text-3xl mb-4">
                            <i class="fas ${isFolder ? 'fa-folder' : 'fa-file-pdf'}"></i>
                        </div>
                        <h4 class="font-bold text-slate-800 truncate">${file.name}</h4>
                        <div class="flex items-center justify-between mt-4">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Google Drive</span>
                            ${isFolder ? 
                                `<button onclick="reEnterFolder('${file.id}', '${file.name}')" class="text-blue-600 font-bold text-sm">Masuk</button>` : 
                                `<button onclick="openCloudEditor('${file.id}', '${file.name}')" class="text-blue-600 font-bold text-sm">Edit PDF</button>`
                            }
                        </div>
                    </div>`;
            });
        } catch (err) {
            container.innerHTML = `<div class="col-span-full text-center text-red-500">Ralat sambungan Drive.</div>`;
        }
    }

    async function uploadToCurrentFolder(input) {
        const file = input.files[0];
        if (!file) return;

        const token = localStorage.getItem('siswaklik_access_token');
        Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

        const metadata = {
            name: file.name,
            mimeType: 'application/pdf',
            parents: [activeFolderId]
        };

        const formData = new FormData();
        formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        formData.append('file', file);

        try {
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            Swal.close();
            fetchFiles();
        } catch (err) {
            alert("Muat naik gagal.");
        }
    }

    function reEnterFolder(id, name) {
        localStorage.setItem('siswaklik_current_folder_id', id);
        localStorage.setItem('siswaklik_current_folder_name', name);
        location.reload(); // Segarkan untuk render folder dalam folder
    }

    function openCloudEditor(id, name) {
        localStorage.setItem('editing_file_id', id);
        localStorage.setItem('editing_file_name', name);
        loadView('pdf2.html');
    }

    fetchFiles();
</script>
