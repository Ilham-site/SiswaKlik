<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik | Kalendar Pintar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --fc-border-color: #e5e7eb; --fc-button-bg-color: #2563eb; --fc-button-border-color: #2563eb; }
        .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 700; color: #111827; }
        .fc-daygrid-day-number { font-size: 0.875rem; padding: 8px !important; }
        .hijri-date { font-size: 0.7rem; color: #6b7280; display: block; margin-top: -2px; }
        .fc-event { cursor: pointer; padding: 2px 4px; border-radius: 4px; border: none; font-size: 0.75rem; }
    </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen flex">

    <aside class="w-[260px] bg-white border-r border-gray-200 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="p-6 border-b border-gray-100 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-graduation-cap"></i></div>
            <span class="text-xl font-bold text-gray-900">SiswaKlik</span>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="index.html" class="flex items-center gap-3 p-3 text-gray-500 hover:bg-gray-50 rounded-xl transition">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </a>
            <a href="kalendar.html" class="flex items-center gap-3 p-3 bg-blue-50 text-blue-600 rounded-xl font-semibold">
                <i class="fas fa-calendar-alt w-5"></i> Kalendar
            </a>
            <a href="fail.html" class="flex items-center gap-3 p-3 text-gray-500 hover:bg-gray-50 rounded-xl transition">
                <i class="fas fa-file-alt w-5"></i> Fail Peribadi
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-6 lg:p-10">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Kalendar Akademik & Hijrah</h1>
            <div class="flex gap-2">
                <button onclick="clearExams()" class="bg-red-50 text-red-600 border border-red-100 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-100 transition">Padam Exam</button>
                <button onclick="addNewEvent()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-medium transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Tambah Acara
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl p-6 border border-gray-200 shadow-sm">
            <div id="calendar"></div>
        </div>

        <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-4 bg-amber-50 rounded-xl border border-amber-100">
                <p class="text-sm font-semibold text-amber-800"><i class="fas fa-moon mr-2"></i>Status Hijrah Hari Ini</p>
                <p id="todayHijri" class="text-lg font-bold text-amber-900 mt-1">Memuatkan...</p>
            </div>
            <div class="p-4 bg-emerald-50 rounded-xl border border-emerald-100">
                <p class="text-sm font-semibold text-emerald-800"><i class="fas fa-info-circle mr-2"></i>Nota</p>
                <p class="text-xs text-emerald-700 mt-1">Acara PDF akan ditandakan dengan warna <span class="text-red-600 font-bold">merah</span>.</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const examEvents = JSON.parse(localStorage.getItem('examEvents')) || [];
            
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                locale: 'ms',
                // Gabungkan Cuti Umum dan Data PDF
                eventSources: [
                    {
                        url: 'https://calendar.google.com/calendar/ical/en.malaysia%23holiday%40group.v.calendar.google.com/public/basic.ics',
                        format: 'ics',
                        color: '#9ca3af'
                    },
                    {
                        events: examEvents // Ini data dari PDF di index.html
                    }
                ],
                dayCellContent: function(e) {
                    let hijri = getHijriDate(e.date);
                    return {
                        html: `<div class="flex flex-col items-end">
                                <span class="text-gray-900 font-bold">${e.date.getDate()}</span>
                                <span class="hijri-date">${hijri.day} ${hijri.month}</span>
                               </div>`
                    };
                },
                eventClick: function(info) {
                    Swal.fire({
                        title: info.event.title,
                        html: `
                            <div class="text-left space-y-2">
                                <p><strong><i class="fas fa-clock"></i> Info:</strong> ${info.event.extendedProps.description || 'Tiada info'}</p>
                                <p><strong><i class="fas fa-map-marker-alt"></i> Tempat:</strong> ${info.event.extendedProps.location || 'Tidak dinyatakan'}</p>
                            </div>`,
                        confirmButtonText: 'Tutup',
                        confirmButtonColor: '#2563eb'
                    });
                }
            });

            calendar.render();
            updateTodayHijri();
        });

        function getHijriDate(date) {
            const months = ["Muharram", "Safar", "Rabiul Awal", "Rabiul Akhir", "Jamadil Awal", "Jamadil Akhir", "Rejab", "Syaaban", "Ramadan", "Syawal", "Zulkaedah", "Zulhijjah"];
            let jd = (date.getTime() / 86400000) + 2440587.5;
            let l = Math.floor(jd - 1948440 + 10632);
            let n = Math.floor((l - 1) / 10631);
            l = l - 10631 * n + 354;
            let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
            l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
            let m = Math.floor((24 * l) / 709);
            let d = l - Math.floor((709 * m) / 24);
            let y = 30 * n + j - 30;
            return { day: d, month: months[m-1], year: y };
        }

        function updateTodayHijri() {
            let h = getHijriDate(new Date());
            let m = new Date();
            const mMonths = ["Jan", "Feb", "Mac", "Apr", "Mei", "Jun", "Jul", "Ogos", "Sep", "Okt", "Nov", "Dis"];
            document.getElementById('todayHijri').innerText = `${m.getDate()} ${mMonths[m.getMonth()]} ${m.getFullYear()} | ${h.day} ${h.month} ${h.year}`;
        }

        function clearExams() {
            localStorage.removeItem('examEvents');
            location.reload();
        }

        async function addNewEvent() {
            const { value: formValues } = await Swal.fire({
                title: 'Tambah Acara Baru',
                html: '<input id="swal-title" class="swal2-input" placeholder="Nama Acara"><input id="swal-loc" class="swal2-input" placeholder="Tempat">',
                preConfirm: () => {
                    return { title: document.getElementById('swal-title').value, loc: document.getElementById('swal-loc').value }
                }
            });
            if (formValues) Swal.fire('Berjaya!', 'Acara ditambah.', 'success');
        }
    </script>
</body>
</html>
