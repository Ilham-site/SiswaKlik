<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .sync-animation { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen flex">

    <aside class="w-[260px] bg-white border-r border-gray-200 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="p-6 border-b border-gray-100 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-graduation-cap"></i></div>
            <span class="text-xl font-bold text-gray-900">SiswaKlik</span>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="index.html" class="flex items-center gap-3 p-3 bg-blue-50 text-blue-600 rounded-xl font-semibold">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </a>
            <a href="kalendar.html" class="flex items-center gap-3 p-3 text-gray-500 hover:bg-gray-50 rounded-xl transition">
                <i class="fas fa-calendar-alt w-5"></i> Kalendar
            </a>
            <a href="fail.html" class="flex items-center gap-3 p-3 text-gray-500 hover:bg-gray-50 rounded-xl transition">
                <i class="fas fa-file-alt w-5"></i> Fail Peribadi
            </a>
            </nav>
        <div class="p-4 border-t border-gray-100">
            <div class="bg-gray-50 rounded-xl p-4 flex items-center gap-3">
                <div class="h-10 w-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold">I</div>
                <div class="overflow-hidden">
                    <p class="text-xs font-bold truncate">Nur Ilham</p>
                    <p class="text-[10px] text-gray-500">21 Tahun • UKM</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1">
        <header class="bg-white/80 backdrop-blur-md border-b p-4 sticky top-0 z-50 flex justify-between items-center">
            <h1 class="font-bold text-lg">Dashboard Akademik</h1>
            <div class="flex items-center gap-4 text-xs font-medium text-green-600 bg-green-50 px-3 py-1.5 rounded-full">
                <span class="w-2 h-2 bg-green-500 rounded-full sync-animation"></span> Synced UKMFolio
            </div>
        </header>

        <div class="p-6 lg:p-10 max-w-7xl mx-auto">
            <div class="relative overflow-hidden bg-blue-700 rounded-3xl p-8 text-white mb-8 shadow-xl">
                <div class="relative z-10">
                    <h2 class="text-2xl font-bold">Peperiksaan Akhir</h2>
                    <p class="text-blue-100 mt-2 text-sm mb-6">Muat naik slip peperiksaan (PDF) untuk auto-kemaskini kalendar anda.</p>
                    <input type="file" id="pdfUpload" accept=".pdf" class="hidden" onchange="processPDF(this)">
                    <button onclick="document.getElementById('pdfUpload').click()" class="bg-white text-blue-700 px-6 py-2.5 rounded-xl font-bold text-sm shadow-sm hover:bg-blue-50 transition">
                        <i class="fas fa-file-pdf mr-2"></i> Upload Slip Peperiksaan
                    </button>
                    <p id="status" class="mt-2 text-xs text-blue-200"></p>
                </div>
                <div class="absolute top-[-50px] right-[-50px] w-64 h-64 bg-blue-600 rounded-full blur-3xl opacity-50"></div>
            </div>

            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-gray-900">Kursus Saya</h3>
                <button onclick="addCourse()" class="text-sm bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                    <i class="fas fa-plus mr-1"></i> Tambah Kursus
                </button>
            </div>

            <div id="courseContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="course-card bg-white rounded-2xl border p-6 transition-all relative group">
                    <button onclick="this.parentElement.remove()" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">
                        <i class="fas fa-trash"></i>
                    </button>
                    <p class="text-xs font-bold text-orange-600 uppercase">KKKM1234</p>
                    <h4 class="font-bold text-lg mb-4">Matematik Kejuruteraan II</h4>
                    <div class="w-full bg-gray-100 rounded-full h-2">
                        <div class="bg-orange-500 h-2 rounded-full" style="width: 75%"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function processPDF(input) {
            const status = document.getElementById('status');
            status.innerText = "Sedang memproses PDF...";
            const file = input.files[0];
            const reader = new FileReader();

            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(item => item.str).join(" ") + " ";
                }
                extractExamData(fullText);
            };
            reader.readAsArrayBuffer(file);
        }

        function extractExamData(text) {
            // Regex diperkukuh untuk menangkap Kod, Tarikh, Masa dan Nama Subjek (jika ada)
            const examRegex = /([A-Z]{4}\d{4})\s+([\d\/]{10})\s+([\d:APM\s-]+)/g;
            let matches;
            const events = [];

            while ((matches = examRegex.exec(text)) !== null) {
                const code = matches[1];
                if (code.startsWith('L')) continue; // Abaikan LMXX, LMCW dsb.

                // Tukar format DD/MM/YYYY ke YYYY-MM-DD untuk FullCalendar
                const dateParts = matches[2].split('/');
                const isoDate = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;

                events.push({
                    title: `PEPERIKSAAN: ${code}`,
                    start: isoDate,
                    extendedProps: {
                        location: "Dewan Peperiksaan UKM",
                        description: `Masa: ${matches[3]}`
                    },
                    backgroundColor: '#dc2626', // Warna merah untuk exam
                    borderColor: '#dc2626'
                });
            }

            if(events.length > 0) {
                localStorage.setItem('examEvents', JSON.stringify(events));
                document.getElementById('status').innerText = "Berjaya! Data telah dimasukkan.";
                setTimeout(() => { window.location.href = "kalendar.html"; }, 1500);
            } else {
                document.getElementById('status').innerText = "Tiada data peperiksaan ditemui.";
            }
        }

        function addCourse() {
            const code = prompt("Masukkan Kod Kursus:");
            const name = prompt("Masukkan Nama Kursus:");
            if(code && name) {
                const container = document.getElementById('courseContainer');
                container.insertAdjacentHTML('beforeend', `
                <div class="course-card bg-white rounded-2xl border p-6 transition-all relative group">
                    <button onclick="this.parentElement.remove()" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fas fa-trash"></i></button>
                    <p class="text-xs font-bold text-blue-600 uppercase">${code}</p>
                    <h4 class="font-bold text-lg mb-4">${name}</h4>
                    <div class="w-full bg-gray-100 rounded-full h-2"><div class="bg-blue-500 h-2 rounded-full" style="width: 0%"></div></div>
                </div>`);
            }
        }
    </script>
</body>
</html>
