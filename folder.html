<div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
    <div>
        <h2 class="text-3xl font-bold text-gray-900">Fail Peribadi</h2>
        <div class="flex items-center gap-2 mt-1">
            <span id="sync-indicator" class="flex h-2 w-2 rounded-full bg-green-500"></span>
            <p class="text-gray-500 font-medium text-sm text-blue-600 font-bold italic">Penyimpanan Hybrid Aktif</p>
        </div>
    </div>
    <div class="flex gap-3 w-full md:w-auto">
        <button onclick="createNewFolder()" class="bg-slate-100 text-slate-700 px-6 py-3 rounded-2xl font-bold hover:bg-slate-200 transition">
            <i class="fas fa-folder-plus mr-2"></i> Folder Baru
        </button>
        
        <label class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition cursor-pointer text-center">
            <i class="fas fa-file-upload mr-2"></i> Muat Naik PDF
            <input type="file" id="localUpload" class="hidden" onchange="handleLocalUpload(this)" accept=".pdf">
        </label>
    </div>
</div>

<div id="breadcrumb" class="mb-4 text-sm font-bold text-blue-600 hidden">
    <span class="cursor-pointer" onclick="loadDriveContent()">SiswaKlik</span> <i class="fas fa-chevron-right mx-2 text-[10px]"></i> <span id="current-folder-name" class="text-slate-400"></span>
</div>

<div id="fileList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <div class="col-span-full text-center py-10 text-slate-400 animate-pulse">Memuatkan data dari Drive...</div>
</div>

<script>
    // ID Folder Utama "SiswaKlik" di Google Drive (Perlu diset semasa login/init)
    let currentFolderId = localStorage.getItem('siswaklik_root_id') || 'root';

    async function renderFiles(items = []) {
        const container = document.getElementById('fileList');
        
        if (items.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400">Tiada fail atau folder dijumpai.</div>`;
            return;
        }

        container.innerHTML = items.map(item => {
            const isFolder = item.mimeType === 'application/vnd.google-apps.folder';
            const icon = isFolder ? 'fa-folder text-amber-500' : 'fa-file-pdf text-blue-600';
            const actionFunc = isFolder ? `openFolder('${item.id}', '${item.name}')` : `openEditor('${item.id}', '${item.name}')`;
            
            return `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md transition-all cursor-pointer" onclick="${actionFunc}">
                    <div class="text-3xl mb-4"><i class="fas ${icon}"></i></div>
                    <h4 class="font-bold text-slate-800 truncate" title="${item.name}">${item.name}</h4>
                    <div class="flex items-center justify-between mt-4">
                        <span class="text-[10px] font-black uppercase text-green-500">
                            <i class="fas fa-check-circle"></i> ${isFolder ? 'Folder' : 'Cloud'}
                        </span>
                        <button class="text-blue-600 font-bold text-sm">${isFolder ? 'Lihat' : 'Buka'}</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Fungsi Create Folder Baru di Drive
    async function createNewFolder() {
        const folderName = prompt("Masukkan nama folder baru:");
        if (!folderName) return;

        try {
            // Memanggil fungsi Google Apps Script (SiswaKlik Backend)
            google.script.run.withSuccessHandler(() => {
                loadDriveContent(currentFolderId);
            }).createFolderInDrive(folderName, currentFolderId);
        } catch (e) {
            console.error("Gagal mencipta folder:", e);
            alert("Ralat: Pastikan integrasi Google Drive API aktif.");
        }
    }

    // Navigasi masuk ke dalam folder
    function openFolder(id, name) {
        currentFolderId = id;
        document.getElementById('breadcrumb').classList.remove('hidden');
        document.getElementById('current-folder-name').innerText = name;
        loadDriveContent(id);
    }

    // Load data fail/folder dari Google Drive API
    function loadDriveContent(folderId = 'root') {
        const container = document.getElementById('fileList');
        container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400 animate-pulse">Menyemak Drive...</div>`;
        
        if(folderId === 'root') {
            document.getElementById('breadcrumb').classList.add('hidden');
        }

        google.script.run.withSuccessHandler(items => {
            renderFiles(items);
        }).listDriveItems(folderId);
    }

    async function handleLocalUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            // Logic asal muat naik ke localStorage (Hybrid)
            const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
            const newFile = {
                id: 'local-' + Date.now(),
                name: file.name,
                content: e.target.result,
                status: 'pending_sync',
                folderId: currentFolderId // Simpan info folder tujuan
            };
            
            localFiles.push(newFile);
            localStorage.setItem('siswa_local_files', JSON.stringify(localFiles));
            
            // Trigger Sync ke Drive Folder spesifik
            if(typeof backgroundSync === 'function') backgroundSync(currentFolderId);
            loadDriveContent(currentFolderId);
        };
        reader.readAsDataURL(file);
    }

    function openEditor(fileId, fileName) {
        localStorage.setItem('editing_file_id', fileId);
        localStorage.setItem('editing_file_name', fileName);
        if(typeof loadView === 'function') loadView('pdf.html');
    }

    // Inisialisasi paparan pertama
    loadDriveContent();
</script>
