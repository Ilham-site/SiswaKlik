<div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
    <div>
        <h2 class="text-3xl font-bold text-gray-900">Fail Peribadi</h2>
        <div class="flex items-center gap-2 mt-1">
            <span id="sync-indicator" class="flex h-2 w-2 rounded-full bg-green-500"></span>
            <p class="text-gray-500 font-medium text-sm text-blue-600 font-bold italic">Penyimpanan Cloud Aktif (Drive)</p>
        </div>
    </div>
    <div class="flex gap-3 w-full md:w-auto">
        <button onclick="openFolderModal()" class="bg-white text-blue-600 border-2 border-blue-600 px-6 py-3 rounded-2xl font-bold shadow-sm hover:bg-blue-50 transition flex-1 md:flex-none">
            <i class="fas fa-folder-plus mr-2"></i> Folder Baru
        </button>
        
        <label class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition cursor-pointer text-center md:flex-none">
            <i class="fas fa-file-upload mr-2"></i> Muat Naik Fail
            <input type="file" id="localUpload" class="hidden" onchange="handleFileUpload(this)">
        </label>
    </div>
</div>

<div id="file-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
    </div>

<script>
    (function() {
        const fileGrid = document.getElementById('file-grid');
        const parentFolderId = localStorage.getItem('siswaklik_drive_folder_id');
        const accessToken = localStorage.getItem('siswaklik_access_token');

        // Fungsi Utama: Ambil data terus dari Drive
        async function renderFiles() {
            if (!accessToken || !parentFolderId) {
                fileGrid.innerHTML = '<p class="col-span-full text-center py-10 text-gray-500">Sila log masuk semula.</p>';
                return;
            }

            fileGrid.innerHTML = `
                <div class="col-span-full text-center py-10">
                    <i class="fas fa-circle-notch animate-spin text-3xl text-blue-600"></i>
                    <p class="mt-2 text-gray-500">Menyemak Drive...</p>
                </div>
            `;

            try {
                // Query untuk mendapatkan folder dan fail dalam SiswaKlik (tidak termasuk yang dalam sampah)
                const q = `'${parentFolderId}' in parents and trashed = false`;
                const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id, name, mimeType, iconLink, webViewLink)&orderBy=folder,name`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();

                if (!data.files || data.files.length === 0) {
                    fileGrid.innerHTML = '<p class="col-span-full text-center py-10 text-gray-400">Tiada fail atau folder ditemui.</p>';
                    return;
                }

                fileGrid.innerHTML = '';
                data.files.forEach(file => {
                    const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
                    const icon = getFileIcon(file.mimeType);
                    
                    const card = document.createElement('div');
                    card.className = "group bg-white p-4 rounded-3xl border border-slate-100 hover:border-blue-200 hover:shadow-xl hover:shadow-blue-500/10 transition-all cursor-pointer relative";
                    card.onclick = () => isFolder ? enterFolder(file.id) : openFile(file);

                    card.innerHTML = `
                        <div class="flex flex-col items-center text-center">
                            <div class="w-16 h-16 mb-4 flex items-center justify-center rounded-2xl ${isFolder ? 'bg-amber-50 text-amber-500' : 'bg-blue-50 text-blue-500'} group-hover:scale-110 transition-transform">
                                <i class="${icon} text-3xl"></i>
                            </div>
                            <span class="font-bold text-slate-700 text-sm truncate w-full px-2" title="${file.name}">${file.name}</span>
                        </div>
                        <button onclick="deleteItem(event, '${file.id}', '${file.name}')" class="absolute top-2 right-2 p-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    `;
                    fileGrid.appendChild(card);
                });

            } catch (err) {
                console.error("Gagal memuatkan fail:", err);
                fileGrid.innerHTML = '<p class="col-span-full text-center text-red-500">Ralat sambungan ke Google Drive.</p>';
            }
        }

        function getFileIcon(mimeType) {
            if (mimeType === 'application/vnd.google-apps.folder') return 'fas fa-folder';
            if (mimeType === 'application/pdf') return 'fas fa-file-pdf';
            if (mimeType.includes('image')) return 'fas fa-file-image';
            if (mimeType.includes('word')) return 'fas fa-file-word';
            if (mimeType.includes('spreadsheet') || mimeType.includes('excel')) return 'fas fa-file-excel';
            return 'fas fa-file-alt';
        }

        // Fungsi Muat Naik Fail ke Drive
        window.handleFileUpload = async function(input) {
            const file = input.files[0];
            if (!file) return;

            Swal.fire({ title: 'Memuat naik...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const metadata = {
                name: file.name,
                parents: [parentFolderId]
            };

            const formData = new FormData();
            formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            formData.append('file', file);

            try {
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` },
                    body: formData
                });

                if (response.ok) {
                    Swal.fire('Berjaya', 'Fail telah dimuat naik ke Drive', 'success');
                    renderFiles();
                } else {
                    throw new Error("Gagal muat naik");
                }
            } catch (err) {
                Swal.fire('Ralat', 'Gagal memuat naik fail', 'error');
            }
            input.value = '';
        };

        // Fungsi Buat Folder Baru
        window.openFolderModal = async function() {
            const { value: folderName } = await Swal.fire({
                title: 'Folder Baru',
                input: 'text',
                inputPlaceholder: 'Nama folder...',
                showCancelButton: true
            });

            if (folderName) {
                try {
                    await fetch('https://www.googleapis.com/drive/v3/files', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: folderName,
                            mimeType: 'application/vnd.google-apps.folder',
                            parents: [parentFolderId]
                        })
                    });
                    renderFiles();
                } catch (err) {
                    Swal.fire('Ralat', 'Gagal membina folder', 'error');
                }
            }
        };

        window.openFile = function(file) {
            if (file.mimeType === 'application/pdf') {
                localStorage.setItem('editing_file_id', file.id);
                localStorage.setItem('editing_file_name', file.name);
                if (typeof loadView === 'function') loadView('pdf.html');
            } else {
                window.open(file.webViewLink, '_blank');
            }
        };

        window.deleteItem = async function(event, id, name) {
            event.stopPropagation();
            const result = await Swal.fire({
                title: 'Padam?',
                text: `Padam "${name}"?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Padam'
            });

            if (result.isConfirmed) {
                try {
                    await fetch(`https://www.googleapis.com/drive/v3/files/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    renderFiles();
                } catch (err) {
                    Swal.fire('Ralat', 'Gagal memadam item', 'error');
                }
            }
        };

        // Jalankan render semasa mula
        renderFiles();
    })();
</script>
