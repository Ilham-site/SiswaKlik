<div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
    <div>
        <h2 class="text-3xl font-bold text-gray-900">Fail Peribadi</h2>
        <div class="flex items-center gap-2 mt-1">
            <span id="sync-indicator" class="flex h-2 w-2 rounded-full bg-green-500"></span>
            <p class="text-gray-500 font-medium text-sm text-blue-600 font-bold italic">Penyimpanan Hybrid Aktif</p>
        </div>
    </div>
    <div class="flex gap-3 w-full md:w-auto">
        <button onclick="openFolderModal()" class="bg-white text-blue-600 border-2 border-blue-600 px-6 py-3 rounded-2xl font-bold shadow-sm hover:bg-blue-50 transition flex-1 md:flex-none">
            <i class="fas fa-folder-plus mr-2"></i> Folder Baru
        </button>
        
        <label class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition cursor-pointer text-center md:flex-none">
            <i class="fas fa-file-upload mr-2"></i> Muat Naik PDF
            <input type="file" id="localUpload" class="hidden" onchange="handleLocalUpload(this)" accept=".pdf">
        </label>
    </div>
</div>

<div id="breadcrumb" class="mb-6 flex items-center gap-2 text-sm font-bold text-slate-400">
    <span onclick="navigateToRoot()" class="cursor-pointer hover:text-blue-600">SiswaKlik</span>
    <span id="current-path"></span>
</div>

<div id="fileList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
    </div>

<div id="folderModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl scale-in-center">
        <h3 class="text-xl font-bold text-slate-800 mb-2">Cipta Folder Baru</h3>
        <p class="text-slate-500 text-sm mb-6">Folder ini akan diselaraskan terus ke Google Drive anda.</p>
        
        <input type="text" id="folderNameInput" placeholder="Nama folder..." 
            class="w-full px-5 py-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none font-medium mb-6">
        
        <div class="flex gap-3">
            <button onclick="closeFolderModal()" class="flex-1 py-3 font-bold text-slate-400 hover:bg-slate-50 rounded-xl transition">Batal</button>
            <button onclick="createNewFolder()" id="confirmFolderBtn" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition">Cipta</button>
        </div>
    </div>
</div>

<style>
    .scale-in-center { animation: scale-in-center 0.2s cubic-bezier(0.250, 0.460, 0.450, 0.940) both; }
    @keyframes scale-in-center { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
</style>

<script>
    // 1. Inisialisasi State Folder
    let rootFolderId = localStorage.getItem('siswaklik_drive_folder_id') || 'root';
    let currentFolderId = localStorage.getItem('siswaklik_current_folder_id') || rootFolderId;

    async function renderFiles() {
        const container = document.getElementById('fileList');
        const pathLabel = document.getElementById('current-path');
        const accessToken = localStorage.getItem('siswaklik_access_token');
        
        // Kemaskini Breadcrumb
        const currentName = localStorage.getItem('siswaklik_current_folder_name') || '';
        pathLabel.innerHTML = currentName ? `<i class="fas fa-chevron-right text-[10px] mx-1"></i> <span class="text-blue-600">${currentName}</span>` : '';

        container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400 animate-pulse"><i class="fas fa-sync fa-spin mr-2"></i>Menyemak kandungan...</div>`;

        let driveItems = [];
        let localFiles = [];

        // 2. Ambil data dari Google Drive (Hanya fail dalam folder semasa)
        if (accessToken) {
            try {
                // Penapisan kritikal: '${currentFolderId}' in parents
                const q = `'${currentFolderId}' in parents and trashed = false`;
                const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id, name, mimeType)`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                driveItems = data.files || [];
            } catch (e) { 
                console.error("Drive fetch error", e); 
            }
        }

        // 3. Ambil data dari LocalStorage dan TAPIS mengikut parentId
        const allLocal = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
        // Pastikan fail tempatan hanya muncul jika parentId sepadan dengan folder yang sedang dibuka
        localFiles = allLocal.filter(f => f.parentId === currentFolderId);

        if (driveItems.length === 0 && localFiles.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400">
                <i class="fas fa-folder-open text-4xl mb-4 block"></i>
                Folder ini kosong.
            </div>`;
            return;
        }

        container.innerHTML = '';

        // 4. Render Folder
        driveItems.filter(i => i.mimeType === 'application/vnd.google-apps.folder').forEach(folder => {
            container.innerHTML += `
                <div onclick="enterFolder('${folder.id}', '${folder.name}')" class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md transition-all cursor-pointer group">
                    <div class="text-amber-400 text-3xl mb-4 group-hover:scale-110 transition-transform"><i class="fas fa-folder"></i></div>
                    <h4 class="font-bold text-slate-800 truncate">${folder.name}</h4>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-2">Folder</p>
                </div>`;
        });

        // 5. Render Fail PDF (Gabungan Drive + Local)
        // Elakkan duplikasi jika fail local sudah di-sync ke Drive
        const drivePdfs = driveItems.filter(i => i.mimeType === 'application/pdf');
        
        // Gabungkan paparan
        drivePdfs.forEach(file => {
            container.innerHTML += renderFileCard(file.id, file.name, true);
        });

        localFiles.filter(lf => lf.status === 'pending_sync').forEach(file => {
            container.innerHTML += renderFileCard(file.id, file.name, false);
        });
    }

    // Helper untuk UI Card Fail
    function renderFileCard(id, name, isSynced) {
        return `
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md transition-all">
                <div class="text-blue-600 text-3xl mb-4"><i class="fas fa-file-pdf"></i></div>
                <h4 class="font-bold text-slate-800 truncate" title="${name}">${name}</h4>
                <div class="flex items-center justify-between mt-4">
                    <span class="text-[10px] font-black uppercase ${isSynced ? 'text-green-500' : 'text-amber-500 animate-pulse'}">
                        ${isSynced ? '<i class="fas fa-check-circle"></i> Cloud' : '<i class="fas fa-clock"></i> Memproses'}
                    </span>
                    <button onclick="openEditor('${id}', '${name.replace(/'/g, "\\'")}')" class="text-blue-600 font-bold text-sm hover:underline">Buka</button>
                </div>
            </div>`;
    }

    // --- FUNGSI NAVIGASI ---
    function enterFolder(id, name) {
        currentFolderId = id;
        localStorage.setItem('siswaklik_current_folder_id', id);
        localStorage.setItem('siswaklik_current_folder_name', name);
        renderFiles();
    }

    function navigateToRoot() {
        currentFolderId = rootFolderId;
        localStorage.setItem('siswaklik_current_folder_id', rootFolderId);
        localStorage.removeItem('siswaklik_current_folder_name');
        renderFiles();
    }

    // --- FUNGSI MODAL ---
    function openFolderModal() { document.getElementById('folderModal').classList.remove('hidden'); }
    function closeFolderModal() { document.getElementById('folderModal').classList.add('hidden'); }

    // --- LOGIK DRIVE & UPLOAD ---
    async function createNewFolder() {
        const name = document.getElementById('folderNameInput').value;
        const accessToken = localStorage.getItem('siswaklik_access_token');
        const btn = document.getElementById('confirmFolderBtn');

        if (!name || !accessToken) return;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i>';

        try {
            const response = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: name,
                    mimeType: 'application/vnd.google-apps.folder',
                    parents: [currentFolderId]
                })
            });

            if (response.ok) {
                document.getElementById('folderNameInput').value = '';
                closeFolderModal();
                renderFiles();
            }
        } catch (err) {
            alert("Gagal mencipta folder.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Cipta';
        }
    }

    async function handleLocalUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
            
            const newFile = {
                id: 'local-' + Date.now(),
                name: file.name,
                content: e.target.result,
                status: 'pending_sync',
                parentId: currentFolderId, // Fail masuk dalam folder aktif sekarang
                date: new Date().toISOString()
            };
            
            localFiles.push(newFile);
            localStorage.setItem('siswa_local_files', JSON.stringify(localFiles));
            input.value = "";
            renderFiles();
            
            // Panggil background sync jika ada
            if(typeof backgroundSync === 'function') backgroundSync();
        };
        reader.readAsDataURL(file);
    }

    function openEditor(fileId, fileName) {
        localStorage.setItem('editing_file_id', fileId);
        localStorage.setItem('editing_file_name', fileName);
        if (typeof loadView === 'function') {
            loadView('pdf.html');
        }
    }

    // Jalankan render pertama kali
    renderFiles();
</script>
