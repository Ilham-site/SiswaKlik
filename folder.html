<div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
    <div>
        <h2 class="text-3xl font-bold text-gray-900">Fail Peribadi</h2>
        <div class="flex items-center gap-2 mt-1">
            <span id="sync-indicator" class="flex h-2 w-2 rounded-full bg-green-500"></span>
            <p class="text-gray-500 font-medium text-sm text-blue-600 font-bold italic">Penyimpanan Hybrid Aktif</p>
        </div>
    </div>
    <div class="flex gap-3 w-full md:w-auto">
        <label class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition cursor-pointer text-center">
            <i class="fas fa-file-upload mr-2"></i> Muat Naik PDF
            <input type="file" id="localUpload" class="hidden" onchange="handleLocalUpload(this)" accept=".pdf">
        </label>
    </div>
</div>

<div id="fileList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
    </div>

<script>
    function renderFiles() {
        const files = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
        const container = document.getElementById('fileList');
        
        if (files.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400">Tiada fail disimpan secara lokal.</div>`;
            return;
        }

        container.innerHTML = files.map(file => `
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md transition-all">
                <div class="text-blue-600 text-3xl mb-4"><i class="fas fa-file-pdf"></i></div>
                <h4 class="font-bold text-slate-800 truncate">${file.name}</h4>
                <div class="flex items-center justify-between mt-4">
                    <span class="text-[10px] font-black uppercase ${file.status === 'synced' ? 'text-green-500' : 'text-amber-500 animate-pulse'}">
                        ${file.status === 'synced' ? '<i class="fas fa-check-circle"></i> Cloud' : '<i class="fas fa-clock"></i> Pending Sync'}
                    </span>
                    <button onclick="openEditor('${file.id}', '${file.name}')" class="text-blue-600 font-bold text-sm">Buka</button>
                </div>
            </div>
        `).join('');
    }

    async function handleLocalUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const localFiles = JSON.parse(localStorage.getItem('siswa_local_files')) || [];
            const newFile = {
                id: 'local-' + Date.now(),
                name: file.name,
                content: e.target.result, // Base64 string
                status: 'pending_sync',
                date: new Date().toISOString()
            };
            
            localFiles.push(newFile);
            localStorage.setItem('siswa_local_files', JSON.stringify(localFiles));
            renderFiles();
            
            // Trigger sync serta-merta
            if(typeof backgroundSync === 'function') backgroundSync();
        };
        reader.readAsDataURL(file);
    }

    function openEditor(fileId, fileName) {
        localStorage.setItem('editing_file_id', fileId);
        localStorage.setItem('editing_file_name', fileName);
        loadView('pdf.html');
    }

    renderFiles();
</script>
